<!DOCTYPE html>
<html lang="es" data-retorica-anchor="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica - Sistema Avanzado de Guiones y Audio</title>
    <link rel="manifest" href="./manifest.json?v=2026_Módulos">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-main: #12141c; --bg-sidebar: #1a1d29; --bg-card: #222736;
            --accent: #00ffcc; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #ff3b30; --btn-3d-bg: #2d3244;
            --btn-3d-shadow-dark: #090b11; --btn-3d-shadow-light: #414963;
        }
        body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #00a884; --text-main: #1a202c; --text-muted: #718096;
            --border: #cbd5e0; --btn-3d-bg: #e0e5ec;
            --btn-3d-shadow-dark: #b8bec7; --btn-3d-shadow-light: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }

        /* --- CONTENEDOR 3D Y COMPONENTES BLINDADOS --- */
        .sidebar { width: 290px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; position: absolute; left: 0; top: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 120; }
        .sidebar.hidden { transform: translateX(-290px); }
        .toggle-sidebar-pestaña { position: absolute; right: -36px; top: 15px; width: 36px; height: 45px; background-color: var(--bg-sidebar); color: var(--accent); border: 1px solid var(--border); border-left: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; z-index: 121; border-radius: 0 8px 8px 0; box-shadow: 3px 0 6px rgba(0,0,0,0.2); }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; height: 70px; flex-shrink: 0; }
        
        .document-list { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; }
        .document-list-item { background: var(--bg-card); padding: 10px; margin-bottom: 8px; border-radius: 6px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .document-list-item:hover { border-color: var(--accent); }
        
        .sidebar-footer-menu { padding: 16px; border-top: 1px solid var(--border); background-color: rgba(0, 0, 0, 0.3); flex-shrink: 0; }
        .main-container { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; background-color: var(--bg-main); position: relative; padding-left: 0; transition: padding 0.3s ease; }
        
        /* --- PASARELAS HORIZONTALES DESLIZABLES --- */
        .scollable-toolbar-wrapper { display: flex; flex-direction: column; gap: 4px; background-color: var(--bg-sidebar); padding: 6px 8px 6px 45px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .top-toolbar-pasarela { display: flex; align-items: center; gap: 24px; overflow-x: auto; white-space: nowrap; width: 100%; padding: 14px 4px 6px 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .top-toolbar-pasarela::-webkit-scrollbar { display: none; }
        .toolbar-rack-modular { display: inline-flex; align-items: center; gap: 16px; flex-shrink: 0; }

        /* --- CONTENEDOR DE LEYENDA SUPERIOR Y BOTÓN 3D --- */
        .control-unit-3d { display: inline-flex; flex-direction: column; align-items: center; position: relative; min-width: 60px; }
        .control-unit-3d .leyenda-superior-externa { font-size: 0.68rem; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; pointer-events: none; white-space: nowrap; text-align: center; }
        
        /* --- DISEÑO EXCLUSIVO DE BOTÓN 3D REDONDO --- */
        .btn-3d-round { width: 46px; height: 46px; border-radius: 50% !important; background: var(--btn-3d-bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; transition: all 0.15s ease; box-shadow: 4px 4px 8px var(--btn-3d-shadow-dark), -4px -4px 8px var(--btn-3d-shadow-light); position: relative; outline: none; }
        .btn-3d-round:active { box-shadow: inset 3px 3px 6px var(--btn-3d-shadow-dark), inset -3px -3px 6px var(--btn-3d-shadow-light); transform: translateY(1px); }
        .btn-3d-round.active-mode { background: var(--accent); color: #0a0f1d; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4); }
        
        .select-3d-styled { background: var(--btn-3d-bg); color: var(--text-main); border: none; padding: 6px 10px; font-size: 0.78rem; font-weight: bold; outline: none; height: 36px; border-radius: 8px !important; box-shadow: 2px 2px 5px var(--btn-3d-shadow-dark), -2px -2px 5px var(--btn-3d-shadow-light); }

        /* --- ENTORNO DE TRABAJO DEL EDITOR --- */
        .editor-wrapper { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; position: relative; }
        .input-titulo-html { background: transparent; border: none; border-bottom: 1px dashed var(--border); color: var(--accent); font-size: 1.4rem; font-weight: bold; padding-bottom: 8px; margin-bottom: 12px; outline: none; width: 100%; }
        .textarea-encapsulado { flex: 1; width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; line-height: 1.6; resize: none; outline: none; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .stats-bar-fija { height: 30px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 0.78rem; color: var(--text-muted); display: flex; justify-content: space-between; flex-shrink: 0; font-family: monospace; }
        
        /* --- SISTEMA DE AUTENTICACIÓN INTEGRADO --- */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 8, 16, 0.85); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.3s ease; }
        .auth-overlay.hidden { display: none !important; opacity: 0; pointer-events: none; }
        .auth-card { background: var(--bg-sidebar); border: 2px solid var(--accent); padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        
        .login-header-brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px; }
        .login-header-brand h2 { color: var(--accent); font-size: 28px; margin: 0; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .login-brand-logo { filter: drop-shadow(0 0 5px rgba(0, 255, 204, 0.5)); }
        
        .auth-input { width: 100%; padding: 12px; background: var(--bg-main); border: 1px solid var(--border); color: #fff; margin-bottom: 12px; border-radius: 6px; outline: none; font-size: 1rem; box-sizing: border-box; }
        .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .btn-submit-retorica-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 8px; color: #ffffff; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s ease; margin-top: 5px; }
        .btn-submit-retorica-auth:hover { border-color: var(--accent); background: var(--bg-main); }

        .auth-divider-line { margin: 20px 0; position: relative; text-align: center; }
        .auth-divider-line::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: #334155; z-index: 1; }
        .auth-divider-line span { background: var(--bg-sidebar); padding: 0 10px; color: #64748b; font-size: 14px; position: relative; z-index: 2; }

        .social-auth-box { display: flex; flex-direction: column; gap: 10px; }
        .btn-social-gate { width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #ffffff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; }
        .btn-social-gate:hover { background: #334155; }
        .btn-social-gate img { width: 20px; height: 20px; }

        .toast-notificador { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(150px); background-color: var(--accent); color: #12141c; padding: 12px 24px; font-size: 0.85rem; font-weight: bold; box-shadow: 0 6px 20px rgba(0,0,0,0.4); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000; pointer-events: none; border-radius: 30px; letter-spacing: 0.5px; }
        .toast-notificador.show { transform: translateX(-50%) translateY(0); }
        .hidden-file-input { display: none !important; }
    </style>
</head>
<body>

    <!-- INTERCEPCIÓN NATIVA DE ARCHIVOS LOCALES -->
    <input type="file" id="fallback-file-loader" class="hidden-file-input" accept=".html,.txt,.doc">

    <!-- CAPA INTEGRAL DE REGISTRO E INICIO DE SESIÓN CORREGIDO -->
    <div class="auth-overlay" id="modulo-auth-screen" data-retorica-anchor="auth-gate" style="display: flex;">
        <div class="auth-card">
            
            <!-- LOGO Y ENCABEZADO DE MARCA -->
            <div class="login-header-brand">
                <svg class="login-brand-logo" viewBox="0 0 24 24" width="38" height="38">
                    <path fill="#00ffcc" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <h2>Retórica</h2>
            </div>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 20px;">Resguardo Local y Sincronización en la Nube</p>
            
            <!-- FORMULARIO DE ACCESO PROPIO -->
            <form id="retorica-form-autenticacion" onsubmit="ejecutarAccesoDirectoRetorica(event)">
                <input type="email" id="auth-username-field" class="auth-input" placeholder="Correo electrónico" required>
                <input type="password" id="auth-password-field" class="auth-input" placeholder="Contraseña (Crear o ingresar)" required>
                
                <div class="control-unit-3d" style="width: 100%;">
                    <div class="leyenda-superior-externa">Acceder</div>
                    <button type="submit" class="btn-submit-retorica-auth" id="btn-auth-confirmar">
                        <span>Acceder con Retórica</span> <span>🔑</span>
                    </button>
                </div>
            </form>

            <div class="auth-divider-line"><span>ó continuar con</span></div>

            <!-- PASARELAS DE TERCEROS RÁPIDAS -->
            <div class="social-auth-box">
                <button class="btn-social-gate" onclick="procesarAccesoTerceros('Google')">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google"> Google
                </button>
                <button class="btn-social-gate" onclick="procesarAccesoTerceros('Facebook')">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook"> Facebook
                </button>
                <button class="btn-social-gate" onclick="procesarAccesoTerceros('WhatsApp')">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp"> WhatsApp
                </button>
            </div>

        </div>
    </div>

    <!-- MENÚ LATERAL: BIBLIOTECA DE DOCUMENTOS -->
    <div class="sidebar hidden" id="sidebar-container" data-retorica-anchor="sidebar-root">
        <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña" title="Desplegar Biblioteca">▶</div>
        <div class="sidebar-header">
            <div style="display:flex; flex-direction:column;">
                <span id="display-user-activo" style="font-weight:700; font-size:0.9rem; color:var(--accent);">Retórica</span>
                <span style="font-size:0.6rem; color:var(--text-muted); text-transform:uppercase;">Biblioteca Local</span>
            </div>
            <div class="control-unit-3d">
                <div class="leyenda-superior-externa">Nuevo</div>
                <button class="btn-3d-round" id="btn-nuevo-documento-limpio">➕</button>
            </div>
        </div>
        
        <div class="document-list" id="contenedor-lista-documentos">
            <!-- Nodos inyectados dinámicamente -->
        </div>
        
        <div class="sidebar-footer-menu">
            <div class="control-unit-3d" style="width:100%; margin-bottom:12px;">
                <div class="leyenda-superior-externa">Cuenta</div>
                <button class="btn-3d-round" id="btn-cerrar-sesion-activo" style="width:100%; font-size:0.85rem; border-radius:6px !important;">🚪 Cerrar Sesión</button>
            </div>
            <div class="control-unit-3d" style="width:100%;">
                <div class="leyenda-superior-externa">Instalar</div>
                <button class="btn-3d-round" id="btn-pwa-instalar-nativo" style="width:100%; font-size:0.85rem; border-radius:6px !important; display:none;">📥 Instalar Sistema</button>
            </div>
        </div>
    </div>

    <!-- ÁREA DE TRABAJO PRINCIPAL -->
    <div class="main-container" id="area-principal-retorica">
        
        <!-- MATRIZ DE PASARELAS HORIZONTALES DESLIZABLES -->
        <div class="scollable-toolbar-wrapper">
            <div class="top-toolbar-pasarela" id="pasarela-herramientas-globales" data-retorica-anchor="toolbar-scroller">
                
                <!-- RACK 1: AUDIO Y DICTADO -->
                <div class="toolbar-rack-modular" id="rack-audio-operaciones">
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Dictado</div>
                        <button class="btn-3d-round" id="btn-operar-dictado" title="Dictado por voz">🎙️</button>
                    </div>
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Lectura</div>
                        <button class="btn-3d-round" id="btn-operar-lectura" title="Leer texto en voz alta">🔊</button>
                    </div>
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">NotaVoz</div>
                        <button class="btn-3d-round" id="btn-operar-grabacion-voz" title="Grabar nota de audio">🎵</button>
                    </div>
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Compilar</div>
                        <button class="btn-3d-round" id="btn-operar-render-audio" title="Renderizar texto a archivo de voz">⚙️</button>
                    </div>
                </div>

                <!-- RACK 2: IDIOMAS CONFIGURABLES (30 IDIOMAS INTEGRADOS) -->
                <div class="toolbar-rack-modular" id="rack-configuracion-idiomas">
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">App</div>
                        <select id="selector-idioma-app" class="select-3d-styled" title="Idioma del Entorno">
                            <!-- Inyectados por script -->
                        </select>
                    </div>
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Voz</div>
                        <select id="selector-idioma-voz" class="select-3d-styled" title="Idioma de Reconocimiento">
                            <!-- Inyectados por script -->
                        </select>
                    </div>
                </div>

                <!-- RACK 3: GESTIÓN DE ARCHIVOS EXTERNOS E INTERNOS -->
                <div class="toolbar-rack-modular" id="rack-archivos-sistema">
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Abrir</div>
                        <button class="btn-3d-round" id="btn-abrir-archivo-local" title="Abrir archivo del dispositivo">📂</button>
                    </div>
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">PDF</div>
                        <button class="btn-3d-round" id="btn-exportar-pdf-fijo" title="Exportar como PDF Fijo">📄</button>
                    </div>
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Editable</div>
                        <button class="btn-3d-round" id="btn-exportar-pdf-editable" title="Exportar como PDF Formulario">📝</button>
                    </div>
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Doc</div>
                        <button class="btn-3d-round" id="btn-exportar-word-doc" title="Exportar como Word DOC">藍</button>
                    </div>
                </div>

                <!-- RACK 4: INTERFAZ Y CONFIRMACIÓN -->
                <div class="toolbar-rack-modular" id="rack-interfaz-salvaguarda">
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Tema</div>
                        <button class="btn-3d-round" id="btn-conmutar-tema-visual" title="Cambiar Apariencia">🌙</button>
                    </div>
                    <div class="control-unit-3d">
                        <div class="leyenda-superior-externa">Guardar</div>
                        <button class="btn-3d-round" id="btn-confirmar-guardado-nativo" style="color: var(--accent); font-weight: bold;" title="Guardar cambios localmente">✓</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- ENTORNO DE EDICIÓN TOTALMENTE SEPARADO Y PROTEGIDO -->
        <div class="editor-wrapper" id="bloque-editor-retorica">
            <input type="text" id="editor-document-title" class="input-titulo-html" placeholder="Título del Documento..." data-retorica-anchor="doc-title">
            <textarea id="editor-core-textarea" class="textarea-encapsulado" placeholder="Escribe tu guion o nota aquí..." data-retorica-anchor="doc-body"></textarea>
            
            <div class="stats-bar-fija" id="stats-bar-fija-indicador">
                <span id="txt-contador-caracteres">Caracteres: 0</span>
                <span id="txt-contador-palabras">Palabras: 0</span>
                <span id="txt-contador-lineas">Líneas: 0</span>
            </div>
        </div>
    </div>

    <!-- COMPONENTE FLOTANTE DE AVISOS -->
    <div class="toast-notificador" id="toast-notificador-global">Sistema Listo</div>

    <!-- ENLAZADOR CENTRAL DEL MOTOR DE MÓDULOS -->
    <script type="module" src="./js/main.js?v=2026_Módulos"></script>

    <!-- SISTEMA DE COMPROBACIÓN INTELIGENTE Y ACCESOS NATIVOS -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            verificarConectividadCredencialesDispositivo();
        });

        // 1. Detectar si el teléfono tiene cuentas activadas o sesión local para saltar el paso
        function verificarConectividadCredencialesDispositivo() {
            const sesionActiva = localStorage.getItem("retorica_user_session");
            
            if (sesionActiva) {
                console.log("Sesión existente detectada localmente.");
                removerPantallaCapaAutenticacion();
                return;
            }

            // Detección silenciosa mediante credenciales del ecosistema del smartphone
            if (navigator.credentials && navigator.credentials.get) {
                navigator.credentials.get({ password: true, mediation: "silent" })
                    .then((credencial) => {
                        if (credencial && credencial.id) {
                            console.log("Cuenta detectada en dispositivo:", credencial.id);
                            localStorage.setItem("retorica_user_session", JSON.stringify({ email: credencial.id, provider: "device-auto" }));
                            
                            const displayUser = document.getElementById("display-user-activo");
                            if (displayUser) displayUser.textContent = credencial.id.split('@')[0];
                            
                            removerPantallaCapaAutenticacion();
                        }
                    })
                    .catch((err) => console.log("Comprobación silenciosa nativa saltada u omitida.", err));
            }
        }

        // 2. Registro y creación de contraseña interna desde el propio código de Retórica
        function ejecutarAccesoDirectoRetorica(event) {
            event.preventDefault();
            const emailValue = document.getElementById("auth-username-field").value;
            const passwordValue = document.getElementById("auth-password-field").value;

            if (emailValue && passwordValue) {
                // Se resguarda la estructura de sesión local
                const metadataUsuario = { email: emailValue, provider: "retorica_secure" };
                localStorage.setItem("retorica_user_session", JSON.stringify(metadataUsuario));
                
                const displayUser = document.getElementById("display-user-activo");
                if (displayUser) displayUser.textContent = emailValue.split('@')[0];
                
                removerPantallaCapaAutenticacion();
                mostrarNotificacionToast("Acceso correcto con cuenta Retórica");
            }
        }

        // 3. Pasarelas de federación simulada para Google, Facebook y WhatsApp
        function procesarAccesoTerceros(proveedorPlataforma) {
            console.log(`Invocando pasarela externa: ${proveedorPlataforma}`);
            
            const cuentaSimulada = { email: `usuario.${proveedorPlataforma.toLowerCase()}@retorica.app`, provider: proveedorPlataforma };
            localStorage.setItem("retorica_user_session", JSON.stringify(cuentaSimulada));
            
            const displayUser = document.getElementById("display-user-activo");
            if (displayUser) displayUser.textContent = proveedorPlataforma;

            removerPantallaCapaAutenticacion();
            mostrarNotificacionToast(`Conectado vía ${proveedorPlataforma}`);
        }

        function removerPantallaCapaAutenticacion() {
            const capaBloqueo = document.getElementById("modulo-auth-screen");
            if (capaBloqueo) {
                capaBloqueo.classList.add("hidden");
                capaBloqueo.style.setProperty("display", "none", "important");
            }
        }

        function mostrarNotificacionToast(mensaje) {
            const toast = document.getElementById("toast-notificador-global");
            if (toast) {
                toast.textContent = mensaje;
                toast.classList.add("show");
                setTimeout(() => toast.classList.remove("show"), 3000);
            }
        }

        // Interceptor del botón nativo de cerrar sesión ya provisto en el sidebar
        const btnLogoutNode = document.getElementById("btn-cerrar-sesion-activo");
        if (btnLogoutNode) {
            btnLogoutNode.addEventListener("click", () => {
                localStorage.removeItem("retorica_user_session");
                window.location.reload();
            });
        }
    </script>

    <!-- MOTOR INTERNO DE RESPALDO ANTE NAVEGADORES QUE NO COMPRENDEN PWA DE FORMA ASÍNCRONA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=2026_Módulos', { scope: './' })
                    .then(reg => {
                        console.log("Service Worker Registrado Eficientemente con Fuerza de Caché V2026.");
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            if (installingWorker) {
                                installingWorker.onstatechange = () => {
                                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        console.log("Nueva versión detectada. Forzando refresco de memoria.");
                                        caches.keys().then(names => {
                                            for (let name of names) caches.delete(name);
                                        });
                                    }
                                };
                            }
                        };
                    })
                    .catch(err => console.error("Fallo controlado en el registro del SW Adaptativo: ", err));
            });
        }
    </script>
</body>
</html>
