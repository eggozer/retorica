<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0a0f1d;
            --bg-sidebar: #111827;
            --accent-blue: #1e62ec;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR / BIBLIOTECA COMPACTA */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 110;
            flex-shrink: 0;
        }

        .sidebar.hidden {
            transform: translateX(-320px);
            margin-right: -320px;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* CORRECCIÓN PUNTO 2: ICONO DEL SOL ALINEADO E IMAGEN DE LOGO */
        .brand-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #ffca28;
            line-height: 1;
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        /* CORRECCIÓN PUNTO 1: PESTAÑA VERTICAL REUBICADA A LA MITAD DERECHA */
        .toggle-sidebar-pestaña {
            position: absolute;
            top: 50%;
            right: -24px;
            transform: translateY(-50%);
            width: 24px;
            height: 60px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-left: none;
            border-radius: 0 8px 8px 0;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            z-index: 120;
            box-shadow: 3px 0 6px rgba(0,0,0,0.3);
        }

        .document-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* TARJETAS DELGADAS EXCLUSIVAS DE NUEVO DISEÑO */
        .doc-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        .doc-item.active {
            background: rgba(30, 98, 236, 0.08);
            border-color: var(--accent-blue);
        }

        .doc-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-preview {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* PASARELA HORIZONTAL CON DESLIZAMIENTO */
        .doc-actions-pasarela {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        
        .doc-actions-pasarela::-webkit-scrollbar {
            display: none;
        }

        .btn-action-mini {
            padding: 6px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-action-mini.primary { background: var(--accent-blue); border-color: transparent; }
        .btn-action-mini.danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border-color: transparent; }

        .metadata-container {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 6px;
            border-radius: 4px;
            margin-top: 6px;
            display: none;
            border: 1px dashed var(--border-color);
        }

        /* CUERPO CENTRAL DE TRABAJO */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .top-toolbar {
            height: 60px;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0f172a;
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        select, .btn-top {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        #btn-main-guardar {
            background: var(--accent-blue);
            font-weight: bold;
            border-color: transparent;
        }

        .editor-wrapper {
            flex-grow: 1;
            padding: 16px;
            background: var(--bg);
            position: relative;
        }

        #editor {
            width: 100%;
            height: calc(100% - 25px);
            background: transparent;
            border: none;
            resize: none;
            color: var(--text-main);
            font-size: 1.15rem;
            line-height: 1.6;
            outline: none;
        }

        .stats-bar {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding-top: 4px;
            border-top: 1px solid var(--border-color);
        }

        /* SECCIÓN INFERIOR COMPACTA DE LA HAMBURGUESA */
        .sidebar-footer-menu {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.15);
        }

        .footer-menu-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-buttons-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-footer-action {
            width: 100%;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            cursor: pointer;
            text-align: left;
        }
        
        .btn-footer-action:hover {
            background: rgba(255,255,255,0.08);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border-left: 4px solid var(--accent-blue);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 6px;
            transform: translateY(150%);
            transition: transform 0.2s ease;
            z-index: 2000;
            font-size: 0.9rem;
        }

        .toast.show { transform: translateY(0); }
    </style>
</head>

<body>

    <div class="sidebar" id="sidebar">
        <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña">◀</div>
        
        <div class="sidebar-header">
            <div class="brand-container">
                <div class="brand-icon-wrapper">☀️</div>
                <span class="brand-title">BIBLIOTECA</span>
            </div>
            <button id="btn-nuevo" style="background:#ffca28; color:#0a0f1d; font-weight:bold; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">➕</button>
        </div>

        <div class="document-list" id="document-list">
            </div>

        <div class="sidebar-footer-menu">
            <div class="footer-menu-title">Guardar como:</div>
            <div class="footer-buttons-container">
                <button class="btn-footer-action" id="export-pdf">1.- PDF</button>
                <button class="btn-footer-action" id="export-pdf-edit">2.- PDF Editable</button>
                <button class="btn-footer-action" id="export-doc">3.- DOC</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="top-toolbar">
            <div class="toolbar-group">
                <select id="cambiarPaleta">
                    <option value="oscuro">🌙 Oscuro</option>
                    <option value="claro">☀️ Claro</option>
                </select>
                <select id="app-lang">
                    <option value="es">App: ES</option>
                </select>
                <select id="voice-lang">
                    <option value="es-MX">Voz: MX</option>
                </select>
            </div>
            <div class="toolbar-group">
                <button class="btn-top" id="btn-mic">🎙️ MIC</button>
                <button class="btn-top" id="btn-lectura">🔊 LEER</button>
                <button class="btn-top" id="btn-main-guardar">GUARDAR</button>
            </div>
        </div>

        <div class="editor-wrapper">
            <textarea id="editor" placeholder="Escribe aquí tu guion o nota de Megacable..."></textarea>
            <div class="stats-bar" id="stats-bar">Caracteres: 0 | Palabras: 0 | Líneas: 0</div>
        </div>
    </div>

    <div class="toast" id="toast-notif">Operación exitosa</div>

    <script>

// --- BASE DE DATOS INDEXEDDB COMPATIBLE ---
        const DB_NAME = "RetoricaDB";
        const DB_VERSION = 1;
        const STORE_NAME = "documentos";
        let db;
        let currentDocId = null;

        function initDB() {
            const request = indexedDB.open(DB_NAME, DB_VERSION);

            request.onerror = function(event) {
                console.error("Error al abrir IndexedDB:", event.target.error);
                showToast("Error de acceso al almacenamiento");
            };

            request.onsuccess = function(event) {
                db = event.target.result;
                renderLib();
            };

            request.onupgradeneeded = function(event) {
                const dbInstance = event.target.result;
                if (!dbInstance.objectStoreNames.contains(STORE_NAME)) {
                    dbInstance.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                }
            };
        }

        // --- RENDERIZADO DE PLANTILLAS DELGADAS CON CONTENIDO REAL Y PASARELA ---
        function renderLib() {
            if (!db) return;
            const lista = document.getElementById('document-list');
            lista.innerHTML = "";

            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.openCursor(null, "prev"); // Documentos más recientes primero

            request.onsuccess = function(event) {
                const cursor = event.target.result;
                if (cursor) {
                    const docData = cursor.value;
                    const item = document.createElement('div');
                    item.className = `doc-item ${docData.id === currentDocId ? 'active' : ''}`;
                    item.dataset.id = docData.id;

                    // CORRECCIÓN PUNTO 1: Extraer primer renglón como Título y siguientes 2 o 3 como texto real
                    const lineas = docData.texto.split('\n').filter(l => l.trim() !== "");
                    const tituloNota = lineas[0] || "Nota sin título";
                    const vistaPreviaNota = lineas.slice(1, 4).join(' ') || "Sin contenido adicional...";

                    // CORRECCIÓN PUNTO 2: Maquetado delgado con botones en pasarela y botón detalles
                    item.innerHTML = `
                        <div class="doc-title">${tituloNota}</div>
                        <div class="doc-preview">${vistaPreviaNota}</div>
                        
                        <div class="doc-actions-pasarela">
                            <button class="btn-action-mini primary" onclick="event.stopPropagation(); cargarDocEnEditor(${docData.id});">Abrir</button>
                            <button class="btn-action-mini" onclick="event.stopPropagation(); copiarTextoNota(${docData.id});">Copiar</button>
                            <button class="btn-action-mini" onclick="event.stopPropagation(); compartirNota(${docData.id});">Compartir</button>
                            <button class="btn-action-mini" onclick="event.stopPropagation(); alternarMetadataDetalles(${docData.id});">ℹ️ Detalles</button>
                            <button class="btn-action-mini danger" onclick="event.stopPropagation(); borrarDoc(${docData.id});">Borrar</button>
                        </div>
                        
                        <div class="metadata-container" id="meta-${docData.id}">
                            <div><strong>Creado:</strong> ${docData.fechaCreacion || docData.fecha || 'No registrada'}</div>
                            <div><strong>Modificado:</strong> ${docData.fechaModificacion || docData.fecha || 'No registrada'}</div>
                        </div>
                    `;

                    lista.appendChild(item);
                    cursor.continue();
                }
            };
        }

        // --- ACCIONES INTERNAS DE LA BIBLIOTECA ---
        function cargarDocEnEditor(id) {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get(id);

            request.onsuccess = function(event) {
                const doc = event.target.result;
                if (doc) {
                    currentDocId = doc.id;
                    document.getElementById('editor').value = doc.texto;
                    actualizarContadores();
                    renderLib();
                    showToast("Nota cargada en el editor");
                }
            };
        }

        function alternarMetadataDetalles(id) {
            const contenedor = document.getElementById(`meta-${id}`);
            if (contenedor.style.display === "block") {
                contenedor.style.display = "none";
            } else {
                contenedor.style.display = "block";
            }
        }

        function copiarTextoNota(id) {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get(id);

            request.onsuccess = function(event) {
                const doc = event.target.result;
                if (doc && doc.texto) {
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(doc.texto).then(() => showToast("Copiado al portapapeles"));
                    } else {
                        const aux = document.createElement("textarea");
                        aux.value = doc.texto;
                        document.body.appendChild(aux);
                        aux.select();
                        document.execCommand("copy");
                        document.body.removeChild(aux);
                        showToast("Copiado (Retrocompatible)");
                    }
                }
            };
        }

        function compartirNota(id) {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get(id);

            request.onsuccess = function(event) {
                const doc = event.target.result;
                if (doc && doc.texto) {
                    if (navigator.share) {
                        navigator.share({ title: 'Retórica Guion', text: doc.texto }).catch(console.error);
                    } else {
                        showToast("Compartir no soportado en este navegador");
                    }
                }
            };
        }

// --- CORRECCIÓN PUNTO 4: SISTEMA DE DESCARGA LOCAL CONTROLADA POR CÓDIGO ---
        function obtenerNombreArchivo() {
            const texto = document.getElementById('editor').value.trim();
            if (!texto) return "guion_megacable";
            return texto.split('\n')[0].replace(/[\\/:*?"<>|]/g, "").substring(0, 25) || "guion_megacable";
        }

        function procesarDescargaInmediata(contenido, tipoMime, extension) {
            const blob = new Blob([contenido], { type: tipoMime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${obtenerNombreArchivo()}.${extension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            showToast(`Descargado local: ${extension.toUpperCase()}`);
        }

        function guardarYDescargarHtmlDirecto() {
            const texto = document.getElementById('editor').value;
            if (!texto.trim()) return showToast("Editor vacío, nada que guardar");

            const transaction = db.transaction([STORE_NAME], "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            const fechaActual = new Date().toLocaleString();

            if (currentDocId === null) {
                const nuevoDocData = { texto: texto, fechaCreacion: fechaActual, fechaModificacion: fechaActual };
                const request = store.add(nuevoDocData);
                request.onsuccess = function(e) {
                    currentDocId = e.target.result;
                    ejecutarDescargaHtmlPura(texto);
                };
            } else {
                const requestObtener = store.get(currentDocId);
                requestObtener.onsuccess = function(e) {
                    const data = e.target.result;
                    data.texto = texto;
                    data.fechaModificacion = fechaActual;
                    store.put(data).onsuccess = function() {
                        ejecutarDescargaHtmlPura(texto);
                    };
                };
            }
        }

        function ejecutarDescargaHtmlPura(contenido) {
            const estructura = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${obtenerNombreArchivo()}</title><style>body{font-family:sans-serif;padding:25px;line-height:1.6;}</style></head><body><p>${contenido.replace(/\n/g, '<br>')}</p></body></html>`;
            // Descarga directa controlada por código puro sin modales de selección de ruta
            procesarDescargaInmediata(estructura, 'text/html;charset=utf-8', 'html');
            renderLib();
        }

        document.getElementById('btn-main-guardar').addEventListener('click', guardarYDescargarHtmlDirecto);

        // --- BOTONERA DE EXPORTACIÓN DEL MENÚ INFERIOR DE LA HAMBURGUESA ---
        document.getElementById('export-pdf').addEventListener('click', () => {
            const texto = document.getElementById('editor').value;
            if(!texto.trim()) return showToast("Editor vacío");
            
            const elementoRaiz = document.createElement('div');
            elementoRaiz.style.padding = '25px';
            elementoRaiz.style.color = '#000000';
            elementoRaiz.innerHTML = texto.replace(/\n/g, '<br>');
            
            const opcionesPdf = {
                margin: 15,
                filename: `${obtenerNombreArchivo()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opcionesPdf).from(elementoRaiz).save().then(() => {
                showToast("PDF generado de forma local");
            });
        });

        document.getElementById('export-pdf-edit').addEventListener('click', () => {
            const contenido = document.getElementById('editor').value;
            const pdfEditableEstructura = `<html><body style="padding:25px;"><form><textarea style="width:100%;height:90vh;font-size:16px;">${contenido}</textarea></form></body></html>`;
            procesarDescargaInmediata(pdfEditableEstructura, 'text/html;charset=utf-8', 'pdf.html');
        });

        document.getElementById('export-doc').addEventListener('click', () => {
            const contenido = document.getElementById('editor').value;
            const docEstructura = `<html xmlns:w='urn:schemas-microsoft-com:office:word'><body>${contenido.replace(/\n/g, '<p></p>')}</body></html>`;
            procesarDescargaInmediata(docEstructura, 'application/msword;charset=utf-8', 'doc');
        });


        // --- CORRECCIÓN PUNTO 1: CONTROL DE PESTAÑA Y GESTOS EN ANDROID 5 ---
        function configurarGestosPestaña() {
            const btnPestaña = document.getElementById('btn-toggle-pestaña');
            const sidebarElement = document.getElementById('sidebar');

            btnPestaña.addEventListener('click', () => {
                sidebarElement.classList.toggle('hidden');
                btnPestaña.textContent = sidebarElement.classList.contains('hidden') ? "▶" : "◀";
            });

            // Lógica táctil complementaria para deslizar con los dedos
            let startX = 0;
            sidebarElement.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
            sidebarElement.addEventListener('touchend', (e) => {
                let diffX = startX - e.changedTouches[0].clientX;
                if (diffX > 70 && !sidebarElement.classList.contains('hidden')) {
                    sidebarElement.classList.add('hidden'); // Ocultar al deslizar a la izquierda
                    btnPestaña.textContent = "▶";
                }
            }, { passive: true });
        }


        // --- RECONOCIMIENTO DE VOZ CON REARMADO DE 6S ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reconocimiento;
        let timerSilencio;
        let grabando = false;

        if (Recognition) {
            reconocimiento = new Recognition();
            reconocimiento.continuous = true;
            reconocimiento.interimResults = false;

            reconocimiento.onstart = () => {
                grabando = true;
                document.getElementById('btn-mic').textContent = "🛑 GRABANDO";
                resetearTimerSilencio();
            };

            reconocimiento.onresult = (e) => {
                const transcripcion = e.results[e.resultIndex][0].transcript;
                const txtarea = document.getElementById('editor');
                txtarea.value += (txtarea.value ? ' ' : '') + transcripcion;
                actualizarContadores();
                resetearTimerSilencio();
            };

            reconocimiento.onend = () => {
                grabando = false;
                document.getElementById('btn-mic').textContent = "🎙️ MIC";
                clearTimeout(timerSilencio);
            };
        }

        function resetearTimerSilencio() {
            clearTimeout(timerSilencio);
            timerSilencio = setTimeout(() => {
                if (grabando) {
                    reconocimiento.stop();
                    showToast("Micrófono cerrado por inactividad");
                }
            }, 6000);
        }

        document.getElementById('btn-mic').addEventListener('click', () => {
            if (!reconocimiento) return showToast("Dictado no soportado en este navegador");
            if (grabando) {
                reconocimiento.stop();
            } else {
                reconocimiento.lang = document.getElementById('voice-lang').value;
                reconocimiento.start();
            }
        });


        // --- SÍNTESIS DE VOZ Y CONTADORES ORIGINALES ---
        document.getElementById('btn-lectura').addEventListener('click', () => {
            const texto = document.getElementById('editor').value;
            if (!texto.trim()) return showToast("Nada que leer");
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const lectura = new SpeechSynthesisUtterance(texto);
                lectura.lang = document.getElementById('voice-lang').value;
                window.speechSynthesis.speak(lectura);
            }
        });

        function actualizarContadores() {
            const texto = document.getElementById('editor').value;
            const chars = texto.length;
            const palabras = texto.trim() === "" ? 0 : texto.trim().split(/\s+/).length;
            const lineas = texto === "" ? 0 : texto.split('\n').length;
            document.getElementById('stats-bar').textContent = `Caracteres: ${chars} | Palabras: ${palabras} | Líneas: ${lineas}`;
        }

        document.getElementById('editor').addEventListener('input', actualizarContadores);


        // --- ELIMINAR NOTA Y NUEVO LIENZO ---
        function borrarDoc(id) {
            if (!confirm("¿Deseas eliminar este guion permanentemente?")) return;
            const transaction = db.transaction([STORE_NAME], "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            store.delete(id).onsuccess = function() {
                if (currentDocId === id) nuevoDoc();
                renderLib();
                showToast("Documento eliminado");
            };
        }

        function nuevoDoc() {
            currentDocId = null;
            document.getElementById('editor').value = "";
            actualizarContadores();
            renderLib();
            showToast("Nuevo lienzo limpio");
        }

        document.getElementById('btn-nuevo').addEventListener('click', nuevoDoc);

        function showToast(msg) {
            const toast = document.getElementById('toast-notif');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // --- SERVICE WORKER DE LA PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Retórica PWA activa de forma local', reg.scope))
                    .catch(err => console.warn('SW aviso:', err));
            });
        }
    </script>
</body>
</html>
