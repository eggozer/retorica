<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retórica - Sistema Profesional</title>
    <link rel="manifest" href="./manifest.json?v=2026_GOD_MODE">
    <link rel="icon" type="image/png" href="https://eggozer.github.io/retorica/icon-192.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #0f111a; --bg-sidebar: #161925; --bg-card: #1f2335;
            --accent: #e2e8f0; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #e53e3e; --btn-3d-bg: #2d3244;
            --btn-shadow: #11131c;
        }
        body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #2d3748; --text-main: #1a202c; --text-muted: #4a5568;
            --border: #cbd5e0; --danger: #c53030; --btn-3d-bg: #cbd5e0;
            --btn-shadow: #a0aec0;
        }
        body.light-theme .template-text-title { color: #1a202c !important; font-weight: bold; }
        body.light-theme .btn-delete-template { background: #c53030 !important; color: #ffffff !important; }
        
        * { box-sizing: border-box; -webkit-user-select: text; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-main); font-family: 'Segoe UI', Tahoma, Arial, sans-serif; overflow: hidden; color: var(--text-main); }
        
        /* HEADER PRINCIPAL */
        header { background: var(--bg-sidebar); height: 56px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); z-index: 1000; position: relative; }
        .burger-btn { background: none; border: none; color: var(--text-main); font-size: 1.4rem; cursor: pointer; margin-right: 12px; }
        
        /* MÁSCARA CIRCULAR PERFECTA PARA EL ICONO */
        .icon-mask-container { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; background: transparent; flex-shrink: 0; }
        .icon-mask-container img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.4); }

        .app-title { font-size: 1.15rem; font-weight: bold; letter-spacing: 0.5px; flex-grow: 1; }
        
        /* BARRA DE HERRAMIENTAS HORIZONTAL */
        .slider-toolbar { display: flex; overflow-x: auto; overflow-y: hidden; white-space: nowrap; padding: 8px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); gap: 8px; -webkit-overflow-scrolling: touch; }
        .slider-toolbar::-webkit-scrollbar { display: none; }
        
        /* BOTONES CON RELIEVE 3D */
        .btn-3d { display: inline-block; background: var(--btn-3d-bg); border: none; border-radius: 6px; padding: 6px 14px; font-size: 0.78rem; font-weight: bold; color: var(--text-main); text-transform: uppercase; cursor: pointer; box-shadow: 0 3px 0 var(--btn-shadow); transition: all 0.1s ease; margin-bottom: 3px; vertical-align: middle; }
        .btn-3d:active { transform: translateY(3px); box-shadow: none; }
        .btn-rect { min-width: 50px; text-align: center; }
        .recording-active { background: #ff3b30 !important; color: #fff !important; box-shadow: 0 3px 0 #990000 !important; }
        .reading-active { background: #00d2ff !important; color: #000 !important; box-shadow: 0 3px 0 #0088cc !important; }
        
        /* CAPA DE ACCESO (AUTH) */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #090a0f; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #131520; border: 2px solid #222638; border-radius: 12px; width: 100%; max-width: 360px; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #2d3748; background: #0f111a; color: #fff; font-size: 0.9rem; text-align: center; }
        .oauth-box { display: flex; justify-content: space-between; gap: 8px; margin-top: 15px; }
        .btn-oauth { flex: 1; padding: 8px; font-size: 0.7rem; border-radius: 6px; font-weight: bold; color: #fff; border: none; cursor: pointer; }
        
        /* MENÚ HAMBURGUESA LATERAL CORREGIDO */
        .sidebar-menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: var(--bg-sidebar); border-right: 1px solid var(--border); transition: left 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); z-index: 1500; display: flex; flex-direction: column; padding: 0; box-sizing: border-box; }
        .sidebar-menu.active { left: 0; }
        .sidebar-scroll-content { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
        .sidebar-header-brand { display: flex; align-items: center; font-weight: bold; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }

        /* AREA DE EDICIÓN UNIFICADA */
        .main-view { height: calc(100vh - 156px); overflow: hidden; position: relative; }
        .editor-scroll-container { width: 100%; height: 100%; overflow-y: auto; padding: 20px; }
        .unified-container { width: 100%; min-height: 100%; border: 1px solid transparent; display: flex; flex-direction: column; cursor: text; }
        .doc-title { width: 100%; background: transparent; border: none; font-size: 1.4rem; font-weight: bold; color: var(--text-main); margin-bottom: 15px; outline: none; border-bottom: 1px solid transparent; }
        .doc-title:focus { border-bottom: 1px solid var(--border); }
        .rich-editor-body { width: 100%; flex-grow: 1; background: transparent; border: none; color: var(--text-main); font-size: 1.05rem; line-height: 1.6; outline: none; word-wrap: break-word; min-height: 300px; }
        
        footer { height: 35px; background: var(--bg-sidebar); padding: 0 15px; font-size: 0.65rem; display: flex; align-items: center; gap: 15px; border-top: 1px solid var(--border); color: var(--text-muted); font-weight: bold; z-index: 900; position: relative; }
        .toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.78rem; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 2500; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="auth-overlay" id="auth-layer-screen">
        <div class="auth-card">
            <div style="display:flex; justify-content:center; align-items:center; margin-bottom:12px;">
                <div class="icon-mask-container"><img src="https://eggozer.github.io/retorica/icon-192.png" alt="logo"></div>
                <span id="auth-title-label" style="font-weight:bold; color:#fff; font-size:1rem;">SISTEMA RETÓRICA</span>
            </div>
            <input type="text" id="auth-input-uid" class="auth-input" placeholder="Usuario / Email">
            <input type="password" id="auth-input-pass" class="auth-input" placeholder="Contraseña o PIN">
            
            <button onclick="RetoricaAuth.submitDirectAuth()" class="btn-3d" id="btn-submit-auth" style="width:100%; padding:10px; margin-bottom:10px;">INGRESAR AL SISTEMA</button>
            <button onclick="RetoricaAuth.triggerEmergencyCode()" class="btn-3d" style="width:100%; padding:8px; font-size:0.7rem; background:#222638; margin-bottom:12px;">SOLICITAR LINK / CÓDIGO EMAIL</button>
            
            <a href="#" onclick="RetoricaAuth.toggleMode()" id="auth-toggle-link" style="color:var(--text-muted); font-size:0.75rem; text-decoration:none; display:block; margin-bottom:15px;">¿Equipo nuevo? Registrar cuenta</a>
            
            <div id="auth-divider-line" style="display:flex; align-items:center; margin:10px 0; color:var(--text-muted); font-size:0.65rem;"><hr style="flex:1; border-color:#222638;">&nbsp; VINCULAR DISPOSITIVO &nbsp;<hr style="flex:1; border-color:#222638;"></div>
            <div class="oauth-box" id="oauth-container">
                <button onclick="RetoricaAuth.selectOAuth('google')" id="btn-oauth-google" class="btn-oauth" style="background:#db4437;">GOOGLE</button>\n                <button onclick="RetoricaAuth.selectOAuth('whatsapp')" id="btn-oauth-whatsapp" class="btn-oauth" style="background:#25d366;">WHATSAPP</button>
                <button onclick="RetoricaAuth.selectOAuth('facebook')" id="btn-oauth-facebook" class="btn-oauth" style="background:#3b5998;">FACEBOOK</button>
            </div>
        </div>
    </div>

    <header>
        <button class="burger-btn" onclick="RetoricaUI.toggleSidebar()">☰</button>
        <div class="icon-mask-container">
            <img src="https://eggozer.github.io/retorica/icon-192.png" alt="Icon">
        </div>
        <div class="app-title">Retórica</div>
        <button class="btn-3d btn-rect" onclick="RetoricaI18n.openSelector()" style="padding:6px 10px; font-size:0.7rem;">🌐 IDIOMA</button>
    </header>

    <div class="slider-toolbar">
        <button id="btn-submit-main" class="btn-3d btn-rect" onclick="RetoricaStorage.save()"><span id="lbl-tool-save">✓</span></button>
        <button id="btn-new-main" class="btn-3d btn-rect" onclick="RetoricaStorage.clearCanvas()"><span id="lbl-tool-new">+</span></button>
        <button id="btn-mic-main" class="btn-3d" onclick="RetoricaAudio.toggleMic()"><span id="lbl-tool-mic">Dictado</span></button>
        <button id="btn-play-main" class="btn-3d" onclick="RetoricaAudio.play()"><span id="lbl-tool-read">Lectura</span></button>
        <button id="btn-stop-main" class="btn-3d btn-rect" onclick="RetoricaAudio.stop()"><span id="lbl-tool-stop">■</span></button>
        <button id="btn-vmsg-main" class="btn-3d" onclick="RetoricaAudio.produceVoiceMessage()"><span id="lbl-tool-vmsg">🔴 Rec</span></button>
        <button id="btn-tts-main" class="btn-3d btn-rect" onclick="RetoricaAudio.convertTextToVoiceFile()"><span id="lbl-tool-tts">📝🔊</span></button>
        <button class="btn-3d" onclick="RetoricaUI.toggleTheme()">🌓</button>
        
        <select onchange="RetoricaUI.execEditorCmd('fontName', this.value)" class="btn-3d" style="background:var(--btn-3d-bg); color:var(--text-main); font-size:0.75rem; border:none; padding:4px;"><option value="Arial">Arial</option><option value="Courier New">Courier</option><option value="Georgia">Georgia</option><option value="Times New Roman">Times</option></select>
        <select onchange="RetoricaUI.execEditorCmd('fontSize', this.value)" class="btn-3d" style="background:var(--btn-3d-bg); color:var(--text-main); font-size:0.75rem; border:none; padding:4px;"><option value="3">Medio</option><option value="2">Chico</option><option value="5">Grande</option><option value="7">Extra</option></select>
        <select onchange="RetoricaUI.execEditorCmd('foreColor', this.value)" class="btn-3d" style="background:var(--btn-3d-bg); color:var(--text-main); font-size:0.75rem; border:none; padding:4px;"><option value="#f3f4f6">Blanco</option><option value="#00ffcc">Esmeralda</option><option value="#ff3b30">Rojo</option><option value="#00d2ff">Cian</option><option value="#1a202c">Oscuro</option></select>
        
        <button class="btn-3d" onclick="RetoricaUI.insertTable()">➕ 📊 TABLA</button>
        <button class="btn-3d" onclick="RetoricaUI.insertLocalImage()">➕ 🖼️ IMG</button>
        
        <button class="btn-3d btn-rect" onclick="RetoricaUI.adjustZoom(0.1)">🔎 +</button>
        <button class="btn-3d btn-rect" onclick="RetoricaUI.adjustZoom(-0.1)">🔎 -</button>
    </div>

    <div class="sidebar-menu" id="sidebar">
        <div class="sidebar-scroll-content">
            <div class="sidebar-header-brand">
                <div class="icon-mask-container"><img src="https://eggozer.github.io/retorica/icon-192.png" alt="logo"></div>
                <span>Retórica Panel</span>
            </div>
            
            <button id="btn-toggle-cloud" class="btn-3d" onclick="RetoricaStorage.toggleSyncMode()" style="width:100%; margin-bottom:15px; padding:10px;">MODO LOCAL 📱</button>

            <div style="color:var(--text-muted); font-size:0.7rem; font-weight:bold; margin-bottom:6px; text-transform:uppercase;">Guardar Como:</div>
            <div style="display:flex; overflow-x:auto; gap:6px; padding-bottom:10px; margin-bottom:15px; -webkit-overflow-scrolling:touch;">
                <button onclick="RetoricaUI.expPDFPlano()" class="btn-3d" style="padding:6px 10px; font-size:0.7rem;">PDF Plano</button>
                <button onclick="RetoricaUI.expPDFEditable()" class="btn-3d" style="padding:6px 10px; font-size:0.7rem;">PDF Edit</button>
                <button onclick="RetoricaUI.expDOC()" class="btn-3d" style="padding:6px 10px; font-size:0.7rem;">Word .Doc</button>
            </div>

            <div style="margin-bottom:10px; font-size:0.75rem; font-weight:bold; color:var(--text-muted);">ARCHIVO LOCAL:</div>
            <input type="file" id="file-uploader-input" onchange="RetoricaStorage.importLocalFile(event)" style="display:none;">
            <button onclick="document.getElementById('file-uploader-input').click()" class="btn-3d" style="width:100%; font-size:0.7rem; margin-bottom:15px; padding:8px;">📥 IMPORTAR FILE (.TXT / .HTML)</button>

            <div style="margin-bottom:10px; font-size:0.75rem; font-weight:bold; color:var(--text-muted);">BIBLIOTECA DE GUIONES:</div>
            <div id="docs-list-render"></div>
            
            <div style="margin:20px 0 10px 0; font-size:0.75rem; font-weight:bold; color:var(--text-muted); border-top:1px solid var(--border); padding-top:15px;">ADMINISTRACIÓN DE EQUIPOS:</div>
            <div id="admin-users-list"></div>
        </div>
        
        <div style="padding:15px; border-top:1px solid var(--border); background:var(--bg-card); display:flex; align-items:center; margin-top:auto;">
            <div style="font-size:0.7rem; max-width:65%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">User: <span id="display-user-name" style="color:var(--accent); font-weight:bold;">Anon</span></div>
            <button onclick="RetoricaAuth.logout()" style="color:var(--danger); background:transparent; border:none; font-size:0.8rem; font-weight:bold; cursor:pointer; margin-left:auto;" id=\"lbl-side-logout\">SALIR</button>
        </div>
    </div>

    <main class="main-view">
        <div class="editor-scroll-container" id="viewport-ctx">
            <div id="zoom-wrapper">
                <div class="unified-container" id="unified-sel-container">
                    <input type="text" id="editor-title" class="doc-title" placeholder="Título del Guion...">
                    <div id="editor-body" class="rich-editor-body" contenteditable="true" placeholder="Escribe o dicta aquí tu retórica..."></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <span id="count-chars">CHARS: 0</span><span id="count-words">WORDS: 0</span><span id="count-lines">LINES: 1</span>
        <span style="margin-left:auto; color:var(--text-muted);">V.2026.MODULAR_PRO</span>
    </footer>

    <div id="toast-notif" class="toast"></div>

    <script src="./auth.js?v=GOD_MODE"></script>
    <script src="./idiomas.js?v=GOD_MODE"></script>
    <script src="./audio.js?v=GOD_MODE"></script>
    <script src="./storage.js?v=GOD_MODE"></script>
    <script src="./main.js?v=GOD_MODE"></script>
</body>
</html>
