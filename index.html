<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retórica - Sistema Profesional</title>
    <link class="manifest" href="./manifest.json?v=2026_GOD_MODE">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-main: #0f111a; --bg-sidebar: #161925; --bg-card: #1f2335;
            --accent: #00ffcc; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #ff3b30; --btn-3d-bg: #2d3244;
            --electric-blue: #00d2ff; --royal-green: #2ecc71;
        }
        body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #00a884; --text-main: #1a202c; --text-muted: #718096;
            --border: #cbd5e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background: var(--bg-main); color: var(--text-main); }

        /* --- ICONO DEL SOL: TRIPLE CÍRCULO GIRATORIO REDUCIDO --- */
        .sol-container { width: 34px; height: 34px; position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin: 0 10px; }
        .sol-engine {
            width: 14px; height: 14px;
            background: radial-gradient(circle, #ffe082 10%, #ffca28 60%, #f57c00 100%);
            border-radius: 50%; position: relative;
            box-shadow: 0 0 8px rgba(255, 202, 40, 0.5);
        }
        .sol-container::before {
            content: ''; position: absolute; width: 22px; height: 22px;
            border: 2px solid var(--electric-blue); border-radius: 50%;
            border-top-color: transparent; animation: spin-sol 3s linear infinite;
        }
        .sol-container::after {
            content: ''; position: absolute; width: 28px; height: 28px;
            border: 3.5px double var(--text-muted); border-radius: 50%;
            border-bottom-color: transparent; animation: spin-sol 5s linear infinite reverse;
        }
        .sol-crown-3 {
            position: absolute; width: 36px; height: 36px;
            border: 2px dashed var(--royal-green); border-radius: 50%;
            animation: spin-sol 7s linear infinite;
        }
        @keyframes spin-sol { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* INTERFAZ DE ACCESO REAL */
        .auth-gate { position: fixed; inset: 0; background: var(--bg-main); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--bg-sidebar); padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
        .input-ret { width: 100%; padding: 14px; margin: 10px 0; background: var(--bg-main); border: 1px solid var(--border); border-radius: 12px; color: #fff; text-align: center; font-size: 1rem; outline: none; }
        .input-ret:focus { border-color: var(--accent); }
        .btn-social { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 0.7rem; color: #fff; text-transform: uppercase; }
        .grid-social { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        
        /* HERRAMIENTAS Y DISEÑO ACTIVO */
        .header-app { height: 60px; background: var(--bg-sidebar); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); }
        .toolbar-scroll { height: 75px; background: var(--bg-sidebar); display: flex; align-items: center; overflow-x: auto; padding: 0 15px; gap: 15px; border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
        .control-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
        .label-unit { font-size: 0.65rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-3d { background: var(--btn-3d-bg); color: #fff; border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; min-height: 36px; display: flex; align-items: center; justify-content: center; }
        .btn-3d:active { transform: translateY(1px); }

        .recording-active { animation: pulse-red 1.5s infinite; background: #ff3b30 !important; }
        .reading-active { animation: pulse-blue 1.5s infinite; background: var(--electric-blue) !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,59,48,0); } 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); } }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(0,210,255,0.7); } 70% { box-shadow: 0 0 0 10px rgba(0,210,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,210,255,0); } }

        /* SIDEBAR Y CONTENEDOR */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--bg-sidebar); z-index: 950; border-right: 1px solid var(--border); transition: 0.3s ease; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .editor-scroll-container { width: 100%; height: 100%; overflow-y: auto; padding: 20px; }
        .doc-title { width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; outline: none; }
        .textarea-main { width: 100%; flex: 1; min-height: 350px; background: transparent; border: none; color: var(--text-main); font-size: 1.05rem; line-height: 1.6; resize: none; outline: none; }
        
        /* MODO DIOS */
        .admin-view { position: fixed; inset: 0; background: #060810; z-index: 10000; padding: 25px; overflow-y: auto; display: none; }
        .user-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); align-items: center; }
        .toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: bold; transition: 0.3s ease; z-index: 10005; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .hidden { display: none !important; }
        .zoom-indicator-tag { font-size: 0.65rem; color: var(--accent); font-weight: bold; margin-top: 2px; }
    </style>
</head>
<body class="dark-theme">

    <div id="screen-auth" class="auth-gate">
        <div class="auth-box">
            <div style="display:flex; justify-content:center; margin-bottom:25px;">
                <div class="sol-container"><div class="sol-engine"></div><div class="sol-crown-3"></div></div>
            </div>
            <h2 id="ui-header-title" style="letter-spacing:4px; color:var(--accent); margin-bottom:15px;">RETÓRICA</h2>
            <div id="oauth-selector">
                <div class="grid-social">
                    <button class="btn-social" style="background:#db4437" onclick="RetoricaAuth.selectOAuth('Google')">Google</button>
                    <button class="btn-social" style="background:#4267b2" onclick="RetoricaAuth.selectOAuth('Facebook')">Face</button>
                    <button class="btn-social" style="background:#25d366" onclick="RetoricaAuth.selectOAuth('WhatsApp')">WhatsApp</button>
                </div>
            </div>
            <input type="text" id="auth-id" class="input-ret" placeholder="Email o Teléfono">
            <div id="pass-area">
                <input type="password" id="auth-pass" class="input-ret" placeholder="Contraseña de Resguardo">
            </div>
            <button id="btn-submit-auth" onclick="RetoricaAuth.process()" style="width:100%; padding:14px; border-radius:12px; background:var(--accent); border:none; font-weight:bold; cursor:pointer; margin-top:10px;">CONTINUAR</button>
            <p id="auth-toggle-mode" style="font-size:0.75rem; margin-top:15px; color:var(--accent); cursor:pointer; text-decoration:underline;" onclick="RetoricaAuth.switchMode()">¿No tienes cuenta? Regístrate aquí</p>
        </div>
    </div>

    <div id="god-mode-panel" class="admin-view">
        <h2 style="color:var(--accent); letter-spacing:2px;">⚡ MODO DIOS: PANEL SUPREMO</h2>
        <button onclick="RetoricaAdmin.close()" class="btn-3d" style="float:right; background:var(--danger);">CERRAR</button>
        <div id="admin-user-list" style="margin-top:50px;"></div>
    </div>

    <header class="header-app">
        <div onclick="RetoricaUI.toggleSidebar()" style="font-size:1.4rem; cursor:pointer; padding:5px;">☰</div>
        <div class="sol-container"><div class="sol-engine"></div><div class="sol-crown-3"></div></div>
        <h1 style="font-size:1.1rem; letter-spacing:3px; color:var(--accent); font-weight:900;">RETÓRICA</h1>
        <div onclick="RetoricaAdmin.trigger()" style="margin-left:auto; opacity:0.15; cursor:pointer; padding:10px;">⚡</div>
    </header>

    <div class="toolbar-scroll">
        <div class="control-unit"><span class="label-unit" id="lbl-tool-save">Guardar</span><button class="btn-3d" id="btn-save-main" onclick="RetoricaStorage.save()">✓</button></div>
        <div class="control-unit"><span class="label-unit" id="lbl-tool-new">Nuevo</span><button class="btn-3d" onclick="RetoricaUI.clearEditor()">➕</button></div>
        <div class="control-unit"><span class="label-unit" id="lbl-tool-mic">Dictado</span><button class="btn-3d" id="btn-mic-main" onclick="RetoricaAudio.toggleMic()">🎙️</button></div>
        <div class="control-unit">
            <span class="label-unit" id="lbl-tool-read">Lectura</span>
            <div style="display:flex; gap:4px;">
                <button class="btn-3d" id="btn-play-main" onclick="RetoricaAudio.play()">🔊</button>
                <button class="btn-3d" style="color:var(--danger);" onclick="RetoricaAudio.stop()">🛑</button>
            </div>
        </div>
        <div class="control-unit"><span class="label-unit" id="lbl-tool-vmsg">Msj Voz</span><button class="btn-3d" onclick="RetoricaAudio.vmsg()">🗂️</button></div>
        <div class="control-unit"><span class="label-unit" id="lbl-tool-render">Render</span><button class="btn-3d" onclick="RetoricaAudio.render()">🎛️</button></div>
        <div class="control-unit">
            <span class="label-unit" id="lbl-tool-zoom">Zoom</span>
            <div style="display:flex; gap:4px;">
                <button class="btn-3d" style="padding:6px 10px;" onclick="RetoricaUI.adjustZoom(0.1)">+</button>
                <button class="btn-3d" style="padding:6px 10px;" onclick="RetoricaUI.adjustZoom(-0.1)">-</button>
            </div>
            <div id="zoom-indicator-tag" class="zoom-indicator-tag">100% (Normal)</div>
        </div>
        <div class="control-unit"><span class="label-unit" id="lbl-tool-langtext" style="color:var(--accent);">Traducir</span><select id="lang-selector-text" onchange="RetoricaI18n.translateText(this.value)" style="background:var(--btn-3d-bg); color:#fff; border:1px solid var(--border); padding:5px; border-radius:6px; font-size:0.65rem; max-width:90px;"></select></div>
        <div class="control-unit"><span class="label-unit" id="lbl-tool-langapp">Idioma App</span><select id="lang-selector-app" onchange="RetoricaI18n.setAppLang(this.value)" style="background:var(--btn-3d-bg); color:#fff; border:1px solid var(--border); padding:5px; border-radius:6px; font-size:0.65rem; max-width:90px;"></select></div>
        <div class="control-unit"><span class="label-unit" id="lbl-tool-theme">Tema</span><button class="btn-3d" onclick="RetoricaUI.toggleTheme()">🌓</button></div>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="header-app" style="border-bottom:1px solid var(--border)">
            <div class="sol-container"><div class="sol-engine"></div><div class="sol-crown-3"></div></div>
            <h2 style="color:var(--accent); font-size:1rem; letter-spacing:2px;">BIBLIOTECA</h2>
        </div>
        <div style="padding:12px; border-bottom:1px solid var(--border);">
            <p class="label-unit" id="lbl-side-export" style="margin-bottom:8px;">Exportar</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <button onclick="RetoricaUI.expPDF()" class="btn-3d" style="font-size:0.7rem; min-height:30px;">PDF</button>
                <button onclick="RetoricaUI.expTXT()" class="btn-3d" style="font-size:0.7rem; min-height:30px;">TXT</button>
            </div>
            <button onclick="RetoricaAuth.sync()" class="btn-3d" style="width:100%; margin-top:8px; font-size:0.7rem; color:var(--accent); min-height:32px;">🔄 <span id="lbl-side-sync">Sincronizar</span></button>
        </div>
        <div id="library-container" style="flex:1; overflow-y:auto; padding:12px;"><div id="docs-list-render"></div></div>
        <div style="padding:12px; background:rgba(0,0,0,0.2); border-top:1px solid var(--border);">
            <div style="font-size:0.7rem; display:flex; align-items:center; gap:6px; margin-bottom:6px;"><span style="width:6px; height:6px; background:var(--accent); border-radius:50%;"></span><span id="display-user-name">Anon</span></div>
            <button onclick="location.reload()" style="color:var(--danger); background:transparent; border:none; font-size:0.7rem; font-weight:bold; cursor:pointer;" id="lbl-side-logout">SALIR</button>
        </div>
    </nav>

    <main class="main-view">
        <div class="editor-scroll-container" id="viewport-ctx">
            <div id="zoom-wrapper" style="width:100%; display:flex; flex-direction:column; transition: transform 0.1s ease;">
                <input type="text" id="editor-title" class="doc-title" placeholder="Título del Guion...">
                <textarea id="editor-body" class="textarea-main" placeholder="Escribe o dicta aquí tu retórica..."></textarea>
            </div>
        </div>
    </main>

    <footer style="background:var(--bg-sidebar); padding:8px 15px; font-size:0.65rem; display:flex; gap:15px; border-top:1px solid var(--border); color:var(--text-muted); font-weight:bold;">
        <span id="count-chars">CHARS: 0</span><span id="count-words">WORDS: 0</span><span id="count-lines">LINES: 1</span>
        <span style="margin-left:auto; color:var(--accent);">V.2026.MODULAR_PRO</span>
    </footer>

    <div id="toast-notif" class="toast"></div>

    <script src="./js/auth.js?v=GOD_MODE"></script>
    <script src="./js/idiomas.js?v=GOD_MODE"></script>
    <script src="./js/audio.js?v=GOD_MODE"></script>
    <script src="./js/storage.js?v=GOD_MODE"></script>
    <script src="./js/main.js?v=GOD_MODE"></script>
</body>
</html>
