<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Retórica - Creative Suite V7.3</title>
    <style>
        :root { 
            --p: #0F172A; --bg: #F8FAFC; --accent: #2563EB; 
            --script: #7C3AED; --podcast: #EC4899; --story: #F59E0B;
            --txt: #1E293B; --muted: #64748B; --ok: #10B981;
        }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; border-radius: 10px; }
        body { margin: 0; background: var(--bg); color: var(--txt); overflow: hidden; height: 100vh; }

        /* MODAL */
        #vox-modal { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); 
            z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .modal-box { 
            background: white; padding: 30px; width: 90%; max-width: 450px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border-top: 6px solid var(--accent);
        }

        /* LOGIN / REGISTRO */
        #v-auth { position: fixed; inset: 0; background: var(--p); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #E2E8F0; font-size: 16px; outline: none; }
        .auth-input:focus { border-color: var(--accent); }
        .btn-main { width: 100%; padding: 16px; border: none; background: var(--accent); color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* HEADER */
        header { background: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 70px; border-bottom: 1px solid #E2E8F0; }
        .logo { font-weight: 900; color: var(--p); font-size: 1.6rem; letter-spacing: -1.5px; }
        
        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; border-right: 5px solid var(--accent); }
        .sidebar.open { left: 0; }
        .sidebar button { width: 100%; padding: 18px; text-align: left; border: none; background: none; border-bottom: 1px solid #F1F5F9; font-weight: 700; cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1900; }
        .sidebar.open ~ .overlay { display: block; }

        /* VISTAS */
        .vista { display: none; height: calc(100vh - 70px); padding: 20px; overflow-y: auto; }
        .activa { display: block; }

        /* EDITOR CON PLACEHOLDERS (Punto 1) */
        #editor-frame { background: white; border: 1px solid #E2E8F0; padding: 30px; min-height: 70vh; position: relative; }
        [contenteditable]:empty:before { content: attr(data-placeholder); color: #CBD5E1; cursor: text; }
        #e-title { font-size: 2rem; font-weight: 900; margin-bottom: 10px; outline: none; display: block; }
        #e-body { font-size: 1.1rem; line-height: 1.7; outline: none; min-height: 400px; }

        /* PANELES */
        .tool-panel { background: #F8FAFC; border: 2px solid #E2E8F0; padding: 15px; margin-bottom: 15px; display: none; gap: 8px; flex-wrap: wrap; }
        .tool-btn { padding: 10px; border: 1px solid #CBD5E1; background: white; font-size: 11px; cursor: pointer; font-weight: bold; flex: 1 1 45%; }

        /* FOOTER */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px; border-top: 4px solid var(--accent); display: flex; gap: 8px; z-index: 1000; }
        .btn-action { flex: 1; padding: 12px; border: none; color: white; font-weight: 800; cursor: pointer; font-size: 10px; }
        .btn-add { position: fixed; bottom: 100px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: white; border: none; font-size: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 800; }
    </style>
</head>
<body>

    <div id="vox-modal" onclick="closeVox()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 id="m-title" style="margin-top:0; color:var(--accent);"></h3>
            <div id="m-body"></div>
            <button onclick="closeVox()" class="btn-main" style="margin-top:20px;">CERRAR</button>
        </div>
    </div>

    <div id="v-auth">
        <div class="auth-card">
            <h1 style="color:var(--p); margin:0 0 5px 0;">RETÓRICA</h1>
            <p style="font-size:12px; color:var(--muted); margin-bottom:25px;">Ingresa para vincular tu maletín.</p>
            <input type="text" id="u-id" class="auth-input" placeholder="Correo o Teléfono">
            <input type="password" id="u-pass" class="auth-input" placeholder="Contraseña">
            <button class="btn-main" onclick="authMaster()">ACCEDER / REGISTRAR</button>
        </div>
    </div>

    <header id="app-header" style="display:none;">
        <button onclick="toggleMenu(true)" style="background:none; border:none; font-size:25px; cursor:pointer;">☰</button>
        <div class="logo">RETÓRICA</div>
        <div id="u-icon" style="background:var(--p); color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">U</div>
    </header>

    <nav id="sidebar" class="sidebar">
        <h2 style="color:var(--accent);">Estudio</h2>
        <button onclick="irA('v-hub')">📂 Mis Proyectos</button>
        <button onclick="nuevoProyecto()">📝 Nuevo Escrito</button>
        <button onclick="cerrarSesion()" style="color:red; margin-top:50px;">🚪 Salir</button>
    </nav>
    <div class="overlay" onclick="toggleMenu(false)"></div>

    <div id="v-hub" class="vista">
        <h2>Mis Archivos</h2>
        <input type="text" id="search" oninput="renderHub()" placeholder="🔍 Buscar..." style="width:100%; padding:15px; border:1px solid #DDD; margin-bottom:20px;">
        <div id="hub-grid" style="display:grid; grid-template-columns: 1fr; gap:15px;"></div>
        <button class="btn-add" onclick="nuevoProyecto()">+</button>
    </div>

    <div id="v-edit" class="vista">
        <div id="script-tools" class="tool-panel">
            <span style="width:100%; font-size:10px; font-weight:bold;">ESCENARIOS DE GUION:</span>
            <button class="tool-btn" onclick="addText('<b>INT. HABITACIÓN - DÍA (AMUEBLADA)</b><br>')">🏠 Hab. Día</button>
            <button class="tool-btn" onclick="addText('<b>EXT. CALLE - NOCHE (LLUVIOSO)</b><br>')">🌧️ Calle Noche</button>
            <button class="tool-btn" onclick="addText('<b>EXT. VÍAS DE TREN - DÍA</b><br>')">🚂 Tren</button>
            <button class="tool-btn" onclick="openChars()">👥 PERSONAJES</button>
        </div>

        <div id="audio-tools" class="tool-panel">
            <span style="width:100%; font-size:10px; font-weight:bold;">VOCES PODCAST:</span>
            <select id="voice-engine" class="tool-btn" style="flex:1 1 100%;"></select>
            <button class="tool-btn" onclick="addText('[MÚSICA_INICIO]')">🎵 Intro</button>
            <button class="tool-btn" onclick="addText('[FX_AMBIENTE]')">🔊 FX</button>
        </div>

        <div id="editor-frame">
            <div id="e-title" contenteditable="true" data-placeholder="Título del Proyecto..."></div>
            <div id="e-body" contenteditable="true" data-placeholder="Escribe aquí tu narrativa..." oninput="autoScroll()"></div>
        </div>

        <div class="footer">
            <button class="btn-action" style="background:var(--script)" onclick="openPanel('script-tools')">🎬 GUION</button>
            <button class="btn-action" style="background:var(--podcast)" onclick="openPanel('audio-tools')">🎙️ PODCAST</button>
            <button class="btn-action" style="background:var(--ok); flex:1.5;" onclick="saveDoc()">💾 GUARDAR</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('retorica_db')) || [];
        let chars = JSON.parse(localStorage.getItem('retorica_chars')) || [];
        let session = JSON.parse(localStorage.getItem('retorica_user')) || null;

        function authMaster() {
            const id = document.getElementById('u-id').value;
            const pass = document.getElementById('u-pass').value;
            if(!id || !pass) return voxSay("Ingresa datos para el registro.");
            session = { id, name: id.split('@')[0] };
            localStorage.setItem('retorica_user', JSON.stringify(session));
            startUI();
        }

        function startUI() {
            document.getElementById('v-auth').style.display = 'none';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('u-icon').innerText = session.name[0].toUpperCase();
            irA('v-hub');
            loadVoices();
        }

        function voxSay(msg, title = "Retórica") {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-body').innerHTML = msg;
            document.getElementById('vox-modal').style.display = 'flex';
        }

        function closeVox() { document.getElementById('vox-modal').style.display = 'none'; }

        function irA(v) {
            document.querySelectorAll('.vista').forEach(x => x.classList.remove('activa'));
            document.getElementById(v).classList.add('activa');
            if(v === 'v-hub') renderHub();
            toggleMenu(false);
        }

        function toggleMenu(s) { document.getElementById('sidebar').classList.toggle('open', s); }

        function openPanel(id) {
            const p = document.getElementById(id);
            const isVis = p.style.display === 'flex';
            document.querySelectorAll('.tool-panel').forEach(x => x.style.display = 'none');
            p.style.display = isVis ? 'none' : 'flex';
        }

        function addText(h) { document.getElementById('e-body').innerHTML += h; autoScroll(); }

        function autoScroll() {
            const f = document.getElementById('v-edit');
            f.scrollTop = f.scrollHeight;
        }

        function renderHub() {
            const grid = document.getElementById('hub-grid');
            grid.innerHTML = '';
            const q = document.getElementById('search').value.toLowerCase();
            db.filter(x => x.t.toLowerCase().includes(q)).reverse().forEach(x => {
                const c = document.createElement('div');
                c.style = "background:white; padding:15px; border:1px solid #EEE; cursor:pointer;";
                c.onclick = () => loadProject(x.id);
                c.innerHTML = `<b>${x.t || 'Sin Título'}</b><br><small>${new Date(x.id).toLocaleDateString()}</small>`;
                grid.appendChild(c);
            });
        }

        function saveDoc() {
            const id = document.getElementById('v-edit').dataset.id || Date.now();
            const t = document.getElementById('e-title').innerText;
            const c = document.getElementById('e-body').innerHTML;
            db = db.filter(x => x.id != id);
            db.push({id, t, c});
            localStorage.setItem('retorica_db', JSON.stringify(db));
            voxSay("Proyecto Guardado.");
            irA('v-hub');
        }

        function loadProject(id) {
            const p = db.find(x => x.id == id);
            document.getElementById('e-title').innerText = p.t;
            document.getElementById('e-body').innerHTML = p.c;
            document.getElementById('v-edit').dataset.id = id;
            irA('v-edit');
        }

        function nuevoProyecto() {
            document.getElementById('e-title').innerText = "";
            document.getElementById('e-body').innerHTML = "";
            delete document.getElementById('v-edit').dataset.id;
            irA('v-edit');
        }

        function openChars() {
            let l = chars.map(c => `• ${c.n} (${c.r})`).join('<br>');
            voxSay(`<input id="cn" placeholder="Nombre" class="auth-input"><input id="cr" placeholder="Rol" class="auth-input"><button class="btn-main" onclick="saveChar()">AÑADIR</button><div style="margin-top:10px;">${l}</div>`, "Personajes");
        }

        function saveChar() {
            const n = document.getElementById('cn').value;
            const r = document.getElementById('cr').value;
            if(n) { chars.push({n,r}); localStorage.setItem('retorica_chars', JSON.stringify(chars)); closeVox(); voxSay("Añadido."); }
        }

        function loadVoices() {
            const e = document.getElementById('voice-engine');
            setTimeout(() => {
                const v = window.speechSynthesis.getVoices();
                e.innerHTML = v.map(x => `<option>${x.name}</option>`).join('');
            }, 600);
        }

        function cerrarSesion() { localStorage.removeItem('retorica_user'); location.reload(); }

        window.onload = () => { if(session) startUI(); };
    </script>
</body>
</html>
