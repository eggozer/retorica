<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover\">
    <title>Retórica - Sistema Profesional</title>
    <link rel="manifest" href="./manifest.json?v=2026_GOD_MODE">
    <link rel="icon" type="image/png" href="https://eggozer.github.io/retorica/icon-192.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #0f111a; --bg-sidebar: #161925; --bg-card: #1f2335;
            --accent: #e2e8f0; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #e53e3e; --btn-3d-bg: #2d3244;
            --btn-shadow: #11131c; --royal-green: #2ecc71;
        }
        body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #2d3748; --text-main: #1a202c; --text-muted: #718096;
            --border: #e2e8f0; --danger: #e53e3e; --btn-3d-bg: #edf2f7;
            --btn-shadow: #cbd5e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body, html { width: 100%; height: 100%; background: var(--bg-main); color: var(--text-main); overflow: hidden; position: relative; }
        
        /* Capa de Autenticación Unificada */
        .auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--bg-sidebar); width: 100%; max-width: 360px; padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 25px var(--btn-shadow); text-align: center; }
        .auth-logo { width: 64px; height: 64px; margin-bottom: 15px; }
        .auth-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; color: var(--text-main); }
        .auth-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 25px; }
        .auth-input-group { margin-bottom: 20px; text-align: left; }
        .auth-label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .auth-input { width: 100%; background: var(--bg-main); border: 1px solid var(--border); padding: 12px 15px; border-radius: 8px; color: var(--text-main); font-size: 0.95rem; outline: none; transition: border 0.2s; }
        .auth-input:focus { border-color: var(--royal-green); }
        
        /* Botones 3D Pro */
        .btn-3d { width: 100%; background: var(--btn-3d-bg); border: none; padding: 12px 20px; border-radius: 8px; color: var(--text-main); font-weight: bold; font-size: 0.9rem; cursor: pointer; box-shadow: 0 4px var(--btn-shadow); transition: all 0.1s; position: relative; top: 0; outline: none; }
        .btn-3d:active { top: 3px; box-shadow: 0 1px var(--btn-shadow); }
        .btn-rect { border-radius: 6px; padding: 6px 12px; font-size: 0.75rem; width: auto; }

        /* Estructura de la Barra Superior e Icono Ajustado */
        .top-bar { height: 60px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; z-index: 1000; position: relative; }
        .brand-area { display: flex; align-items: center; gap: 10px; cursor: pointer; height: 100%; }
        .icon-nav-logo { width: 32px; height: 32px; object-fit: contain; display: block; pointer-events: none; }
        .app-title { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.5px; }
        
        .action-row { margin-left: auto; display: flex; gap: 8px; }
        .btn-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; }

        /* Contenedor Principal Deslizable */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--bg-sidebar); border-right: 1px solid var(--border); z-index: 5000; transition: left 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: bold; color: var(--text-muted); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }
        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg-main); }

        .main-view { width: 100%; height: calc(100% - 95px); position: relative; background: var(--bg-main); }
        .editor-scroll-container { width: 100%; height: 100%; overflow-y: auto; padding: 20px; }
        #zoom-wrapper { width: 100%; transform-origin: top center; transition: transform 0.15s ease; }
        
        .unified-container { width: 100%; max-width: 800px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 4px 12px var(--btn-shadow); }
        .doc-title { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; color: var(--text-main); font-size: 1.25rem; font-weight: bold; outline: none; }
        .rich-editor-body { width: 100%; min-height: 300px; background: transparent; border: none; color: var(--text-main); font-size: 1rem; line-height: 1.6; outline: none; resize: none; white-space: pre-wrap; word-wrap: break-word; }
        .rich-editor-body:[contenteditable]:empty:before { content: attr(placeholder); color: var(--text-muted); pointer-events: none; }

        footer { height: 35px; background: var(--bg-sidebar); padding: 0 15px; font-size: 0.65rem; display: flex; align-items: center; gap: 15px; border-top: 1px solid var(--border); color: var(--text-muted); font-weight: bold; z-index: 900; position: relative; }
        .toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; z-index: 10000; display: none; border: 1px solid var(--border); }
        
        .recording-active { background: var(--danger) !important; animation: pulse 1.5s infinite; }
        .reading-active { background: var(--royal-green) !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-layer-screen" class="auth-screen">
        <div class="auth-card">
            <img src="https://eggozer.github.io/retorica/icon-192.png" class="auth-logo" alt="Logo">
            <div class="auth-title">Retórica</div>
            <div class="auth-subtitle">Sistema Modular de Guiones</div>
            <div class="auth-input-group">
                <label class="auth-label" id="lbl-auth-user">Email / Identificador</label>
                <input type="text" id="auth-input-uid" class="auth-input" placeholder="ejemplo@correo.com">
            </div>
            <button class="btn-3d" onclick="RetoricaAuth.processAccess()" id="btn-auth-execute">INGRESAR</button>
        </div>
    </div>

    <header class="top-bar">
        <div class="brand-area" onclick="RetoricaUI.toggleSidebar()">
            <img src="https://eggozer.github.io/retorica/icon-192.png" class="icon-nav-logo" alt="Retórica">
            <span class="app-title">RETÓRICA</span>
        </div>
        <div class="action-row">
            <button class="btn-3d btn-circle" onclick="RetoricaStorage.save()" id="lbl-tool-save">💾</button>
            <button class="btn-3d btn-circle" onclick="RetoricaStorage.clearCanvas()" id="lbl-tool-new">📄</button>
            <button class="btn-3d btn-circle" onclick="RetoricaAudio.toggleMic()" id="btn-mic-main">🎙️</button>
            <button class="btn-3d btn-circle" onclick="RetoricaAudio.play()" id="btn-play-main">▶️</button>
            <button class="btn-3d btn-circle" onclick="RetoricaAudio.stop()" style="color:var(--danger)">🛑</button>
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">BIBLIOTECA & CONFIGURACIÓN</div>
        <div class="sidebar-content">
            <div style="margin-bottom:20px;">
                <button class="btn-3d" onclick="RetoricaUI.toggleTheme()" style="margin-bottom:8px;" id="lbl-tool-theme">MODIFICAR TEMA</button>
                <button class="btn-3d" onclick="RetoricaUI.adjustZoom(0.1)" style="margin-bottom:8px;" id="lbl-tool-zoom">AUMENTAR ZOOM</button>
                <button class="btn-3d" onclick="RetoricaUI.adjustZoom(-0.1)" style="margin-bottom:8px;">REDUCIR ZOOM</button>
                <button class="btn-3d" onclick="RetoricaI18n.toggleAppLang()" style="margin-bottom:8px;" id="lbl-tool-langapp">IDIOMA APP</button>
                <button class="btn-3d" onclick="RetoricaAudio.convertTextToVoiceFile()" style="margin-bottom:8px;" id="lbl-tool-tts">TEXTO A VOZ</button>
                <button class="btn-3d" onclick="RetoricaStorage.exportToHTML()" style="margin-bottom:15px;" id="lbl-side-export">EXPORTAR HTML</button>
            </div>
            <div style="border-top:1px solid var(--border); padding-top:15px;">
                <h4 style="font-size:0.75rem; color:var(--text-muted); margin-bottom:10px; letter-spacing:0.5px;">MIS PROYECTOS</h4>
                <div id="local-library-container"></div>
            </div>
            <div id="god-mode-panel" style="border-top:1px solid var(--border); padding-top:15px; margin-top:15px; display:none;">
                <h4 style="font-size:0.75rem; color:var(--royal-green); margin-bottom:10px; letter-spacing:0.5px;">MODO DIOS: GESTIÓN APPS</h4>
                <div id="god-users-list"></div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div style="font-size:0.7rem; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">User: <span id="display-user-name" style="color:var(--royal-green); font-weight:bold;">Anon</span></div>
            <button onclick="RetoricaAuth.logout()" style="color:var(--danger); background:transparent; border:none; font-size:0.8rem; font-weight:bold; cursor:pointer; margin-left:auto;" id="lbl-side-logout">SALIR</button>
        </div>
    </div>

    <main class="main-view">
        <div class="editor-scroll-container" id="viewport-ctx">
            <div id="zoom-wrapper">
                <div class="unified-container" id="unified-sel-container">
                    <input type="text" id="editor-title" class="doc-title" placeholder="Título del Guion...">
                    <div id="editor-body" class="rich-editor-body" contenteditable="true" placeholder="Escribe o dicta aquí tu retórica..."></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <span id="count-chars">CHARS: 0</span><span id="count-words">WORDS: 0</span><span id="count-lines">LINES: 1</span>
        <span style="margin-left:auto; color:var(--text-muted);">V.2026.MODULAR_PRO</span>
    </footer>

    <div id="toast-notif" class="toast"></div>

    <script src="./auth.js?v=GOD_MODE"></script>
    <script src="./idiomas.js?v=GOD_MODE"></script>
    <script src="./audio.js?v=GOD_MODE"></script>
    <script src="./storage.js?v=GOD_MODE"></script>
    <script src="./main.js?v=GOD_MODE"></script>
</body>
</html>
