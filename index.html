    <style>
        :root {
            --bg-main: #12141c; --bg-sidebar: #1a1d29; --bg-card: #222736;
            --accent: #f5c518; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #ff3b30; --btn-3d-bg: #2d3244;
            --btn-3d-shadow-dark: #090b11; --btn-3d-shadow-light: #414963;
        }
        html.light-theme, body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #d4a373; --text-main: #1a202c; --text-muted: #718096;
            --border: #cbd5e0; --btn-3d-bg: #e0e5ec;
            --btn-3d-shadow-dark: #b8bec7; --btn-3d-shadow-light: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }

        /* --- ENCABEZADO SUPERIOR 3D (RETÓRICA + LOGO) --- */
        .brand-header-3d {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            background: var(--bg-sidebar);
            padding: 8px 24px;
            border-radius: 30px;
            box-shadow: 5px 5px 15px var(--btn-3d-shadow-dark), -5px -5px 15px var(--btn-3d-shadow-light);
            border: 1px solid var(--border);
            pointer-events: none;
        }
        .brand-logo-3d {
            width: 32px;
            height: 32px;
            filter: drop-shadow(3px 3px 3px rgba(0,0,0,0.7));
            transform: perspective(500px) rotateX(10deg) rotateY(-10deg);
        }
        .brand-title-3d {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0px #c29b0c, 2px 2px 0px #94760a, 4px 4px 6px rgba(0,0,0,0.6);
        }

        /* --- CONTROLES DE ZOOM NATIVO DE INTERFAZ --- */
        .zoom-widget-container {
            position: fixed;
            bottom: 50px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        /* --- MENÚ LATERAL MEJORADO A PANTALLA COMPLETA --- */
        .sidebar { 
            width: 100vw; 
            max-width: 100%;
            background-color: rgba(26, 29, 41, 0.95); 
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            position: fixed; 
            left: 0; 
            top: 0; 
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 2000; 
        }
        .sidebar.hidden { transform: translateX(-100%); }
        
        .toggle-sidebar-pestaña { 
            position: fixed; 
            left: 10px; 
            top: 15px; 
            width: 45px; 
            height: 45px; 
            background-color: var(--bg-sidebar); 
            color: var(--accent); 
            border: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold; 
            z-index: 2100; 
            border-radius: 50%; 
            box-shadow: 4px 4px 8px var(--btn-3d-shadow-dark); 
        }
        
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; height: 80px; flex-shrink: 0; margin-top: 60px; }
        
        /* --- REJILLA BIDIMENSIONAL 3D PARA LAS PLANTILLAS --- */
        .document-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            perspective: 1000px;
        }
        
        .document-list-item { 
            background: var(--bg-card); 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            justify-content: space-between; 
            cursor: pointer; 
            height: 160px;
            box-shadow: 5px 5px 15px var(--btn-3d-shadow-dark), -3px -3px 10px var(--btn-3d-shadow-light);
            transform: rotateX(5deg) rotateY(-5deg);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .document-list-item:active {
            transform: translateZ(-10px) rotateX(0deg) rotateY(0deg);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
        }
        
        /* Contenedor de Botones de Plantilla de Acción Rápida */
        .grid-item-actions {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            margin-top: auto;
            padding-top: 15px;
        }

        .sidebar-footer-menu { padding: 16px; border-top: 1px solid var(--border); background-color: rgba(0, 0, 0, 0.4); flex-shrink: 0; }
        .main-container { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; background-color: var(--bg-main); position: relative; }
        
        /* --- PASARELAS HORIZONTALES DESLIZABLES DE HERRAMIENTAS --- */

        .top-toolbar-pasarela::-webkit-scrollbar { display: none; }
        .toolbar-rack-modular { display: inline-flex; align-items: center; gap: 16px; flex-shrink: 0; }

        /* --- CONTENEDOR DE LEYENDA SUPERIOR EXTERNA --- */

        .btn-3d-round:active { box-shadow: inset 3px 3px 6px var(--btn-3d-shadow-dark), inset -3px -3px 6px var(--btn-3d-shadow-light); transform: translateY(1px); }
        .btn-3d-round.active-mode { background: var(--accent); color: #0a0f1d; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4); }
        
        .select-3d-styled { background: var(--btn-3d-bg); color: var(--text-main); border: none; padding: 6px 8px; font-size: 0.75rem; font-weight: bold; outline: none; height: 36px; border-radius: 8px !important; box-shadow: 2px 2px 5px var(--btn-3d-shadow-dark), -2px -2px 5px var(--btn-3d-shadow-light); max-width: 130px; }

        .input-titulo-html { background: transparent; border: none; border-bottom: 1px dashed var(--border); color: var(--accent); font-size: 1.4rem; font-weight: bold; padding-bottom: 8px; margin-bottom: 12px; outline: none; width: 100%; }

        .textarea-encapsulado { flex: 1; height: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; line-height: 1.6; resize: none; outline: none; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        /* Contenedor Playground Sandbox */

</head>

    <!-- MOTOR LOGICO PERSISTENTE INDEXEDDB -->
    <script>
        const DB_NAME = 'RetoricaDB_V2026';
        const STORE_NAME = 'documentos_guiones';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 3);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function guardarDocumento(id, titulo, contenido, usuario) {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const registro = { id: Number(id), titulo: titulo || "Sin Título", contenido, usuario, fechaModificacion: Date.now() };
                const request = store.put(registro);
                request.onsuccess = () => resolve(true);
                request.onerror = () => reject(false);
            });
        }

        async function obtenerDocumentosPorUsuario(usuario) {
            const db = await initDB();
            return new Promise((resolve) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => {
                    const filtrados = (request.result || []).filter(doc => doc.usuario === usuario);
                    resolve(filtrados);
                };
            });
        }

        async function eliminarDocumento(id) {
            const db = await initDB();
            return new Promise((resolve) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(Number(id));
                request.onsuccess = () => resolve(true);
            });
        }
    </script>

        // Variables de Reconocimiento de Voz y Síntesis

        function configurarEventosCore() {
            editorTextArea.addEventListener('input', () => {
                procesarContadoresInternos();
                localStorage.setItem('ret_cache_fast_body', editorTextArea.value);
                detectarTipoContenidoPlayground();
            });

            // GESTIÓN COMPLETA DEL DESPLIEGUE DEL MENÚ LATERAL SOBERANO
            const sidebarBtn = document.getElementById('btn-toggle-pestaña');
            const sidebar = document.getElementById('sidebar-container');
            
            sidebarBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const oculto = sidebar.classList.toggle('hidden');
                sidebarBtn.textContent = oculto ? "▶" : "◀";
            });

            // CONTROL DEL BOTÓN INTERNO DE NUEVA NOTA
            document.getElementById('btn-nuevo-documento-limpio').onclick = () => {
                idDocumentoActual = null;
                editorTitleInput.value = '';
                editorTextArea.value = '';
                sidebar.classList.add('hidden');
                sidebarBtn.textContent = "▶";
                mostrarNotificacionToast("Lienzo Limpio");
            };

            // BOTÓN INTEGRADO GUARDAR ATÓMICO
            document.getElementById('btn-confirmar-guardado-nativo').onclick = async () => {
                if (!idDocumentoActual) idDocumentoActual = Date.now();
                await guardarDocumento(idDocumentoActual, editorTitleInput.value, editorTextArea.value, usuarioSesionActiva);
                mostrarNotificacionToast("✓ Guardado en Memoria");
                refrescarBibliotecaVisual();
            };

            // PLAYGROUND DE CÓDIGO HTML
            document.getElementById('btn-ejecutar-playground').onclick = () => {
                const pane = document.getElementById('contenedor-vista-previa');
                pane.classList.add('active');
                const blob = new Blob([editorTextArea.value], { type: 'text/html;charset=utf-8' });
                document.getElementById('sandbox-ejecutor').src = URL.createObjectURL(blob);
            };

            document.getElementById('btn-cerrar-preview').onclick = () => {
                document.getElementById('contenedor-vista-previa').classList.remove('active');
            };
        }

        /* --- CONTROL DE GESTOS CON LOS DEDOS (SWIPE) PARA EL MENÚ LATERAL --- */
        function configurarSoporteGestosDedos() {
            let coordenadaXInicio = 0;
            const sidebar = document.getElementById('sidebar-container');
            const sidebarBtn = document.getElementById('btn-toggle-pestaña');

            window.addEventListener('touchstart', (e) => {
                coordenadaXInicio = e.touches[0].clientX;
            }, { passive: true });

            window.addEventListener('touchend', (e) => {
                const coordenadaXFin = e.changedTouches[0].clientX;
                const diferenciaX = coordenadaXFin - coordenadaXInicio;

                if (Math.abs(diferenciaX) > 100) {
                    if (diferenciaX > 0 && coordenadaXInicio < 50) {
                        sidebar.classList.remove('hidden');
                        sidebarBtn.textContent = "◀";
                    } else if (diferenciaX < 0 && !sidebar.classList.contains('hidden')) {
                        sidebar.classList.add('hidden');
                        sidebarBtn.textContent = "▶";
                    }
                }
            }, { passive: true });
        }

        /* --- CONTROL DE ZOOM NATIVO DE LA INTERFAZ --- */
        function configurarMotorZoom() {
            document.getElementById('btn-zoom-incrementar').onclick = () => {
                if (escalaZoomActual < 2.0) {
                    escalaZoomActual += 0.1;
                    document.body.style.transform = `scale(${escalaZoomActual})`;
                    document.body.style.transformOrigin = "top left";
                    document.body.style.width = `${100 / escalaZoomActual}vw`;
                    document.body.style.height = `${100 / escalaZoomActual}vh`;
                }
            };
            document.getElementById('btn-zoom-decrementar').onclick = () => {
                if (escalaZoomActual > 0.7) {
                    escalaZoomActual -= 0.1;
                    document.body.style.transform = `scale(${escalaZoomActual})`;
                    document.body.style.transformOrigin = "top left";
                    document.body.style.width = `${100 / escalaZoomActual}vw`;
                    document.body.style.height = `${100 / escalaZoomActual}vh`;
                }
            };
        }

        /* --- ARQUITECTURA DE IDIOMAS PRINCIPALES (DICTADO Y LECTURA) --- */
        function configurarMotoresVozAudio() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                reconocimientoVoz = new SpeechRecognition();
                reconocimientoVoz.continuous = true;
                reconocimientoVoz.interimResults = false;

                reconocimientoVoz.onresult = (event) => {
                    const resultadoIndice = event.resultIndex;
                    const textoTranscrito = event.results[resultadoIndice][0].transcript;
                    editorTextArea.value += (editorTextArea.value ? " " : "") + textoTranscrito;
                    procesarContadoresInternos();
                };

                reconocimientoVoz.onerror = () => {
                    estaDictando = false;
                    document.getElementById('btn-operar-dictado').classList.remove('active-mode');
                };
            }

            document.getElementById('btn-operar-dictado').onclick = () => {
                if (!reconocimientoVoz) {
                    mostrarNotificacionToast("Dictado No Soportado en este Navegador");
                    return;
                }
                const lang = document.getElementById('selector-idioma-global').value;
                reconocimientoVoz.lang = lang;

                if (!estaDictando) {
                    reconocimientoVoz.start();
                    estaDictando = true;
                    document.getElementById('btn-operar-dictado').classList.add('active-mode');
                    mostrarNotificacionToast("🎙️ Escuchando...");
                } else {
                    reconocimientoVoz.stop();
                    estaDictando = false;
                    document.getElementById('btn-operar-dictado').classList.remove('active-mode');
                    mostrarNotificacionToast("Dictado pausado");
                }
            };

            // MOTOR DE LECTURA (TEXT-TO-SPEECH)
            document.getElementById('btn-operar-lectura').onclick = () => {
                const contenidoTexto = editorTextArea.value;
                if (!contenidoTexto.trim()) return;
                
                window.speechSynthesis.cancel(); // Evita bloqueos y encolamientos infinitos
                const sintesisEnunciado = new SpeechSynthesisUtterance(contenidoTexto);
                sintesisEnunciado.lang = document.getElementById('selector-idioma-global').value;
                window.speechSynthesis.speak(sintesisEnunciado);
                mostrarNotificacionToast("🔊 Reproduciendo Audio...");
            };
        }

        /* --- RENDERIZADO REVOLUCIONARIO DE LAS PLANTILLAS EN 3D DE 2 FILAS VIZUALES --- */
        async function refrescarBibliotecaVisual() {
            if (!usuarioSesionActiva) return;
            const lista = await obtenerDocumentosPorUsuario(usuarioSesionActiva);
            contenedorLista.innerHTML = '';

            if (lista.length === 0) {
                contenedorLista.innerHTML = `<div style="color:var(--text-muted); grid-column: span 2; text-align:center; padding:40px;">Biblioteca vacía</div>`;
                return;
            }

            lista.forEach(doc => {
                const card = document.createElement('div');
                card.className = 'document-list-item';
                card.innerHTML = `
                    <div style="font-weight:bold; font-size:0.95rem; color:var(--accent); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">📄 ${doc.titulo}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted); height:45px; overflow:hidden;">${doc.contenido.substring(0, 60)}...</div>
                    <div class="grid-item-actions">
                        <div class="control-unit-3d">
                            <div class="leyenda-superior-externa" style="font-size:0.55rem; bottom:100%;">Compartir</div>
                            <button class="btn-3d-round" id="action-share-${doc.id}" style="width:32px; height:32px; font-size:0.75rem;">🔗</button>
                        </div>
                        <div class="control-unit-3d">
                            <div class="leyenda-superior-externa" style="font-size:0.55rem; bottom:100%;">Borrar</div>
                            <button class="btn-3d-round" id="action-del-${doc.id}" style="width:32px; height:32px; font-size:0.75rem; color:var(--danger);">🗑️</button>
                        </div>
                    </div>
                `;

                card.onclick = (e) => {
                    if (e.target.closest('.grid-item-actions')) return;
                    idDocumentoActual = doc.id;
                    editorTitleInput.value = doc.titulo;
                    editorTextArea.value = doc.contenido;
                    procesarContadoresInternos();
                    detectarTipoContenidoPlayground();
                    document.getElementById('sidebar-container').classList.add('hidden');
                    document.getElementById('btn-toggle-pestaña').textContent = "▶";
                };

                contenedorLista.appendChild(card);

                // FUNCIONALIDAD COMPARTIR NATIVA DE API MÓVIL
                document.getElementById(`action-share-${doc.id}`).onclick = (e) => {
                    e.stopPropagation();
                    if (navigator.share) {
                        navigator.share({ title: doc.titulo, text: doc.contenido });
                    } else {
                        mostrarNotificacionToast("Copiado al Portapapeles para Compartir");
                    }
                };

                // BORRAR DOCUMENTO DE FORMA SEGURA SIN CRASHES
                document.getElementById(`action-del-${doc.id}`).onclick = async (e) => {
                    e.stopPropagation();
                    if (confirm("¿Deseas eliminar este documento?")) {
                        await eliminarDocumento(doc.id);
                        if (idDocumentoActual === doc.id) {
                            idDocumentoActual = null;
                            editorTitleInput.value = '';
                            editorTextArea.value = '';
                        }
                        refrescarBibliotecaVisual();
                    }
                };
            });
        }

        function procesarContadoresInternos() {
            const text = editorTextArea.value;
            document.getElementById('txt-contador-caracteres').textContent = `Caracteres: ${text.length}`;
            document.getElementById('txt-contador-palabras').textContent = `Palabras: ${text.trim() === "" ? 0 : text.trim().split(/\s+/).length}`;
            document.getElementById('txt-contador-lineas').textContent = `Líneas: ${text === "" ? 0 : text.split('\n').length}`;
        }

        function detectarTipoContenidoPlayground() {
            const cuerpo = editorTextArea.value.toLowerCase();
            if (cuerpo.includes('<html') || cuerpo.includes('<script') || cuerpo.includes('<!doctype')) {
                document.getElementById('rack-playground-html').style.display = 'inline-flex';
            } else {
                document.getElementById('rack-playground-html').style.display = 'none';
            }
        }

        function verificarConectividadCredencialesDispositivo() {
            const sesion = localStorage.getItem("retorica_user_session");
            if (sesion) {
                const datos = JSON.parse(sesion);
                usuarioSesionActiva = datos.email;
                document.getElementById("display-user-activo").textContent = `👤 ${usuarioSesionActiva.split('@')[0].toUpperCase()}`;
                document.getElementById("modulo-auth-screen").classList.add("hidden");
                refrescarBibliotecaVisual();
                
                // Carga de Caché Seguro sin ciclos infinitos
                editorTitleInput.value = localStorage.getItem('ret_cache_fast_title') || '';
                editorTextArea.value = localStorage.getItem('ret_cache_fast_body') || '';
                procesarContadoresInternos();
                detectarTipoContenidoPlayground();
            }
        }

        function ejecutarAccesoDirectoRetorica(event) {
            event.preventDefault();
            const email = document.getElementById("auth-username-field").value;
            localStorage.setItem("retorica_user_session", JSON.stringify({ email }));
            verificarConectividadCredencialesDispositivo();
        }

        function procesarAccesoTerceros(prov) {
            localStorage.setItem("retorica_user_session", JSON.stringify({ email: `usuario.${prov.toLowerCase()}@retorica.app` }));
            verificarConectividadCredencialesDispositivo();
        }

        function mostrarNotificacionToast(msg) {
            const toast = document.getElementById("toast-notificador-global");
            toast.textContent = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2000);
        }

        document.getElementById("btn-cerrar-sesion-activo").onclick = () => {
            localStorage.clear();
            window.location.reload();
        };

        window.addEventListener('DOMContentLoaded', inicializarEcosistema);
    </script>
</body>
</html>
