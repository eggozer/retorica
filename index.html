<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Retórica - Sistema Profesional V2026</title>
    <link rel="manifest" href="./manifest.json?v=2026_Final">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-main: #12141c; --bg-sidebar: #1a1d29; --bg-card: #222736;
            --accent: #00ffcc; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #ff3b30; --btn-3d-bg: #2d3244;
            --btn-3d-shadow-dark: #090b11; --btn-3d-shadow-light: #414963;
            --navy-blue: #000080;
        }
        body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #00a884; --text-main: #1a202c; --text-muted: #718096;
            --border: #cbd5e0; --btn-3d-bg: #e0e5ec;
            --btn-3d-shadow-dark: #b8bec7; --btn-3d-shadow-light: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- ICONO DEL SOL CON DOBLE RUEDA GIRATORIA --- */
        .brand-logo-sol {
            width: 36px; height: 36px;
            background: radial-gradient(circle, #ffe082 20%, #ffca28 60%, #ff8f00 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 15px rgba(255, 202, 40, 0.5);
            flex-shrink: 0;
        }
        /* Rueda Verde (Original) */
        .brand-logo-sol::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px dashed var(--accent); border-radius: 50%;
            animation: rotarVerde 8s linear infinite;
        }
        /* Rueda Azul Marino (Nueva - Sentido Opuesto) */
        .brand-logo-sol::after {
            content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px dotted #000080; border-radius: 50%;
            animation: rotarAzul 12s linear infinite reverse;
        }
        @keyframes rotarVerde { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotarAzul { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- ENCABEZADOS --- */
        .brand-header-3d {
            height: 65px; background: var(--bg-sidebar);
            display: flex; align-items: center; justify-content: center; gap: 15px;
            border-bottom: 1px solid var(--border); z-index: 100;
        }
        .brand-title-3d { font-weight: 900; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; }

        /* --- BARRA DE HERRAMIENTAS (PASARELA) --- */
        .scollable-toolbar-wrapper { 
            height: 85px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; overflow-x: auto; padding: 0 15px; scrollbar-width: none;
        }
        .scollable-toolbar-wrapper::-webkit-scrollbar { display: none; }
        .toolbar-rack { display: flex; align-items: center; gap: 20px; padding: 0 10px; }
        
        .control-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .label-unit { font-size: 0.6rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        /* --- BOTONES 3D --- */
        .btn-3d {
            width: 46px; height: 46px; border-radius: 50%; border: none;
            background: var(--btn-3d-bg); color: var(--text-main);
            box-shadow: 4px 4px 8px var(--btn-3d-shadow-dark), -3px -3px 7px var(--btn-3d-shadow-light);
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            transition: 0.2s;
        }
        .btn-3d:active { box-shadow: inset 3px 3px 6px var(--btn-3d-shadow-dark); transform: scale(0.96); }
        .btn-3d.active { color: var(--accent); box-shadow: inset 2px 2px 5px #000; }

        /* --- SIDEBAR CORREGIDO (ICONO + TITULO) --- */
        .sidebar {
            position: fixed; left: -320px; top: 0; width: 320px; height: 100%;
            background: var(--bg-sidebar); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; border-right: 1px solid var(--border);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }

        /* --- EDITOR --- */
        .editor-container { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; background: var(--bg-main); }
        .doc-title { background: transparent; border: none; border-bottom: 2px solid var(--border); color: var(--accent); font-size: 1.5rem; font-weight: bold; padding: 10px 0; outline: none; margin-bottom: 20px; }
        .textarea-main { flex: 1; background: transparent; border: none; resize: none; outline: none; color: var(--text-main); font-size: 1.1rem; line-height: 1.8; min-height: 400px; }

        /* --- AUTH SCREEN --- */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-sidebar); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .auth-input { width: 100%; padding: 15px; margin: 15px 0; background: var(--bg-main); border: 1px solid var(--border); border-radius: 10px; color: #fff; text-align: center; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: #000; padding: 12px 25px; border-radius: 25px; font-weight: bold; transition: 0.3s; z-index: 6000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="dark-theme">

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <div class="brand-logo-sol" style="margin: 0 auto 20px;"></div>
            <h2 style="color:var(--accent)">RETÓRICA</h2>
            <p style="font-size:0.8rem; color:var(--text-muted)">Sistema de Autenticación Local</p>
            <input type="text" id="user-input" class="auth-input" placeholder="Nombre de usuario...">
            <button onclick="Engine.auth.login()" style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--accent); font-weight:bold; cursor:pointer;">INICIAR SESIÓN</button>
            <div id="user-list" style="margin-top:20px; font-size:0.75rem; color:var(--text-muted)"></div>
        </div>
    </div>

    <header class="brand-header-3d">
        <div class="brand-logo-sol"></div>
        <h1 class="brand-title-3d">Retórica</h1>
    </header>

    <div id="btn-menu-toggle" onclick="document.getElementById('sidebar').classList.add('active')" style="position:fixed; left:15px; top:18px; z-index:150; font-size:1.5rem; cursor:pointer; color:var(--accent)">☰</div>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="brand-logo-sol" style="width:24px; height:24px;"></div>
            <h2 style="color:var(--accent); font-size:1.2rem; letter-spacing:2px;">RETÓRICA</h2>
            <span onclick="document.getElementById('sidebar').classList.remove('active')" style="margin-left:auto; cursor:pointer">✕</span>
        </div>
        
        <div style="padding:20px;">
            <p class="label-unit" style="margin-bottom:15px;">Exportar Documento</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="Engine.export('pdf')" class="btn-3d" style="width:100%; border-radius:8px; font-size:0.8rem;">PDF</button>
                <button onclick="Engine.export('html')" class="btn-3d" style="width:100%; border-radius:8px; font-size:0.8rem;">HTML</button>
                <button onclick="Engine.export('txt')" class="btn-3d" style="width:100%; border-radius:8px; font-size:0.8rem;">TXT</button>
                <button onclick="Engine.export('doc')" class="btn-3d" style="width:100%; border-radius:8px; font-size:0.8rem;">DOCX</button>
            </div>
        </div>

        <div id="library" style="flex:1; overflow-y:auto; padding:20px;">
            <p class="label-unit" style="margin-bottom:10px;">Mis Guiones</p>
            <div id="docs-list"></div>
        </div>

        <div style="padding:20px; border-top:1px solid var(--border)">
            <p id="active-user-display" style="font-size:0.8rem; margin-bottom:10px;"></p>
            <button onclick="location.reload()" style="color:var(--danger); background:transparent; border:none; cursor:pointer;">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="scollable-toolbar-wrapper">
        <div class="toolbar-rack">
            <div class="control-unit">
                <span class="label-unit">Guardar</span>
                <button class="btn-3d" id="btn-save" onclick="Engine.db.save()">✓</button>
            </div>
            <div class="control-unit">
                <span class="label-unit">Nuevo</span>
                <button class="btn-3d" onclick="Engine.editor.clear()">➕</button>
            </div>
            <div class="control-unit">
                <span class="label-unit">Dictado</span>
                <button class="btn-3d" id="btn-mic" onclick="Engine.audio.toggleMic()">🎙️</button>
            </div>
            <div class="control-unit">
                <span class="label-unit">Leer</span>
                <button class="btn-3d" id="btn-play" onclick="Engine.audio.read()">🔊</button>
            </div>
            <div class="control-unit">
                <span class="label-unit">Zoom</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn-3d" style="width:35px; height:35px;" onclick="Engine.editor.zoom(0.1)">+</button>
                    <button class="btn-3d" style="width:35px; height:35px;" onclick="Engine.editor.zoom(-0.1)">-</button>
                </div>
            </div>
            <div class="control-unit">
                <span class="label-unit">App</span>
                <select id="lang-app" onchange="Engine.i18n.updateUI()" style="background:var(--btn-3d-bg); color:#fff; border:none; padding:5px; border-radius:5px;"></select>
            </div>
            <div class="control-unit">
                <span class="label-unit">Tema</span>
                <button class="btn-3d" onclick="Engine.ui.toggleTheme()">🌓</button>
            </div>
        </div>
    </div>

    <main class="editor-container" id="zoom-target">
        <input type="text" id="main-title" class="doc-title" placeholder="Título del proyecto...">
        <textarea id="main-editor" class="textarea-main" placeholder="Escribe aquí..."></textarea>
    </main>

    <footer style="background:var(--bg-sidebar); padding:10px 20px; font-size:0.7rem; display:flex; gap:20px; border-top:1px solid var(--border);">
        <span id="stat-chars">Caracteres: 0</span>
        <span id="stat-words">Palabras: 0</span>
        <span id="stat-lines">Líneas: 0</span>
    </footer>

    <div id="toast" class="toast"></div>

    <script>
        // --- MOTOR RETÓRICA V2026: BLINDAJE ESTRUCTURAL ---
        const Engine = {
            state: { user: null, id: null, zoom: 1.0, isDark: true },
            
            i18n: {
                data: [
                    {c:'es', n:'Español', t:'Título...', s:'Guardado ✓'},
                    {c:'en', n:'English', t:'Title...', s:'Saved ✓'},
                    {c:'fr', n:'Français', n:'Titre...', s:'Enregistré ✓'},
                    {c:'pt', n:'Português', t:'Título...', s:'Salvo ✓'},
                    {c:'it', n:'Italiano', t:'Titolo...', s:'Salvato ✓'},
                    {c:'de', n:'Deutsch', t:'Titel...', s:'Gespeichert ✓'},
                    {c:'ja', n:'日本語', t:'タイトル...', s:'保存されました ✓'},
                    {c:'ru', n:'Русский', t:'Заголовок...', s:'Сохранено ✓'},
                    {c:'zh', n:'中文', t:'标题...', s:'已保存 ✓'},
                    {c:'ar', n:'العربية', t:'عنوان...', s:'تم حفظه ✓'}
                    // ... Aquí se extienden los 30 idiomas sin afectar la lógica
                ],
                init() {
                    const sel = document.getElementById('lang-app');
                    this.data.forEach(l => sel.innerHTML += `<option value="${l.c}">${l.n}</option>`);
                },
                updateUI() { Engine.ui.notify("Idioma actualizado"); }
            },

            auth: {
                login() {
                    const name = document.getElementById('user-input').value.trim();
                    if(!name) return;
                    Engine.state.user = name;
                    let users = JSON.parse(localStorage.getItem('ret_users') || '[]');
                    if(!users.includes(name)) users.push(name);
                    localStorage.setItem('ret_users', JSON.stringify(users));
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('active-user-display').innerText = `Usuario: ${name}`;
                    Engine.db.loadList();
                }
            },

            db: {
                async save() {
                    if(!Engine.state.user) return;
                    const doc = {
                        id: Engine.state.id || Date.now(),
                        user: Engine.state.user,
                        title: document.getElementById('main-title').value || "Sin título",
                        content: document.getElementById('main-editor').value,
                        date: new Date().toISOString()
                    };
                    let db = JSON.parse(localStorage.getItem('ret_docs') || '[]');
                    db = db.filter(d => d.id !== doc.id);
                    db.push(doc);
                    localStorage.setItem('ret_docs', JSON.stringify(db));
                    Engine.state.id = doc.id;
                    Engine.ui.notify("Documento guardado ✓");
                    this.loadList();
                },
                loadList() {
                    const list = document.getElementById('docs-list');
                    const db = JSON.parse(localStorage.getItem('ret_docs') || '[]');
                    const myDocs = db.filter(d => d.user === Engine.state.user);
                    list.innerHTML = myDocs.map(d => `
                        <div onclick="Engine.db.open(${d.id})" style="background:var(--bg-card); padding:10px; border-radius:8px; margin-bottom:8px; cursor:pointer; font-size:0.8rem;">
                            ${d.title} <br><small style="color:var(--text-muted)">${new Date(d.date).toLocaleDateString()}</small>
                        </div>
                    `).join('');
                },
                open(id) {
                    const db = JSON.parse(localStorage.getItem('ret_docs') || '[]');
                    const doc = db.find(d => d.id === id);
                    if(doc) {
                        Engine.state.id = doc.id;
                        document.getElementById('main-title').value = doc.title;
                        document.getElementById('main-editor').value = doc.content;
                        document.getElementById('sidebar').classList.remove('active');
                        Engine.ui.updateStats();
                    }
                }
            },

            audio: {
                rec: null,
                toggleMic() {
                    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if(!Speech) return Engine.ui.notify("No soportado");
                    if(this.rec) { this.rec.stop(); this.rec = null; return; }
                    this.rec = new Speech();
                    this.rec.lang = 'es-MX';
                    this.rec.onresult = (e) => {
                        document.getElementById('main-editor').value += e.results[0][0].transcript;
                        Engine.ui.updateStats();
                    };
                    this.rec.start();
                    Engine.ui.notify("Escuchando...");
                },
                read() {
                    const text = document.getElementById('main-editor').value;
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'es-MX';
                    window.speechSynthesis.speak(u);
                }
            },

            editor: {
                clear() {
                    Engine.state.id = null;
                    document.getElementById('main-title').value = "";
                    document.getElementById('main-editor').value = "";
                    Engine.ui.updateStats();
                },
                zoom(val) {
                    Engine.state.zoom += val;
                    document.getElementById('zoom-target').style.transform = `scale(${Engine.state.zoom})`;
                    document.getElementById('zoom-target').style.transformOrigin = "top center";
                }
            },

            export(type) {
                const title = document.getElementById('main-title').value || "Doc";
                const content = document.getElementById('main-editor').value;
                if(type === 'txt') {
                    const blob = new Blob([content], {type:'text/plain'});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `${title}.txt`;
                    a.click();
                } else if(type === 'pdf') {
                    html2pdf().from(document.getElementById('zoom-target')).save(`${title}.pdf`);
                }
                Engine.ui.notify(`Exportando ${type.toUpperCase()}...`);
            },

            ui: {
                notify(msg) {
                    const t = document.getElementById('toast');
                    t.innerText = msg; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                },
                toggleTheme() {
                    document.body.classList.toggle('light-theme');
                    Engine.state.isDark = !Engine.state.isDark;
                },
                updateStats() {
                    const val = document.getElementById('main-editor').value;
                    document.getElementById('stat-chars').innerText = `Caracteres: ${val.length}`;
                    document.getElementById('stat-words').innerText = `Palabras: ${val.trim() ? val.trim().split(/\s+/).length : 0}`;
                    document.getElementById('stat-lines').innerText = `Líneas: ${val.split('\n').length}`;
                }
            }
        };

        // Inicialización
        window.onload = () => {
            Engine.i18n.init();
            document.getElementById('main-editor').oninput = () => Engine.ui.updateStats();
            // Mostrar lista de usuarios previos
            const users = JSON.parse(localStorage.getItem('ret_users') || '[]');
            if(users.length) document.getElementById('user-list').innerText = "Usuarios conocidos: " + users.join(', ');
        };
    </script>
</body>
</html>
