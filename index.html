<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retórica - Sistema de Control Total</title>
    <link rel="manifest" href="./manifest.json?v=GOD_MODE">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-main: #0f111a; --bg-sidebar: #161925; --bg-card: #1f2335;
            --accent: #00ffcc; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #ff3b30; --btn-3d-bg: #2d3244;
            --electric-blue: #00d2ff; --royal-green: #2ecc71;
        }
        body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #00a884; --text-main: #1a202c; --text-muted: #718096;
            --border: #cbd5e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background: var(--bg-main); color: var(--text-main); }

        /* --- ICONO DEL SOL: TRIPLE CÍRCULO GIRATORIO (PUNTO 1) --- */
        .sol-engine {
            width: 32px; height: 32px; /* Tamaño reducido al círculo amarillo */
            background: radial-gradient(circle, #ffe082 10%, #ffca28 60%, #f57c00 100%);
            border-radius: 50%; position: relative; flex-shrink: 0;
            box-shadow: 0 0 10px rgba(255, 202, 40, 0.4);
        }
        /* Círculo 1: Azul Eléctrico (Horario) */
        .sol-engine::before {
            content: ''; position: absolute; inset: -6px;
            border: 2px solid var(--electric-blue); border-radius: 50%;
            border-top-color: transparent; animation: spin 4s linear infinite;
        }
        /* Círculo 2: Grueso (Anti-horario) */
        .sol-engine::after {
            content: ''; position: absolute; inset: -12px;
            border: 4px double var(--text-muted); border-radius: 50%;
            border-bottom-color: transparent; animation: spin 6s linear infinite reverse;
        }
        /* Círculo 3: Verde (Horario) */
        .sol-crown-3 {
            position: absolute; inset: -18px;
            border: 2px dashed var(--royal-green); border-radius: 50%;
            animation: spin 8s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* INTERFAZ DE ACCESO REAL (PUNTO 3) */
        .auth-gate { position: fixed; inset: 0; background: var(--bg-main); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--bg-sidebar); padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .input-ret { width: 100%; padding: 14px; margin: 10px 0; background: var(--bg-main); border: 1px solid var(--border); border-radius: 12px; color: #fff; text-align: center; font-size: 1rem; outline: none; }
        .input-ret:focus { border-color: var(--accent); }
        .btn-social { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 0.7rem; color: #fff; text-transform: uppercase; }
        .grid-social { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        
        /* MODO DIOS / ADMIN */
        .admin-panel { position: fixed; inset: 0; background: #000; z-index: 10000; padding: 20px; overflow-y: auto; display: none; }
        .user-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; align-items: center; }
        .btn-ban { background: var(--danger); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* LAYOUT PRINCIPAL */
        .header-app { height: 65px; background: var(--bg-sidebar); display: flex; align-items: center; padding: 0 20px; gap: 30px; border-bottom: 1px solid var(--border); }
        .toolbar { height: 85px; background: var(--bg-sidebar); display: flex; align-items: center; overflow-x: auto; padding: 0 15px; gap: 20px; border-bottom: 1px solid var(--border); }
        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: #000; padding: 12px 25px; border-radius: 30px; font-weight: bold; transition: 0.4s; z-index: 10001; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="dark-theme">

    <div id="screen-auth" class="auth-gate">
        <div class="auth-box">
            <div style="display:flex; justify-content:center; margin-bottom:30px;">
                <div class="sol-engine"><div class="sol-crown-3"></div></div>
            </div>
            <h2 id="auth-title" style="letter-spacing:4px; color:var(--accent); margin-bottom:10px;">RETÓRICA</h2>
            
            <div id="oauth-selector">
                <p style="font-size:0.75rem; color:var(--text-muted);">Inicia sesión con:</p>
                <div class="grid-social">
                    <button class="btn-social" style="background:#db4437" onclick="Retorica.auth.oauth('Google')">Google</button>
                    <button class="btn-social" style="background:#4267b2" onclick="Retorica.auth.oauth('Facebook')">Face</button>
                    <button class="btn-social" style="background:#25d366" onclick="Retorica.auth.oauth('WhatsApp')">WhatsApp</button>
                </div>
            </div>

            <div id="form-credentials">
                <input type="text" id="auth-id" class="input-ret" placeholder="Email o Teléfono">
                <div id="pass-area" class="hidden">
                    <input type="password" id="auth-pass" class="input-ret" placeholder="Introduce Contraseña">
                </div>
                <button id="btn-auth-main" onclick="Retorica.auth.handleAction()" style="width:100%; padding:15px; border-radius:12px; background:var(--accent); border:none; font-weight:bold; cursor:pointer; margin-top:10px;">CONTINUAR</button>
                <p id="auth-msg" style="font-size:0.7rem; margin-top:12px; color:var(--text-muted); cursor:pointer;" onclick="Retorica.auth.toggleMode()">¿No tienes cuenta? Regístrate aquí</p>
            </div>
        </div>
    </div>

    <div id="god-mode-panel" class="admin-panel">
        <h1 style="color:var(--accent)">MODO DIOS: CONTROL TOTAL</h1>
        <button onclick="Retorica.admin.close()" style="float:right; background:var(--danger); border:none; color:#fff; padding:10px;">SALIR</button>
        <div style="margin-top:40px;" id="admin-user-list"></div>
    </div>

    <header class="header-app">
        <div onclick="Retorica.ui.toggleSidebar()" style="font-size:1.5rem; cursor:pointer;">☰</div>
        <div class="sol-engine"><div class="sol-crown-3"></div></div>
        <h1 style="font-size:1.2rem; letter-spacing:3px; color:var(--accent)">RETÓRICA</h1>
        <div id="god-trigger" onclick="Retorica.admin.access()" style="margin-left:auto; opacity:0.1;">⚡</div>
    </header>
