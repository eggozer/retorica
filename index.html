<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Retórica - Procesador de Notas</title>
    <link rel="manifest" href="./manifest.json?v=19">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0f1d; --bg-sidebar: #111827; --bg-card: #1f2937;
            --bg-card-active: #374151; --accent: #ffca28; --text-main: #f3f4f6;
            --text-muted: #9ca3af; --border: #2d3748; --danger: #ef4444;
        }
        body.light-theme {
            --bg-main: #f9fafb; --bg-sidebar: #f3f4f6; --bg-card: #ffffff;
            --bg-card-active: #e5e7eb; --text-main: #111827; --text-muted: #6b7280;
            --border: #d1d5db;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        button, select, input { border-radius: 20px !important; height: 38px; padding: 0 12px; background-color: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        
        /* CONTENEDOR DESLIZABLE HORIZONTAL UNIVERSAL (BLINDAJE) */
        .slider-rack-horizontal { width: 100%; display: flex; align-items: center; gap: 8px; overflow-x: auto; white-space: nowrap; padding: 4px 0; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .slider-rack-horizontal::-webkit-scrollbar { display: none; }
        
        /* LOGO INTERMEDIO OPTIMIZADO */
        .brand-logo-balanced { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: 1.15rem; letter-spacing: 1px; }
        .brand-logo-balanced span:first-child { font-size: 1.25rem; }

        /* MENÚ LATERAL REESTRUCTURADO */
        .sidebar { width: 100vw; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; position: absolute; left: 0; top: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s; z-index: 250; visibility: visible; padding: 0 14px; }
        .sidebar.hidden { transform: translateX(-100vw); visibility: hidden; }
        
        .toggle-sidebar-pestaña { position: fixed; left: 12px; top: 10px; width: 42px; height: 42px; background-color: var(--bg-card); color: var(--accent); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; z-index: 300; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50% !important; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        
        .sidebar-header { height: 60px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; padding-left: 54px; }
        .sidebar-header button { width: 38px; height: 38px; border-radius: 50% !important; padding: 0; }

        /* SECCIÓN DE HERRAMIENTAS MUDADAS AL SIDEBAR */
        .sidebar-tools-section { display: flex; flex-direction: column; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .sidebar-tools-section .rack-group { background-color: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 6px 8px; border-radius: 14px; }
        .sidebar-tools-section button { width: 38px; height: 38px; border-radius: 50% !important; padding: 0; }
        .sidebar-tools-section select { border-radius: 14px !important; }
        #btn-render-fl, #btn-main-guardar, .btn-save-opt { width: auto; border-radius: 16px !important; padding: 0 14px; font-weight: bold; }

        /* ORGANIZACIÓN DE PLANTILLAS Y PUBLICIDAD */
        .templates-container-wrapper { flex: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        .section-subtitle { font-size: 0.75rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Vista Gratis: Horizontal deslizable */
        .templates-rack-free { display: flex; } 
        /* Vista Premium (Suscripción): Oculta por defecto para desarrollo */
        .templates-grid-premium { display: none; grid-template-columns: 1fr 1fr; gap: 8px; } 
        
        .document-list-item { background: var(--bg-card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-size: 0.85rem; text-align: center; min-width: 110px; cursor: pointer; }
        
        /* Espacio reservado exclusivamente para banners publicitarios monetizados */
        .adsense-placeholder-bottom { height: 65px; background: linear-gradient(45deg, #1f2937, #111827); border: 1px dashed var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--text-muted); font-weight: bold; margin-bottom: 24px; flex-shrink: 0; width: 100%; }

        /* ÁREA DE TRABAJO ÁGIL */
        .main-container { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; background-color: var(--bg-main); overflow: hidden; }
        .app-header-top { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background-color: var(--bg-sidebar); flex-shrink: 0; }

        .editor-wrapper { flex: 1; display: flex; flex-direction: column; padding: 16px; overflow-y: auto; align-items: center; width: 100%; }
        .rich-editor { width: 100%; min-height: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; line-height: 1.6; outline: none; padding: 4px; overflow-wrap: break-word; }
        .rich-editor.modo-carta { max-width: 800px; background-color: var(--bg-card); padding: 40px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); min-height: 1050px; }
        .rich-editor.modo-oficio { max-width: 850px; background-color: var(--bg-card); padding: 50px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); min-height: 1300px; }

        .stats-bar { width: 100%; height: 32px; border-top: 1px solid var(--border); padding: 6px 16px 0 16px; font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; background-color: var(--bg-sidebar); flex-shrink: 0; }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); background-color: var(--accent); color: #0a0f1d; padding: 10px 20px; font-size: 0.85rem; font-weight: bold; transition: transform 0.3s; z-index: 999; border-radius: 20px; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña">▶</div>

    <div class="sidebar hidden" id="sidebar">
        <div class="sidebar-header">
            <div class="brand-logo-balanced"><span>☀️</span><span>RETÓRICA</span></div>
            <button id="btn-nuevo" title="Nueva nota">➕</button>
        </div>
        
        <div style="padding: 8px 0; border-bottom: 1px solid var(--border); flex-shrink: 0;">
            <div class="section-subtitle" style="margin-bottom: 4px;">Guardar como:</div>
            <div class="slider-rack-horizontal">
                <button class="btn-save-opt" id="btn-main-guardar">HTML</button>
                <button class="btn-save-opt" id="export-pdf">1.- PDF</button>
                <button class="btn-save-opt" id="export-pdf-edit">2.- PDF Editable</button>
                <button class="btn-save-opt" id="export-doc">3.- DOC</button>
            </div>
        </div>

        <div class="sidebar-tools-section">
            <div class="section-subtitle">Herramientas de Audio y Formato:</div>
            <div class="slider-rack-horizontal rack-group">
                <button id="btn-mic" title="Dictado de Voz">🎙️</button>
                <button id="btn-grab-audio-wa" title="Grabar audio">🎙️💬</button>
                <button id="btn-render-fl" title="Renderizar Audio">🎛️ Render</button>
                <button id="btn-lectura" title="Escuchar Texto">🔊</button>
                <button id="btn-insert-table" title="Insertar Tabla">📊</button>
                <button id="btn-open-local" title="Abrir Archivo">📁</button>
                <button id="btn-toggle-tema" title="Cambiar Tema">🌙</button>
            </div>
            <div class="slider-rack-horizontal rack-group">
                <select id="app-lang"><option value="es-MX">Español (MX)</option><option value="en-US">English (US)</option></select>
                <select id="voice-lang"><option value="es-MX">Español (MX)</option></select>
                <select id="font-family-select" style="width:110px;">
                    <option value="sans-serif">Sans-Serif</option>
                    <option value="serif">Serif</option>
                    <option value="monospace">Monospace</option>
                    <option value="cursive">Cursive</option>
                </select>
                <select id="combo-modalidad">
                    <option value="nota">📄 Nota</option>
                    <option value="carta">📄 Carta</option>
                    <option value="oficio">📄 Oficio</option>
                </select>
            </div>
        </div>

        <div class="templates-container-wrapper">
            <div class="section-subtitle">Tus Documentos y Plantillas:</div>
            
            <div class="slider-rack-horizontal templates-rack-free" id="document-list">
                </div>

            <div class="templates-grid-premium" id="document-list-premium"></div>
        </div>

        <div class="adsense-placeholder-bottom">
            ESPACIO DE PUBLICIDAD DISPONIBLE (MONETIZACIÓN)
        </div>
    </div>

    <div class="main-container">
        <header class="app-header-top">
            <div class="brand-logo-balanced"><span>☀️</span><span>RETÓRICA</span></div>
        </header>

        <div class="editor-wrapper" id="editor-container">
            <div id="editor" class="rich-editor" contenteditable="true" placeholder="Escribe aquí..."></div>
        </div>

        <div class="stats-bar">
            <div id="stats-text">Caracteres: 0</div>
            <div id="lbl-file-dates">Sin guardar</div>
        </div>
    </div>

    <input type="file" id="file-input-hidden" accept=".html,.txt,.doc" style="display:none;">
    <div class="toast" id="toast-notif">Operación exitosa</div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
