<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Retórica V10.6 - Estudio Universal</title>
<style>
:root{--p:#0F172A;--bg:#F8FAFC;--accent:#2563EB;--script:#7C3AED;--podcast:#EC4899;--ok:#10B981;--muted:#64748B;}
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body{background:var(--bg);color:var(--p);height:100vh;overflow:hidden;}
#v-auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--p);z-index:9999;}
.auth-box{background:white;padding:30px;width:90%;max-width:350px;border-radius:20px;text-align:center;}
.input-field{width:100%;padding:12px;margin:10px 0;border:1px solid #CCC;border-radius:8px;}
.btn{width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
.vista{display:none;height:100vh;padding:20px;overflow-y:auto;}
.activa{display:block;}
header{height:60px;display:flex;justify-content:space-between;align-items:center;padding:0 20px;background:white;border-bottom:1px solid #EEE;}
#editor{min-height:60vh;padding:20px;background:white;border-radius:10px;border:1px solid #DDD;margin:10px 0;}
.footer{position:fixed;bottom:0;width:100%;display:flex;gap:5px;padding:10px;background:white;border-top:1px solid #EEE;}
.btn-tool{flex:1;padding:15px;border:none;color:white;font-weight:bold;font-size:10px;border-radius:8px;}
#dna-panel{display:none;position:fixed;bottom:70px;left:10px;right:10px;background:#FFF;padding:20px;border-radius:15px;box-shadow:0 0 20px rgba(0,0,0,0.3);z-index:9990;}
</style>
</head>
<body>
<div id="v-auth"><div class="auth-box"><h1>RETÓRICA V10.6</h1><input id="u" class="input-field" placeholder="Usuario"><input id="p" type="password" class="input-field" placeholder="Clave"><button class="btn" onclick="auth()">ENTRAR</button></div></div>
<header id="header" style="display:none"><div onclick="toggleMenu()">☰</div><div>ESTUDIO</div><div id="u-name"></div></header>
<div id="v-main" class="vista"><div id="grid"></div><button onclick="newDoc()" style="position:fixed;bottom:80px;right:20px;width:60px;height:60px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:30px;">+</button></div>
<div id="v-edit" class="vista"><div id="editor" contenteditable="true"></div><div class="footer"><button class="btn-tool" style="background:var(--script)" onclick="saveDoc()">GUARDAR</button><button class="btn-tool" style="background:var(--podcast)" onclick="showDNA()">ADN INSPIRACIÓN</button></div></div>
<div id="dna-panel"><h3 style="color:var(--accent)">Módulo ADN</h3><p id="dna-info" style="font-size:12px;margin:10px 0"></p><button class="btn" onclick="document.getElementById('dna-panel').style.display='none'">CERRAR</button></div>
<script>
const dev=/Pixel/i.test(navigator.userAgent)?"Pixel 2":/Redmi/i.test(navigator.userAgent)?"Redmi":"Android 5";
let session=JSON.parse(localStorage.getItem('ret_session'));
function auth(){session={u:document.getElementById('u').value,d:dev};localStorage.setItem('ret_session',JSON.stringify(session));start();}
function start(){document.getElementById('v-auth').style.display='none';document.getElementById('header').style.display='flex';go('v-main');}
function go(v){document.querySelectorAll('.vista').forEach(x=>x.classList.remove('activa'));document.getElementById(v).classList.add('activa');}
function saveDoc(){
    let content=document.getElementById('editor').innerHTML;
    let trace={dev:dev,time:new Date().toLocaleString()};
    localStorage.setItem('last_trace',JSON.stringify(trace));
    localStorage.setItem('doc_data',content);
    alert("Guardado: "+trace.dev+" @ "+trace.time);
}
function showDNA(){
    let sel=window.getSelection().toString();
    if(!sel){alert("Selecciona un párrafo para ADN");return;}
    document.getElementById('dna-info').innerText="Analizando linaje para: '"+sel+"'. Conectando con influencias sugeridas...";
    document.getElementById('dna-panel').style.display='block';
}
function newDoc(){document.getElementById('editor').innerHTML="";go('v-edit');}
window.onload=()=>{if(session)start();};
</script>
</body>
</html>
