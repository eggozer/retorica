<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica V14</title>
    <style>
        :root { --p: #0a0f1a; --bg: #ffffff; --accent: #2563eb; --muted: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Login */
        #v-auth { position: fixed; inset: 0; background: var(--p); z-index: 11000; display: flex; align-items: center; justify-content: center; color: white; }
        .auth-box { background: white; padding: 40px; border-radius: 25px; color: var(--p); text-align: center; width: 90%; max-width: 380px; }

        /* Header y Botones Superiores */
        header { padding: 10px 15px; border-bottom: 1px solid #eee; background: #fff; flex-shrink: 0; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .action-btns { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .btn-round { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: #f8fafc; font-size: 13px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .btn-accent { background: var(--accent); color: white; border: none; }

        /* Editor */
        #editor { flex: 1; padding: 25px; overflow-y: auto; font-size: 19px; outline: none; padding-bottom: 60vh; line-height: 1.6; }

        /* Menú y Biblioteca */
        #sidebar { position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%; background: white; z-index: 10000; transition: 0.3s; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.2); overflow-y: auto; }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; }

        .library-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; max-height: 500px; overflow-y: auto; }
        .doc-card { background: #f1f5f9; padding: 12px; border-radius: 12px; height: 110px; overflow: hidden; font-size: 11px; border: 1px solid #e2e8f0; position: relative; }
        .doc-card b { display: block; margin-bottom: 5px; color: var(--p); font-size: 12px; }

        /* Configuración de Voces */
        #voice-config { display: none; padding: 15px; background: #f1f5f9; border-radius: 15px; margin-top: 10px; border: 1px solid #ddd; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-top: 5px; }

        #page-stats { padding: 10px 20px; font-size: 11px; color: var(--muted); border-top: 1px solid #eee; background: #fafafa; }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-box">
        <h2>RETÓRICA</h2>
        <input type="email" id="u-email" style="width:100%; padding:15px; margin:20px 0; border-radius:12px; border:1px solid #ddd" placeholder="Correo de sincronización">
        <button onclick="saveUser()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold">ENTRAR</button>
    </div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <button onclick="toggleMenu()" style="float:right; border:none; background:none; font-size:20px">✕</button>
    <h2 style="margin-bottom:20px">Estudio</h2>
    
    <div id="menu-actions">
        <button class="btn-round btn-accent" style="width:100%; margin-bottom:10px" onclick="nuevoProyecto()">+ NUEVO PROYECTO</button>
        <div id="voice-list-menu"></div>
    </div>

    <p style="margin-top:20px; font-size:11px; font-weight:bold; color:var(--accent)">BIBLIOTECA (6 FILAS)</p>
    <div class="library-grid" id="library"></div>

    <button onclick="toggleVoices()" style="width:100%; margin-top:20px; padding:10px; border-radius:10px; border:1px solid #ddd">⚙️ Configurar Voces</button>
    <div id="voice-config">
        <label style="font-size:12px">Elegir Voz Predeterminada:</label>
        <select id="voice-select" onchange="updateVoice()"></select>
        <button onclick="addVoiceBtn()" style="width:100%; margin-top:10px; padding:8px; background:var(--p); color:white; border-radius:8px">Añadir a barra superior</button>
    </div>

    <button onclick="logout()" style="margin-top:40px; color:red; border:none; background:none; font-weight:bold">Cerrar Sesión</button>
</nav>

<div id="main-app" style="display:none; flex:1; flex-direction:column;">
    <header>
        <div class="top-bar">
            <div style="font-size:28px" onclick="toggleMenu()">☰</div>
            <div style="font-weight:900; letter-spacing:1px">RETÓRICA</div>
            <button class="btn-round btn-accent" onclick="guardarManual()">💾 GUARDAR</button>
        </div>
        <div class="action-btns" id="top-actions">
            <button class="btn-round" onclick="dictar()">🎤 Dictar</button>
            <!-- Aquí se insertarán las voces elegidas -->
        </div>
    </header>
    
    <div id="editor" contenteditable="true" oninput="updatePreview()" placeholder="Escribe tu relámpago..."></div>
    
    <div id="page-stats">0 caracteres | 0 palabras</div>
</div>

<script>
    let voices = [];
    let selectedVoices = JSON.parse(localStorage.getItem('ret_fav_voices')) || [];
    let library = JSON.parse(localStorage.getItem('ret_library')) || [];

    window.onload = () => {
        if (localStorage.getItem('ret_user')) {
            document.getElementById('v-auth').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            loadLibrary();
            renderVoiceButtons();
            initSpeech();
        }
    };

    function initSpeech() {
        window.speechSynthesis.onvoiceschanged = () => {
            voices = window.speechSynthesis.getVoices();
            const select = document.getElementById('voice-select');
            select.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name} (${v.lang})</option>`).join('');
        };
    }

    function toggleMenu() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        sb.classList.toggle('open');
        ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
    }

    function toggleVoices() {
        const config = document.getElementById('voice-config');
        config.style.display = config.style.display === 'block' ? 'none' : 'block';
    }

    function addVoiceBtn() {
        const idx = document.getElementById('voice-select').value;
        const voice = voices[idx];
        if(!selectedVoices.find(v => v.name === voice.name)) {
            selectedVoices.push({name: voice.name, index: idx});
            localStorage.setItem('ret_fav_voices', JSON.stringify(selectedVoices));
            renderVoiceButtons();
        }
    }

    function renderVoiceButtons() {
        const container = document.getElementById('top-actions');
        const menuContainer = document.getElementById('voice-list-menu');
        
        // Limpiar botones dinámicos (mantener Dictar)
        container.innerHTML = '<button class="btn-round" onclick="dictar()">🎤 Dictar</button>';
        menuContainer.innerHTML = '';

        selectedVoices.forEach(v => {
            const btn = `<button class="btn-round" onclick="leerConVoz(${v.index})">🔊 ${v.name.split(' ')[0]}</button>`;
            container.innerHTML += btn;
            menuContainer.innerHTML += `<div style="display:flex; justify-content:space-between; margin:5px 0;">${btn} <span onclick="removeVoice('${v.name}')" style="color:red">✕</span></div>`;
        });
    }

    function removeVoice(name) {
        selectedVoices = selectedVoices.filter(v => v.name !== name);
        localStorage.setItem('ret_fav_voices', JSON.stringify(selectedVoices));
        renderVoiceButtons();
    }

    function guardarManual() {
        const content = document.getElementById('editor').innerHTML;
        const text = document.getElementById('editor').innerText;
        if(!text.trim()) return alert("Nada que guardar");
        
        const doc = {
            id: Date.now(),
            title: text.substring(0, 20) || "Sin título",
            preview: text.substring(0, 80) + "...",
            content: content,
            date: new Date().toLocaleDateString()
        };
        
        library.unshift(doc);
        if(library.length > 12) library.pop(); // Límite de 6 filas x 2 columnas
        localStorage.setItem('ret_library', JSON.stringify(library));
        loadLibrary();
        alert("Proyecto guardado en biblioteca");
    }

    function loadLibrary() {
        const container = document.getElementById('library');
        container.innerHTML = library.map(doc => `
            <div class="doc-card" onclick="cargarDoc(${doc.id})">
                <b>${doc.title}</b>
                ${doc.preview}
                <div style="position:absolute; bottom:5px; right:5px; font-size:9px; color:gray">${doc.date}</div>
            </div>
        `).join('');
    }

    function cargarDoc(id) {
        const doc = library.find(d => d.id === id);
        if(doc) {
            document.getElementById('editor').innerHTML = doc.content;
            updatePreview();
            toggleMenu();
        }
    }

    function nuevoProyecto() {
        if(confirm("¿Nuevo proyecto? Asegúrate de haber guardado el anterior.")) {
            document.getElementById('editor').innerHTML = "";
            updatePreview();
            toggleMenu();
        }
    }

    function leerConVoz(idx) {
        window.speechSynthesis.cancel();
        const text = window.getSelection().toString() || document.getElementById('editor').innerText;
        const u = new SpeechSynthesisUtterance(text);
        u.voice = voices[idx];
        window.speechSynthesis.speak(u);
    }

    function dictar() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-MX';
        rec.onresult = (e) => {
            document.getElementById('editor').innerHTML += " " + e.results[0][0].transcript;
            updatePreview();
        };
        rec.start();
    }

    function updatePreview() {
        const text = document.getElementById('editor').innerText;
        document.getElementById('page-stats').innerText = `${text.length} caracteres | ${text.trim().split(/\s+/).length} palabras`;
    }

    function saveUser() {
        const email = document.getElementById('u-email').value;
        if(email) { localStorage.setItem('ret_user', email); location.reload(); }
    }

    function logout() { localStorage.removeItem('ret_user'); location.reload(); }
</script>
</body>
</html>
