<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica V11.9 - Estudio Maestro</title>
    <style>
        :root {
            --p: #0f172a;
            --bg: #ffffff;
            --accent: #2563eb;
            --muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: var(--bg);
            color: var(--p);
            height: 100vh;
            overflow: hidden;
        }

        /* --- PANTALLA DE ACCESO --- */
        #v-auth {
            position: fixed;
            inset: 0;
            background: var(--p);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-box {
            background: white;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .auth-box h1 {
            font-size: 28px;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }
        .input-field {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
        }
        .input-field:focus {
            border-color: var(--accent);
        }
        .btn-main {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            font-size: 16px;
        }

        /* --- MENÚ LATERAL --- */
        #sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 9000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 30px rgba(0,0,0,0.15);
            padding: 80px 30px 30px;
        }
        #sidebar.open {
            left: 0;
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 8999;
        }
        .overlay.active {
            display: block;
        }

        /* --- ESTRUCTURA PRINCIPAL --- */
        #main-app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid #f1f5f9;
            background: white;
        }
        .burger {
            font-size: 32px;
            cursor: pointer;
            user-select: none;
        }

        /* --- EDITOR Y SCROLL DE SEGURIDAD --- */
        #editor-container {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            position: relative;
        }
        #editor {
            min-height: 100%;
            padding: 40px 30px 300px;
            font-size: 21px;
            line-height: 1.8;
            outline: none;
            color: #1e293b;
        }
        #editor:empty:before {
            content: attr(placeholder);
            color: #cbd5e1;
        }

        /* --- HILO DE ARIADNA --- */
        #ariadna {
            position: fixed;
            bottom: 95px;
            right: 25px;
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            background: rgba(255,255,255,0.95);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            pointer-events: none;
        }

        /* --- BARRA DE HERRAMIENTAS (DOCK) --- */
        .toolbar {
            height: 85px;
            display: flex;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .t-btn {
            flex: 1;
            border: none;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }
        .t-btn i {
            font-size: 26px;
            color: var(--p);
            font-style: normal;
            margin-bottom: 5px;
        }

        /* --- MODALES --- */
        .modal {
            display: none;
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: white;
            border: 2px solid var(--p);
            border-radius: 24px;
            padding: 30px;
            z-index: 9500;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.25);
        }
        .modal.active {
            display: block;
        }
        .m-title {
            font-weight: 900;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .export-option {
            width: 100%;
            padding: 18px;
            margin-top: 12px;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            background: white;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .export-option:active {
            background: #f8fafc;
            border-color: var(--accent);
        }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-box">
        <h1>RETÓRICA</h1>
        <p style="color: var(--muted); font-size: 14px; margin-bottom: 30px;">Estudio Maestro V11.9</p>
        <input type="email" id="u-email" class="input-field" placeholder="Email para Sincronización">
        <button class="btn-main" onclick="startSystem()">INGRESAR AL ESTUDIO</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeNav()"></div>

<nav id="sidebar">
    <h2 style="margin-bottom: 25px; font-weight: 900;">Biblioteca</h2>
    <div id="project-info" style="padding: 20px; background: #f8fafc; border-radius: 15px;">
        <span style="font-size: 12px; color: var(--muted); font-weight: bold; text-transform: uppercase;">Estado de Red</span>
        <p id="side-status" style="font-weight: 700; margin-top: 5px;">Conectado localmente</p>
        <p id="side-dev" style="font-size: 11px; color: var(--muted); margin-top: 5px;"></p>
    </div>
    <div style="position: absolute; bottom: 40px; left: 30px; right: 30px;">
        <button onclick="location.reload()" style="color: var(--danger); font-weight: 900; border: none; background: none; font-size: 14px; cursor: pointer;">CERRAR SESIÓN</button>
    </div>
</nav>

<div id="main-app">
    <header>
        <div class="burger" onclick="openNav()">☰</div>
        <div style="font-weight: 900; letter-spacing: 2px; font-size: 14px;">ESTUDIO ABIERTO</div>
        <div style="width: 32px;"></div>
    </header>

    <main id="editor-container">
        <div id="editor" contenteditable="true" placeholder="Escribe tu relámpago..." oninput="syncNow()"></div>
        <div id="ariadna">Detectando...</div>
    </main>

    <div id="modal-dna" class="modal">
        <div class="m-title">🧬 Portal de Linaje</div>
        <p style="font-size: 14px; color: var(--muted); margin-bottom: 15px;">Vincula tu inspiración externa:</p>
        <input type="text" id="dna-in" class="input-field" placeholder="Autores, músicos, influencias...">
        <button class="btn-main" onclick="applyDNA()">ESTABLECER VÍNCULO</button>
        <button onclick="hideModals()" style="width:100%; margin-top:15px; border:none; background:none; color:var(--muted); font-weight: 700;">VOLVER</button>
    </div>

    <div id="modal-save" class="modal">
        <div class="m-title">💾 Guardar Como</div>
        <button class="export-option" onclick="runExport('txt')">Texto Plano <span>.txt</span></button>
        <button class="export-option" onclick="runExport('html')">Documento Web <span>.html</span></button>
        <button class="export-option" onclick="window.print()">Archivo PDF <span>PDF</span></button>
        <button onclick="hideModals()" style="width:100%; margin-top:25px; border:none; background:none; color:var(--danger); font-weight: 900;">CANCELAR</button>
    </div>

    <footer class="toolbar">
        <button class="t-btn" onclick="toolDictate()"><i>🎤</i>DICTAR</button>
        <button class="t-btn" onclick="toolRead()"><i>🔊</i>LEER</button>
        <button class="t-btn" onclick="showDNA()"><i>🧬</i>ADN</button>
        <button class="t-btn" onclick="showSave()"><i>💾</i>GUARDAR</button>
    </footer>
</div>

<script>
    // Identificación de Hardware por UserAgent
    const checkDevice = () => {
        const u = navigator.userAgent;
        if (/Pixel/i.test(u)) return "Google Pixel 2";
        if (/Redmi/i.test(u)) return "Redmi Note";
        if (/Android 5/i.test(u)) return "Tablet Legacy A5";
        return "Dispositivo Móvil";
    };

    const myDevice = checkDevice();

    // Gestión de UI
    function openNav() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('active');
    }
    function closeNav() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
    }
    function showDNA() { hideModals(); document.getElementById('modal-dna').classList.add('active'); }
    function showSave() { hideModals(); document.getElementById('modal-save').classList.add('active'); }
    function hideModals() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    }

    // Inicialización
    function startSystem() {
        const mail = document.getElementById('u-email').value;
        if(!mail) { alert("Ingresa un correo para el resguardo de red."); return; }
        
        document.getElementById('v-auth').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('side-dev').innerText = "Vínculo: " + myDevice;
        
        loadLast();
    }

    // Sincronización y Ariadna
    function syncNow() {
        const html = document.getElementById('editor').innerHTML;
        const clock = new Date().toLocaleTimeString();
        
        const packet = {
            content: html,
            dev: myDevice,
            time: clock
        };

        localStorage.setItem('retorica_master_v11', JSON.stringify(packet));
        document.getElementById('ariadna').innerText = `Rastro: ${myDevice} | ${clock}`;
    }

    function loadLast() {
        const data = localStorage.getItem('retorica_master_v11');
        if(data) {
            const p = JSON.parse(data);
            document.getElementById('editor').innerHTML = p.content;
            document.getElementById('ariadna').innerText = `Último Relevo: ${p.dev}`;
        }
    }

    // Herramientas Audio
    function toolDictate() {
        if (!('webkitSpeechRecognition' in window)) { alert("Dictado no disponible."); return; }
        const rec = new webkitSpeechRecognition();
        rec.lang = 'es-MX';
        rec.onresult = (e) => {
            document.getElementById('editor').innerHTML += " " + e.results[0][0].transcript;
            syncNow();
        };
        rec.start();
    }

    function toolRead() {
        const talk = new SpeechSynthesisUtterance(document.getElementById('editor').innerText);
        talk.lang = 'es-MX';
        window.speechSynthesis.speak(talk);
    }

    // ADN de Linaje
    function applyDNA() {
        const input = document.getElementById('dna-in').value;
        const sel = window.getSelection().toString();
        alert(`ADN vinculado: Conectando con el linaje de ${input}`);
        hideModals();
    }

    // Exportación Nativa
    function runExport(format) {
        const text = format === 'txt' ? document.getElementById('editor').innerText : document.getElementById('editor').innerHTML;
        const blob = new Blob([text], { type: format === 'txt' ? 'text/plain' : 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Retorica_${myDevice}_${Date.now()}.${format}`;
        a.click();
        hideModals();
    }
</script>
</body>
</html>
