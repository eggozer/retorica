<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica - Entorno Local Puro</title>
    <style>
        :root { 
            --p: #0a0f1a; 
            --accent: #2563eb; 
            --bg: #ffffff; 
            --editor-bg: #ffffff; 
            --text-color: #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { background: var(--bg); color: var(--text-color); height: 100vh; width: 100vw; overflow: hidden; position: relative; }

        /* HEADER FIJO */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; background: #fff; 
            border-bottom: 1px solid #eee; z-index: 1000; height: 100px;
        }
        .bar-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 15px; height: 50px; }
        
        .logo-container { display: flex; align-items: center; gap: 8px; }
        .sun-icon { width: 22px; height: 22px; fill: none; stroke: #eab308; stroke-width: 2.5; stroke-linecap: round; }
        .logo { font-weight: 900; letter-spacing: 2px; font-size: 16px; color: var(--p); }
        
        .hamb { font-size: 24px; cursor: pointer; background: none; border: none; padding: 5px; outline: none; }

        /* BARRA DE HERRAMIENTAS */
        .toolbar { padding: 0 15px; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; height: 45px; align-items: center; }
        .toolbar::-webkit-scrollbar { display: none; }
        .btn-t { 
            padding: 8px 12px; border-radius: 12px; border: 1px solid #e2e8f0; 
            background: #f8fafc; font-size: 11px; font-weight: bold; cursor: pointer; display: inline-block; outline: none;
        }
        .btn-active { background: #fee2e2 !important; color: #dc2626 !important; border-color: #fecaca !important; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; outline: none; }

        .select-t { padding: 8px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 11px; font-weight: bold; outline: none; }

        /* EDITOR CON SCROLL NATIVO */
        #editor { 
            position: absolute; top: 100px; bottom: 30px; left: 0; width: 100%;
            padding: 20px; overflow-y: auto; font-size: 18px; outline: none; 
            line-height: 1.6; background: var(--editor-bg); color: var(--text-color);
            -webkit-overflow-scrolling: touch; word-wrap: break-word;
        }
        #editor:empty:before { content: "Escribe o usa las herramientas de voz..."; color: #cbd5e1; }

        #editor table { border-collapse: collapse; margin: 15px 0; background: transparent; min-width: 60px; }
        #editor td, #editor th { padding: 10px; text-align: left; min-width: 40px; }

        /* SIDEBAR / BIBLIOTECA */
        #sidebar { 
            position: fixed; top: 0; left: -100%; width: 85%; max-width: 340px; 
            height: 100%; background: #fff; z-index: 2000; transition: 0.3s; 
            box-shadow: 5px 0 20px rgba(0,0,0,0.2); padding: 20px; display: flex; flex-direction: column; 
        }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }

        .doc-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 15px; -webkit-overflow-scrolling: touch; }
        
        .doc-card { width: 100%; padding: 12px; border-radius: 15px; background: #f1f5f9; border: 1px solid #e2e8f0; flex-shrink: 0; overflow: hidden; cursor: pointer; }
        .doc-card b { font-size: 13px; color: var(--p); display: block; margin-bottom: 4px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .doc-card p { font-size: 11px; color: #64748b; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
        
        .doc-meta { font-size: 9px; color: #94a3b8; display: flex; flex-direction: column; gap: 1px; border-top: 1px dashed #e2e8f0; padding-top: 4px; }

        .card-actions { display: none; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #cbd5e1; }
        .doc-card.selected { border-color: var(--accent); background: #e0f2fe; }
        .doc-card.selected .card-actions { display: grid; }

        .btn-card { padding: 8px 4px; border-radius: 8px; border: none; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; outline: none; }
        .btn-del { background: #fee2e2; color: #ef4444; }
        .btn-load { background: var(--accent); color: white; }
        .btn-copy { background: #e0f2fe; color: #0369a1; }
        .btn-share { background: #f0fdf4; color: #16a34a; }

        /* PIE DE PÁGINA */
        .footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 30px;
            padding: 0 15px; font-size: 10px; background: #f8fafc; 
            border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="logo-container">
            <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 18.36l1.42-1.42M18.36 4.22l1.42-1.42"/></svg>
            <h2 style="font-weight:900; font-size:16px;">BIBLIOTECA</h2>
        </div>
        <button onclick="nuevoDoc()" style="background:var(--accent); color:white; border:none; width:35px; height:35px; border-radius:50%; font-weight:bold; font-size:18px; cursor:pointer;">+</button>
    </div>
    
    <div class="doc-list" id="doc-list"></div>
</nav>

<header>
    <div class="bar-top">
        <button class="hamb" onclick="toggleMenu()">☰</button>
        <div class="logo-container">
            <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 18.36l1.42-1.42M18.36 4.22l1.42-1.42"/></svg>
            <div class="logo">RETÓRICA</div>
        </div>
        <button class="btn-save" onclick="guardarLocalHTML()">GUARDAR</button>
    </div>
    <div class="toolbar">
        <button class="btn-t" onclick="ejecutarComando('undo')">↩️</button>
        <button class="btn-t" onclick="ejecutarComando('redo')">↪️</button>
        
        <button class="btn-t" onclick="alternarDictadoMic()" id="mic-btn">🎤 MIC (DICTADO)</button>
        <button class="btn-t" onclick="ejecutarLecturaLocal()" id="read-btn">🔊 LECTURA</button>

        <button class="btn-t" onclick="insertarTabla()">📊 TABLA</button>
        <select class="select-t" id="table-border-width">
            <option value="1px">🔲 1px</option>
            <option value="2px">🔲 2px</option>
        </select>
        
        <button class="btn-t" onclick="formato('bold')"><b>B</b></button>
        <button class="btn-t" onclick="formato('italic')"><i>I</i></button>

        <select class="select-t" id="text-color-select" onchange="cambiarColorTexto()">
            <option value="#000000">⚫ Texto</option>
            <option value="#ef4444">🔴 Rojo</option>
        </select>

        <select class="select-t" id="bg-color-select" onchange="cambiarColorRelleno()">
            <option value="transparent">⚪ Fondo</option>
            <option value="#fef08a">🟡 Resaltar</option>
        </select>
        
        <select class="select-t" id="palette-select" onchange="cambiarPaleta()">
            <option value="claro">☀️ Claro</option>
            <option value="oscuro">🌙 Oscuro</option>
        </select>

        <select class="select-t" id="lang-select">
            <option value="es-MX">🇲🇽 Es (MX)</option>
            <option value="en-US">🇺🇸 En (US)</option>
        </select>
    </div>
</header>

<div id="editor" contenteditable="true" oninput="comprobarVacioYStats()"></div>

<div class="footer">
    <span id="char-count">0 caracteres</span>
    <span>v17.5 - Estable Local</span>
</div>

<script>
    var DB_KEY = "retorica_local_db";
    var activeId = null;
    var reconocimientoVoz = null;
    var estaDictando = false;

    window.onload = function() { renderLib(); };

    function comprobarVacioYStats() {
        var ed = document.getElementById('editor');
        var txt = ed.innerText || ed.textContent || "";
        if (txt.trim().length === 0) { ed.innerHTML = ""; }
        document.getElementById('char-count').innerText = txt.length + " caracteres";
    }

    function ejecutarComando(cmd) {
        document.execCommand(cmd, false, null);
        comprobarVacioYStats();
    }

    function toggleMenu() {
        var s = document.getElementById('sidebar');
        var o = document.getElementById('overlay');
        var isOpen = s.classList.toggle('open');
        o.style.display = isOpen ? 'block' : 'none';
        if(isOpen) renderLib();
    }

    function insertarTabla() {
        var filas = prompt("Filas:", "2");
        var columnas = prompt("Columnas:", "3");
        if(!filas || !columnas) return;
        var g = document.getElementById('table-border-width').value;
        var htmlTabla = "<table>";
        for (var i = 0; i < parseInt(filas); i++) {
            htmlTabla += "<tr>";
            for (var j = 0; j < parseInt(columnas); j++) { 
                htmlTabla += "<td style='border:" + g + " solid #cbd5e1;'>&nbsp;</td>"; 
            }
            htmlTabla += "</tr>";
        }
        htmlTabla += "</table><p>&nbsp;</p>";
        document.getElementById('editor').focus();
        document.execCommand('insertHTML', false, htmlTabla);
    }

    function alternarDictadoMic() {
        if (estaDictando) {
            if(reconocimientoVoz) reconocimientoVoz.stop();
            return;
        }
        var Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Rec) return alert("Dictado no soportado en este navegador.");

        reconocimientoVoz = new Rec();
        reconocimientoVoz.lang = document.getElementById('lang-select').value;
        reconocimientoVoz.continuous = false;
        reconocimientoVoz.interimResults = false;

        reconocimientoVoz.onstart = function() {
            estaDictando = true;
            document.getElementById('mic-btn').classList.add('btn-active');
            document.getElementById('mic-btn').innerText = "🛑 PARAR MIC";
        };
        reconocimientoVoz.onresult = function(e) {
            var txt = e.results[0][0].transcript;
            document.getElementById('editor').focus();
            document.execCommand('insertText', false, " " + txt);
            comprobarVacioYStats();
        };
        reconocimientoVoz.onerror = function() { alert("Error en micrófono local."); };
        reconocimientoVoz.onend = function() {
            estaDictando = false;
            document.getElementById('mic-btn').classList.remove('btn-active');
            document.getElementById('mic-btn').innerText = "🎤 MIC (DICTADO)";
        };
        reconocimientoVoz.start();
    }

    function ejecutarLecturaLocal() {
        window.speechSynthesis.cancel();
        var txt = window.getSelection().toString();
        if (!txt || txt.trim().length === 0) {
            var res = document.getElementById('editor').querySelectorAll('span[style*="background-color"]');
            if (res.length > 0) {
                var f = [];
                for (var i = 0; i < res.length; i++) { f.push(res[i].innerText || res[i].textContent); }
                txt = f.join(" ");
            }
        }
        if (!txt || !txt.trim()) { txt = document.getElementById('editor').innerText || document.getElementById('editor').textContent || ""; }
        if (!txt.trim()) return alert("No hay texto para leer.");

        var ut = new SpeechSynthesisUtterance(txt);
        ut.lang = document.getElementById('lang-select').value;
        window.speechSynthesis.speak(ut);
    }

    /* 1. GUARDADO LOCAL HTML EXCLUSIVO SIN DESCARGAS */
    function guardarLocalHTML() {
        var contenidoHTML = document.getElementById('editor').innerHTML;
        var contenidoTexto = document.getElementById('editor').innerText || document.getElementById('editor').textContent || "";
        if(!contenidoTexto.trim()) return alert("El editor está vacío.");

        var db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
        var ahora = new Date().toLocaleString();

        if(activeId) {
            for(var i = 0; i < db.length; i++) {
                if(db[i].id === activeId) { 
                    db[i].html = contenidoHTML; 
                    db[i].prev = contenidoTexto.substring(0, 50);
                    db[i].updated = ahora;
                    break; 
                }
            }
            alert("Documento actualizado internamente.");
        } else {
            activeId = Date.now();
            var tit = contenidoTexto.substring(0, 20).toUpperCase() || "NUEVO GUION";
            db.unshift({ 
                id: activeId, 
                title: tit, 
                prev: contenidoTexto.substring(0, 50), 
                html: contenidoHTML,
                created: ahora,
                updated: ahora
            });
            alert("Guardado con éxito en la Biblioteca Local.");
        }
        localStorage.setItem(DB_KEY, JSON.stringify(db));
    }

    /* 2. RENDER DE BIBLIOTECA CON METADATOS Y BOTONES COMPLETOS */
    function renderLib() {
        var db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
        var list = document.getElementById('doc-list');
        list.innerHTML = "";

        if(db.length === 0) {
            list.innerHTML = "<p style='font-size:12px; color:#64748b; text-align:center; padding:20px;'>Biblioteca vacía</p>";
            return;
        }

        for(var i = 0; i < db.length; i++) {
            var doc = db[i];
            var card = document.createElement('div');
            card.className = 'doc-card';
            card.id = 'card-' + doc.id;
            
            var fechaCreacion = doc.created || "No registrada";
            var fechaModif = doc.updated || "No registrada";

            card.innerHTML = (function(d, fC, fM){
                return '<div onclick="selectCard(' + d.id + ')">' +
                    '<b>' + d.title + '</b>' +
                    '<p>' + d.prev + '...</p>' +
                    '<div class="doc-meta">' +
                        '<span>📅 Creado: ' + fC + '</span>' +
                        '<span>🔄 Modificado: ' + fM + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="card-actions">' +
                    '<button class="btn-card btn-load" onclick="cargarDoc(' + d.id + ')">ABRIR</button>' +
                    '<button class="btn-card btn-copy" onclick="copiarTextoDoc(' + d.id + ')">COPIAR</button>' +
                    '<button class="btn-card btn-share" onclick="compartirDoc(' + d.id + ')">COMPARTIR</button>' +
                    '<button class="btn-card btn-del" onclick="borrarDoc(' + d.id + ')">BORRAR</button>' +
                '</div>';
            })(doc, fechaCreacion, fechaModif);
            
            list.appendChild(card);
        }
    }

    function selectCard(id) {
        var cards = document.querySelectorAll('.doc-card');
        for(var i = 0; i < cards.length; i++) { cards[i].classList.remove('selected'); }
        document.getElementById('card-' + id).classList.add('selected');
    }

    function cargarDoc(id) {
        var db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
        for(var i = 0; i < db.length; i++) {
            if(db[i].id === id) {
                document.getElementById('editor').innerHTML = db[i].html;
                activeId = id;
                comprobarVacioYStats();
                toggleMenu();
                break;
            }
        }
    }

    /* 2.a COPIAR TEXTO LIMPIO AL PORTAPAPELES */
    function copiarTextoDoc(id) {
        var db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
        for(var i = 0; i < db.length; i++) {
            if(db[i].id === id) {
                var divTmp = document.createElement("div");
                divTmp.innerHTML = db[i].html;
                var textoLimpio = divTmp.innerText || divTmp.textContent || "";
                
                navigator.clipboard.writeText(textoLimpio).then(function() {
                    alert("Texto copiado al portapapeles con éxito.");
                }).catch(function() {
                    alert("No se pudo copiar de forma automática.");
                });
                break;
            }
        }
    }

    /* 2.b COMPARTIR NATIVO SIN DESCARGAR ARCHIVOS */
    function compartirDoc(id) {
        var db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
        for(var i = 0; i < db.length; i++) {
            if(db[i].id === id) {
                var divTmp = document.createElement("div");
                divTmp.innerHTML = db[i].html;
                var textoLimpio = divTmp.innerText || divTmp.textContent || "";

                if (navigator.share) {
                    navigator.share({
                        title: db[i].title,
                        text: textoLimpio
                    }).catch(function(){});
                } else {
                    navigator.clipboard.writeText(textoLimpio);
                    alert("Compartir nativo no soportado. El texto se ha copiado al portapapeles.");
                }
                break;
            }
        }
    }

    /* 2.c BORRAR REGISTRO */
    function borrarDoc(id) {
        if(confirm("¿Eliminar este documento de la memoria local?")) {
            var db = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
            var filtrado = [];
            for(var i = 0; i < db.length; i++) { if(db[i].id !== id) { filtrado.push(db[i]); } }
            localStorage.setItem(DB_KEY, JSON.stringify(filtrado));
            if(activeId === id) nuevoDoc();
            renderLib();
        }
    }

    function nuevoDoc() { 
        activeId = null; 
        document.getElementById('editor').innerHTML = ""; 
        comprobarVacioYStats(); 
    }

    function formato(c) { document.execCommand(c, false, null); }
    function cambiarColorTexto() { document.execCommand('foreColor', false, document.getElementById('text-color-select').value); }
    function cambiarColorRelleno() { document.execCommand('hiliteColor', false, document.getElementById('bg-color-select').value); }

    function cambiarPaleta() {
        var paleta = document.getElementById('palette-select').value;
        var r = document.documentElement;
        if(paleta === "claro") {
            r.style.setProperty('--bg', '#ffffff'); r.style.setProperty('--editor-bg', '#ffffff'); r.style.setProperty('--text-color', '#000000');
        } else if(paleta === "oscuro") {
            r.style.setProperty('--bg', '#1e293b'); r.style.setProperty('--editor-bg', '#0f172a'); r.style.setProperty('--text-color', '#f8fafc');
        }
    }
</script>
</body>
</html>
