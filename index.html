<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Retórica V7.5 - Studio</title>
    <style>
        :root { 
            --p: #0F172A; --bg: #F1F5F9; --accent: #2563EB; 
            --script: #7C3AED; --podcast: #EC4899; --story: #F59E0B;
            --txt: #1E293B; --muted: #64748B; --ok: #10B981;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; border-radius: 12px; }
        body { margin: 0; background: var(--bg); color: var(--txt); overflow: hidden; height: 100vh; }

        /* MODAL SISTEMA */
        #vox-modal { 
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); 
            z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-box { 
            background: white; padding: 30px; width: 90%; max-width: 400px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border-top: 6px solid var(--accent);
        }

        /* LOGIN / REGISTRO (CORREGIDO) */
        #v-auth { position: fixed; inset: 0; background: var(--p); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; width: 90%; max-width: 420px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #E2E8F0; font-size: 16px; outline: none; }
        .btn-main { width: 100%; padding: 16px; border: none; background: var(--accent); color: white; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .btn-google { background: #FFF; color: #444; border: 2px solid #EEE; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }

        /* INTERFAZ */
        header { background: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 70px; border-bottom: 1px solid #DDD; }
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: white; z-index: 2000; transition: 0.3s; padding: 30px; border-right: 4px solid var(--accent); }
        .sidebar.open { left: 0; }
        .sidebar button { width: 100%; padding: 15px; text-align: left; border: none; background: none; border-bottom: 1px solid #F1F5F9; font-weight: 700; cursor: pointer; }
        
        /* VISTAS */
        .vista { display: none; height: calc(100vh - 70px); padding: 20px; overflow-y: auto; }
        .activa { display: block; }

        /* EDITOR (PUNTO 1: Placeholders Dinámicos) */
        #editor-frame { background: white; border: 1px solid #E2E8F0; padding: 30px; min-height: 70vh; }
        [contenteditable]:empty:before { content: attr(data-placeholder); color: #CBD5E1; }
        #e-title { font-size: 2rem; font-weight: 900; outline: none; margin-bottom: 15px; display: block; }
        #e-body { font-size: 1.15rem; line-height: 1.8; outline: none; min-height: 350px; }

        /* HERRAMIENTAS */
        .tool-panel { background: #F8FAFC; border: 2px solid #E2E8F0; padding: 15px; margin-bottom: 15px; display: none; gap: 8px; flex-wrap: wrap; }
        .tool-btn { padding: 10px; border: 1px solid #CBD5E1; background: white; font-size: 11px; cursor: pointer; font-weight: bold; flex: 1 1 45%; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px; border-top: 4px solid var(--accent); display: flex; gap: 10px; z-index: 1000; }
        .btn-action { flex: 1; padding: 12px; border: none; color: white; font-weight: 800; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

    <div id="vox-modal" onclick="closeVox()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 id="m-title" style="color:var(--accent); margin-top:0;"></h3>
            <div id="m-body"></div>
            <button onclick="closeVox()" class="btn-main" style="margin-top:20px;">ENTENDIDO</button>
        </div>
    </div>

    <div id="v-auth">
        <div class="auth-card">
            <h1 style="letter-spacing:-2px; margin-bottom:5px;">RETÓRICA</h1>
            <p id="auth-msg" style="font-size:12px; color:var(--muted); margin-bottom:25px;">Si es tu primera vez, ingresa una nueva contraseña para registrarte.</p>
            
            <input type="text" id="u-id" class="auth-input" placeholder="Correo o Teléfono">
            <input type="password" id="u-pass" class="auth-input" placeholder="Contraseña">
            
            <button class="btn-main" onclick="handleAuth()">ENTRAR / REGISTRAR</button>
            
            <div style="margin: 15px 0; color: #CCC; font-size: 12px;">O BIEN</div>

            <button class="btn-main btn-google" onclick="authGoogle()">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" alt="G">
                ACCEDER CON GOOGLE
            </button>
        </div>
    </div>

    <header id="app-header" style="display:none;">
        <button onclick="toggleMenu(true)" style="background:none; border:none; font-size:25px;">☰</button>
        <div style="font-weight:900; font-size:1.4rem;">RETÓRICA</div>
        <div id="u-icon" style="background:var(--p); color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px;">U</div>
    </header>

    <nav id="sidebar" class="sidebar">
        <h2 style="color:var(--accent);">Menú</h2>
        <button onclick="irA('v-hub')">📂 Escritorio</button>
        <button onclick="nuevoProyecto()">📝 Crear Guion</button>
        <button onclick="voxSay('Suscripción PRO activa hasta 2027.')">💎 Mi Cuenta</button>
        <button onclick="cerrarSesion()" style="color:red; margin-top:40px;">🚪 Salir</button>
    </nav>

    <div id="v-hub" class="vista">
        <h3 style="margin-top:0;">Mis Proyectos</h3>
        <div id="hub-grid" style="display:grid; gap:12px;"></div>
        <button onclick="nuevoProyecto()" style="position:fixed; bottom:100px; right:20px; width:60px; height:60px; border-radius:50%; background:var(--accent); color:white; border:none; font-size:30px; box-shadow:0 10px 20px rgba(0,0,0,0.2);">+</button>
    </div>

    <div id="v-edit" class="vista">
        <div id="script-tools" class="tool-panel">
            <button class="tool-btn" onclick="addText('<b>INT. HABITACIÓN - DÍA (AMUEBLADA)</b><br>')">🏠 Habitación</button>
            <button class="tool-btn" onclick="addText('<b>EXT. CALLE - NOCHE (LLUVIOSO)</b><br>')">🌧️ Calle Noche</button>
            <button class="tool-btn" onclick="addText('<b>EXT. VÍAS DE TREN - DÍA</b><br>')">🚂 Vías Tren</button>
            <button class="tool-btn" onclick="openChars()">👥 PERSONAJES</button>
        </div>

        <div id="audio-tools" class="tool-panel">
            <select id="voice-engine" class="tool-btn" style="flex:100%;"></select>
            <button class="tool-btn" onclick="addText('[MÚSICA_INICIO]')">🎵 Música</button>
            <button class="tool-btn" onclick="addText('[FX_AMBIENTE]')">🔊 FX</button>
        </div>

        <div id="editor-frame">
            <div id="e-title" contenteditable="true" data-placeholder="Título del Guion..."></div>
            <div id="e-body" contenteditable="true" data-placeholder="Comienza a escribir aquí..."></div>
        </div>

        <div class="footer">
            <button class="btn-action" style="background:var(--script)" onclick="openPanel('script-tools')">🎬 GUION</button>
            <button class="btn-action" style="background:var(--podcast)" onclick="openPanel('audio-tools')">🎙️ PODCAST</button>
            <button class="btn-action" style="background:var(--ok); flex:1.5;" onclick="saveDoc()">💾 GUARDAR</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('retorica_db')) || [];
        let chars = JSON.parse(localStorage.getItem('retorica_chars')) || [];
        let session = JSON.parse(localStorage.getItem('retorica_user')) || null;
        let registeredUsers = JSON.parse(localStorage.getItem('retorica_accounts')) || {};

        // 1. LÓGICA DE REGISTRO Y AUTH
        function handleAuth() {
            const id = document.getElementById('u-id').value;
            const pass = document.getElementById('u-pass').value;

            if(!id || !pass) return voxSay("Debes completar ambos campos.");

            // Si el usuario no existe, lo registramos
            if(!registeredUsers[id]) {
                registeredUsers[id] = pass;
                localStorage.setItem('retorica_accounts', JSON.stringify(registeredUsers));
                voxSay("Cuenta creada con éxito. Bienvenido al estudio.", "Registro Completado");
            } else {
                // Si existe, validamos contraseña
                if(registeredUsers[id] !== pass) {
                    return voxSay("La contraseña es incorrecta para este usuario.", "Error de Acceso");
                }
            }

            session = { id, name: id.split('@')[0], type: 'Local' };
            localStorage.setItem('retorica_user', JSON.stringify(session));
            startUI();
        }

        function authGoogle() {
            voxSay("Vinculando con cuenta de Google...");
            setTimeout(() => {
                session = { id: 'google_user', name: 'Google Artist', type: 'Google' };
                localStorage.setItem('retorica_user', JSON.stringify(session));
                startUI();
            }, 1000);
        }

        function startUI() {
            document.getElementById('v-auth').style.display = 'none';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('u-icon').innerText = session.name[0].toUpperCase();
            irA('v-hub');
            loadVoices();
        }

        // 2. NAVEGACIÓN Y UI
        function irA(v) {
            document.querySelectorAll('.vista').forEach(x => x.classList.remove('activa'));
            document.getElementById(v).classList.add('activa');
            if(v === 'v-hub') renderHub();
            toggleMenu(false);
        }

        function toggleMenu(s) { document.getElementById('sidebar').classList.toggle('open', s); }
        
        function openPanel(id) {
            const p = document.getElementById(id);
            const isVis = p.style.display === 'flex';
            document.querySelectorAll('.tool-panel').forEach(x => x.style.display = 'none');
            p.style.display = isVis ? 'none' : 'flex';
        }

        function addText(h) { document.getElementById('e-body').innerHTML += h; }

        function renderHub() {
            const grid = document.getElementById('hub-grid');
            grid.innerHTML = '';
            db.reverse().forEach(x => {
                const c = document.createElement('div');
                c.style = "background:white; padding:15px; border:1px solid #DDD; cursor:pointer;";
                c.onclick = () => loadProject(x.id);
                c.innerHTML = `<b>${x.t || 'Sin Título'}</b><br><small>${new Date(x.id).toLocaleDateString()}</small>`;
                grid.appendChild(c);
            });
        }

        // 3. PERSISTENCIA
        function saveDoc() {
            const id = document.getElementById('v-edit').dataset.id || Date.now();
            const t = document.getElementById('e-title').innerText;
            const c = document.getElementById('e-body').innerHTML;
            db = db.filter(x => x.id != id);
            db.push({id, t, c});
            localStorage.setItem('retorica_db', JSON.stringify(db));
            voxSay("Guion guardado.");
            irA('v-hub');
        }

        function loadProject(id) {
            const p = db.find(x => x.id == id);
            document.getElementById('e-title').innerText = p.t;
            document.getElementById('e-body').innerHTML = p.c;
            document.getElementById('v-edit').dataset.id = id;
            irA('v-edit');
        }

        function nuevoProyecto() {
            document.getElementById('e-title').innerText = "";
            document.getElementById('e-body').innerHTML = "";
            delete document.getElementById('v-edit').dataset.id;
            irA('v-edit');
        }

        function openChars() {
            let l = chars.map(c => `• ${c.n} (${c.r})`).join('<br>');
            voxSay(`<input id="cn" placeholder="Nombre" class="auth-input"><input id="cr" placeholder="Rol" class="auth-input"><button class="btn-main" onclick="saveChar()">VINCULAR PERSONAJE</button><div style="margin-top:10px;">${l}</div>`, "Personajes");
        }

        function saveChar() {
            const n = document.getElementById('cn').value;
            const r = document.getElementById('cr').value;
            if(n) { chars.push({n,r}); localStorage.setItem('retorica_chars', JSON.stringify(chars)); closeVox(); voxSay("Añadido."); }
        }

        function loadVoices() {
            const e = document.getElementById('voice-engine');
            setTimeout(() => {
                const v = window.speechSynthesis.getVoices();
                e.innerHTML = v.map(x => `<option>${x.name}</option>`).join('');
            }, 600);
        }

        function voxSay(msg, title = "Aviso") {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-body').innerHTML = msg;
            document.getElementById('vox-modal').style.display = 'flex';
        }

        function closeVox() { document.getElementById('vox-modal').style.display = 'none'; }
        function cerrarSesion() { localStorage.removeItem('retorica_user'); location.reload(); }

        window.onload = () => { if(session) startUI(); };
    </script>
</body>
</html>
