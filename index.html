<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica - Bloc de Notas</title>
    <link rel="manifest" href="./manifest.json?v=3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-main: #0a0f1d;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --bg-card-active: #374151;
            --accent: #ffca28;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #2d3748;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MENÚ LATERAL (BIBLIOTECA) --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            transition: transform 0.3s ease;
            z-index: 10;
            flex-shrink: 0;
        }

        .sidebar.hidden {
            transform: translateX(-280px);
            margin-right: -280px;
        }

        /* CORRECCIÓN PUNTO 1: Pestaña vertical flotante a media altura */
        .toggle-sidebar-pestaña {
            position: absolute;
            right: -24px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 55px;
            background-color: var(--bg-sidebar);
            color: var(--accent);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 8px 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 3px 0 5px rgba(0,0,0,0.2);
            z-index: 11;
        }

        /* CORRECCIÓN PUNTO 2: Icono del sol centrado con Flexbox */
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            line-height: 1;
            width: 24px;
            height: 24px;
        }

        .brand-title {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        /* Listado de notas en la biblioteca */
        .document-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Plantillas Delgadas de Notas */
        .doc-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .doc-item.active {
            background-color: var(--bg-card-active);
            border-color: var(--accent);
        }

        .doc-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .doc-preview {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        /* Pasarela deslizable horizontal de botones */
        .doc-actions-pasarela {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none; /* Ocultar barra en Firefox */
        }

        .doc-actions-pasarela::-webkit-scrollbar {
            display: none; /* Ocultar barra en Chrome/Android */
        }

        .btn-action-mini {
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-action-mini.primary {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-action-mini.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Contenedor de detalles ocultable */
        .metadata-container {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 4px;
            margin-top: 6px;
            font-size: 0.65rem;
            color: var(--text-muted);
            border-left: 2px solid var(--accent);
        }

        /* CORRECCIÓN PUNTO 3: Menú inferior fijo "Guardar como" */
        .sidebar-footer-menu {
            padding: 12px;
            border-top: 1px solid var(--border);
            background-color: rgba(0, 0, 0, 0.15);
        }

        .footer-menu-title {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-buttons-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-footer-action {
            width: 100%;
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 7px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-footer-action:active {
            background-color: var(--bg-card-active);
            border-color: var(--accent);
        }

        /* --- CONTENEDOR CENTRAL DE EDICIÓN --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-main);
        }

        .top-toolbar {
            height: 60px;
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        select {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            outline: none;
        }

        .btn-top {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-top#btn-main-guardar {
            background-color: var(--accent);
            color: #0a0f1d;
            border: none;
        }

        /* Área de escritura */
        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
        }

        textarea {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            padding: 5px;
        }

        .stats-bar {
            height: 24px;
            border-top: 1px solid var(--border);
            padding-top: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        /* Notificaciones en pantalla (Toast) */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--accent);
            color: #0a0f1d;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Modo Claro */
        body.light-theme {
            --bg-main: #f9fafb;
            --bg-sidebar: #f3f4f6;
            --bg-card: #ffffff;
            --bg-card-active: #e5e7eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #d1d5db;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña">◀</div>
        
        <div class="sidebar-header">
            <div class="brand-container">
                <div class="brand-icon-wrapper">☀️</div>
                <span class="brand-title">RETÓRICA</span>
            </div>
            <button id="btn-nuevo" style="background:var(--accent); color:#0a0f1d; font-weight:bold; border:none; padding:6px 10px; border-radius:4px; cursor:pointer;">➕</button>
        </div>

        <div class="document-list" id="document-list"></div>

        <div class="sidebar-footer-menu">
            <div class="footer-menu-title">Guardar como:</div>
            <div class="footer-buttons-container">
                <button class="btn-footer-action" id="export-pdf">1.- PDF</button>
                <button class="btn-footer-action" id="export-pdf-edit">2.- PDF Editable</button>
                <button class="btn-footer-action" id="export-doc">3.- DOC</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="top-toolbar">
            <div class="toolbar-group">
                <select id="cambiarPaleta">
                    <option value="oscuro">🌙 Oscuro</option>
                    <option value="claro">☀️ Claro</option>
                </select>
                <select id="voice-lang">
                    <option value="es-MX">Español (MX)</option>
                    <option value="es-ES">Español (ES)</option>
                </select>
            </div>
            <div class="toolbar-group">
                <button class="btn-top" id="btn-mic">🎙️ MIC</button>
                <button class="btn-top" id="btn-lectura">🔊 LEER</button>
                <button class="btn-top" id="btn-main-guardar">GUARDAR</button>
            </div>
        </div>

        <div class="editor-wrapper">
            <textarea id="editor" placeholder="Escribe tu guion o nota aquí..."></textarea>
            <div class="stats-bar" id="stats-bar">Caracteres: 0 | Palabras: 0 | Líneas: 0</div>
        </div>
    </div>

    <div class="toast" id="toast-notif">Operación exitosa</div>

    <script>
        // --- BASE DE DATOS INDEXEDDB PERSISTENTE ---
        const DB_NAME = "RetoricaDB";
        const DB_VERSION = 1;
        const STORE_NAME = "documentos";
        let db;
        let currentDocId = null;

        // FUNCIÓN CRUCIAL: Solicita a Android que no borre los datos al limpiar caché
        function asegurarPersistenciaDatos() {
            if (navigator.storage && navigator.storage.persist) {
                navigator.storage.persist().then(granted => {
                    if (granted) {
                        console.log("Almacenamiento de notas configurado como PERSISTENTE protegido.");
                    } else {
                        console.log("Almacenamiento en modo estándar.");
                    }
                });
            }
        }

        function initDB() {
            asegurarPersistenciaDatos();
            const request = indexedDB.open(DB_NAME, DB_VERSION);

            request.onerror = function(event) {
                console.error("Error IndexedDB:", event.target.error);
                showToast("Error de acceso al almacenamiento");
            };

            request.onsuccess = function(event) {
                db = event.target.result;
                renderLib();
            };

            request.onupgradeneeded = function(event) {
                const dbInstance = event.target.result;
                if (!dbInstance.objectStoreNames.contains(STORE_NAME)) {
                    dbInstance.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                }
            };
        }

        // --- RENDERIZADO DINÁMICO DE NOTAS REALES ---
        function renderLib() {
            if (!db) return;
            const lista = document.getElementById('document-list');
            lista.innerHTML = "";

            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.openCursor(null, "prev"); // Mostrar el más reciente primero

            request.onsuccess = function(event) {
                const cursor = event.target.result;
                if (cursor) {
                    const docData = cursor.value;
                    const item = document.createElement('div');
                    item.className = `doc-item ${docData.id === currentDocId ? 'active' : ''}`;
                    item.dataset.id = docData.id;

                    // Extraer primer renglón real como título y los siguientes como vista previa
                    const lineas = docData.texto.split('\n').filter(l => l.trim() !== "");
                    const tituloNota = lineas[0] || "Nota sin título";
                    const vistaPreviaNota = lineas.slice(1, 4).join(' ') || "Sin contenido adicional...";

                    item.innerHTML = `
                        <div class="doc-title">${tituloNota}</div>
                        <div class="doc-preview">${vistaPreviaNota}</div>
                        
                        <div class="doc-actions-pasarela">
                            <button class="btn-action-mini primary" onclick="event.stopPropagation(); cargarDocEnEditor(${docData.id});">Abrir</button>
                            <button class="btn-action-mini" onclick="event.stopPropagation(); copiarTextoNota(${docData.id});">Copiar</button>
                            <button class="btn-action-mini" onclick="event.stopPropagation(); compartirNota(${docData.id});">Compartir</button>
                            <button class="btn-action-mini" onclick="event.stopPropagation(); alternarMetadataDetalles(${docData.id});">ℹ️ Detalles</button>
                            <button class="btn-action-mini danger" onclick="event.stopPropagation(); borrarDoc(${docData.id});">Borrar</button>
                        </div>
                        
                        <div class="metadata-container" id="meta-${docData.id}">
                            <div><strong>Creado:</strong> ${docData.fechaCreacion || 'No registrada'}</div>
                            <div><strong>Modificado:</strong> ${docData.fechaModificacion || 'No registrada'}</div>
                        </div>
                    `;

                    lista.appendChild(item);
                    cursor.continue();
                }
            };
        }

        function cargarDocEnEditor(id) {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get(id);

            request.onsuccess = function(event) {
                const doc = event.target.result;
                if (doc) {
                    currentDocId = doc.id;
                    document.getElementById('editor').value = doc.texto;
                    actualizarContadores();
                    renderLib();
                    showToast("Nota cargada en el editor");
                }
            };
        }

        function alternarMetadataDetalles(id) {
            const contenedor = document.getElementById(`meta-${id}`);
            contenedor.style.display = (contenedor.style.display === "block") ? "none" : "block";
        }

        function copiarTextoNota(id) {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get(id);

            request.onsuccess = function(event) {
                const doc = event.target.result;
                if (doc && doc.texto) {
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(doc.texto).then(() => showToast("Copiado al portapapeles"));
                    } else {
                        const aux = document.createElement("textarea");
                        aux.value = doc.texto;
                        document.body.appendChild(aux);
                        aux.select();
                        document.execCommand("copy");
                        document.body.removeChild(aux);
                        showToast("Copiado (Retrocompatible)");
                    }
                }
            };
        }

        function compartirNota(id) {
            const transaction = db.transaction([STORE_NAME], "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.get(id);

            request.onsuccess = function(event) {
                const doc = event.target.result;
                if (doc && doc.texto) {
                    if (navigator.share) {
                        navigator.share({ title: 'Retórica Nota', text: doc.texto }).catch(console.error);
                    } else {
                        showToast("Compartir no soportado en este navegador");
                    }
                }
            };
        }

        // --- CORRECCIÓN PUNTO 4: ACCIÓN DE GUARDADO AUTOMÁTICO SIN EMERGENS DE RUTA ---
        function obtenerNombreArchivoClean() {
            const texto = document.getElementById('editor').value.trim();
            if (!texto) return "nota_retorica";
            return texto.split('\n')[0].replace(/[\\/:*?"<>|]/g, "").substring(0, 25) || "nota_retorica";
        }

        function procesarDescargaInmediata(contenido, tipoMime, extension) {
            const blob = new Blob([contenido], { type: tipoMime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${obtenerNombreArchivoClean()}.${extension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            showToast(`Descargado local: ${extension.toUpperCase()}`);
        }

        function guardarYDescargarHtmlDirecto() {
            const texto = document.getElementById('editor').value;
            if (!texto.trim()) return showToast("Editor vacío, nada que guardar");

            const transaction = db.transaction([STORE_NAME], "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            const fechaActual = new Date().toLocaleString();

            if (currentDocId === null) {
                const nuevoDocData = { texto: texto, fechaCreacion: fechaActual, fechaModificacion: fechaActual };
                const request = store.add(nuevoDocData);
                request.onsuccess = function(e) {
                    currentDocId = e.target.result;
                    ejecutarDescargaHtmlPura(texto);
                };
            } else {
                const requestObtener = store.get(currentDocId);
                requestObtener.onsuccess = function(e) {
                    const data = e.target.result;
                    data.texto = texto;
                    data.fechaModificacion = fechaActual;
                    store.put(data).onsuccess = function() {
                        ejecutarDescargaHtmlPura(texto);
                    };
                };
            }
        }

        function ejecutarDescargaHtmlPura(contenido) {
            const estructura = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${obtenerNombreArchivoClean()}</title><style>body{font-family:sans-serif;padding:25px;line-height:1.6;}</style></head><body><p>${contenido.replace(/\n/g, '<br>')}</p></body></html>`;
            procesarDescargaInmediata(estructura, 'text/html;charset=utf-8', 'html');
            renderLib();
        }

        document.getElementById('btn-main-guardar').addEventListener('click', guardarYDescargarHtmlDirecto);

        // --- PROCESOS DE BOTONES EXCLUSIVOS DE EXPORTACIÓN (PUNTO 3) ---
        document.getElementById('export-pdf').addEventListener('click', () => {
            const texto = document.getElementById('editor').value;
            if(!texto.trim()) return showToast("Editor vacío");
            
            const elementoRaiz = document.createElement('div');
            elementoRaiz.style.padding = '25px';
            elementoRaiz.style.color = '#000000';
            elementoRaiz.style.background = '#ffffff';
            elementoRaiz.innerHTML = texto.replace(/\n/g, '<br>');
            
            const opcionesPdf = {
                margin: 15,
                filename: `${obtenerNombreArchivoClean()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opcionesPdf).from(elementoRaiz).save().then(() => {
                showToast("PDF generado localmente");
            });
        });

        document.getElementById('export-pdf-edit').addEventListener('click', () => {
            const contenido = document.getElementById('editor').value;
            const pdfEditableEstructura = `<html><body style="padding:25px;"><form><textarea style="width:100%;height:90vh;font-size:16px;font-family:sans-serif;">${contenido}</textarea></form></body></html>`;
            procesarDescargaInmediata(pdfEditableEstructura, 'text/html;charset=utf-8', 'pdf.html');
        });

        document.getElementById('export-doc').addEventListener('click', () => {
            const contenido = document.getElementById('editor').value;
            const docEstructura = `<html xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset="utf-8"></head><body>${contenido.replace(/\n/g, '<p></p>')}</body></html>`;
            procesarDescargaInmediata(docEstructura, 'application/msword;charset=utf-8', 'doc');
        });

        // --- MANEJO DE PESTAÑA Y CONTROL DE GESTOS COMPLEMENTARIOS (PUNTO 1) ---
        function configurarGestosPestaña() {
            const btnPestaña = document.getElementById('btn-toggle-pestaña');
            const sidebarElement = document.getElementById('sidebar');

            btnPestaña.addEventListener('click', () => {
                sidebarElement.classList.toggle('hidden');
                btnPestaña.textContent = sidebarElement.classList.contains('hidden') ? "▶" : "◀";
            });

            let startX = 0;
            sidebarElement.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
            sidebarElement.addEventListener('touchend', (e) => {
                let diffX = startX - e.changedTouches[0].clientX;
                if (diffX > 70 && !sidebarElement.classList.contains('hidden')) {
                    sidebarElement.classList.add('hidden');
                    btnPestaña.textContent = "▶";
                }
            }, { passive: true });
        }

        // --- SISTEMA RECONOCIMIENTO DE VOZ CON AUTO-REARMADO DE 6 SEGUNDOS ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reconocimiento;
        let timerSilencio;
        let grabando = false;

        if (Recognition) {
            reconocimiento = new Recognition();
            reconocimiento.continuous = true;
            reconocimiento.interimResults = false;

            reconocimiento.onstart = () => {
                grabando = true;
                document.getElementById('btn-mic').textContent = "🛑 GRABANDO";
                resetearTimerSilencio();
            };

            reconocimiento.onresult = (e) => {
                const transcripcion = e.results[e.resultIndex][0].transcript;
                const txtarea = document.getElementById('editor');
                txtarea.value += (txtarea.value ? ' ' : '') + transcripcion;
                actualizarContadores();
                resetearTimerSilencio();
            };

            reconocimiento.onend = () => {
                grabando = false;
                document.getElementById('btn-mic').textContent = "🎙️ MIC";
                clearTimeout(timerSilencio);
            };
        }

        function resetearTimerSilencio() {
            clearTimeout(timerSilencio);
            timerSilencio = setTimeout(() => {
                if (grabando) {
                    reconocimiento.stop();
                    showToast("Micrófono cerrado por inactividad");
                }
            }, 6000);
        }

        document.getElementById('btn-mic').addEventListener('click', () => {
            if (!reconocimiento) return showToast("Dictado no soportado en este dispositivo");
            if (grabando) {
                reconocimiento.stop();
            } else {
                reconocimiento.lang = document.getElementById('voice-lang').value;
                reconocimiento.start();
            }
        });

        // --- LECTURA POR SÍNTESIS DE VOZ ---
        document.getElementById('btn-lectura').addEventListener('click', () => {
            const texto = document.getElementById('editor').value;
            if (!texto.trim()) return showToast("Nada que leer");
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const lectura = new SpeechSynthesisUtterance(texto);
                lectura.lang = document.getElementById('voice-lang').value;
                window.speechSynthesis.speak(lectura);
            }
        });

        // --- CONTADORES DE TEXTO ---
        function actualizarContadores() {
            const texto = document.getElementById('editor').value;
            const chars = texto.length;
            const palabras = texto.trim() === "" ? 0 : texto.trim().split(/\s+/).length;
            const lineas = texto === "" ? 0 : texto.split('\n').length;
            document.getElementById('stats-bar').textContent = `Caracteres: ${chars} | Palabras: ${palabras} | Líneas: ${lineas}`;
        }

        document.getElementById('editor').addEventListener('input', actualizarContadores);

        // --- GESTIÓN DE NOTAS NUEVAS Y BORRADOS ---
        function borrarDoc(id) {
            if (!confirm("¿Deseas eliminar esta nota permanentemente?")) return;
            const transaction = db.transaction([STORE_NAME], "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            store.delete(id).onsuccess = function() {
                if (currentDocId === id) nuevoDoc();
                renderLib();
                showToast("Nota eliminada");
            };
        }

        function nuevoDoc() {
            currentDocId = null;
            document.getElementById('editor').value = "";
            actualizarContadores();
            renderLib();
            showToast("Lienzo limpio");
        }

        document.getElementById('btn-nuevo').addEventListener('click', nuevoDoc);

        // --- CAMBIAR PALETA DE COLORES ---
        document.getElementById('cambiarPaleta').addEventListener('change', (e) => {
            if (e.target.value === 'claro') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        });

        function showToast(msg) {
            const toast = document.getElementById('toast-notif');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // --- INICIALIZACIÓN GENERAL ---
        window.addEventListener('DOMContentLoaded', () => {
            initDB();
            configurarGestosPestaña();
        });

        // --- REGISTRO DEL SERVICE WORKER (CON MARCADOR DE VERSIÓN 3) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=3')
                    .then(reg => console.log('Retórica PWA activa en segundo plano', reg.scope))
                    .catch(err => console.warn('Aviso SW:', err));
            });
        }
    </script>
</body>
</html>
