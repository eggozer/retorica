<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica - Procesador de Notas</title>
    <link rel="manifest" href="./manifest.json?v=15">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0f1d; --bg-sidebar: #111827; --bg-card: #1f2937;
            --bg-card-active: #374151; --accent: #ffca28; --text-main: #f3f4f6;
            --text-muted: #9ca3af; --border: #2d3748; --danger: #ef4444;
        }
        body.light-theme {
            --bg-main: #f9fafb; --bg-sidebar: #f3f4f6; --bg-card: #ffffff;
            --bg-card-active: #e5e7eb; --text-main: #111827; --text-muted: #6b7280;
            --border: #d1d5db;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        button, select, input { border-radius: 20px !important; height: 40px; padding: 0 14px; background-color: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .toolbar-rack button { width: 40px; height: 40px; border-radius: 50% !important; padding: 0; }
        #btn-render-fl, #btn-main-guardar { width: auto; border-radius: 20px !important; padding: 0 16px; }

        .sidebar { width: 100vw; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; position: absolute; left: 0; top: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s; z-index: 250; visibility: visible; }
        .sidebar.hidden { transform: translateX(-100vw); visibility: hidden; }
        
        .toggle-sidebar-pestaña { position: fixed; left: 12px; top: 10px; width: 42px; height: 42px; background-color: var(--bg-card); color: var(--accent); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; z-index: 300; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50% !important; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .sidebar-header { padding: 0 16px 0 65px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; height: 60px; flex-shrink: 0; }
        
        .document-list { flex: 1; overflow-y: auto; padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
        
        .sidebar-footer-menu { padding: 14px 14px 34px 14px; border-top: 1px solid var(--border); background-color: rgba(0, 0, 0, 0.4); flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
        .footer-menu-title { font-size: 0.75rem; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; }
        .footer-buttons-container { display: flex; flex-direction: column; gap: 6px; }
        .btn-footer-action { border-radius: 8px !important; justify-content: flex-start; width: 100%; }

        .main-container { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; background-color: var(--bg-main); overflow: hidden; position: relative; }
        .sticky-header-block { position: sticky; top: 0; z-index: 150; background-color: var(--bg-main); display: flex; flex-direction: column; width: 100%; }
        .app-header-top { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; background-color: var(--bg-sidebar); }
        .brand-title-center { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 1.1rem; letter-spacing: 1.5px; }

        .top-toolbar-racks { height: 54px; border-bottom: 1px solid var(--border); padding: 0 12px; display: flex; align-items: center; gap: 8px; overflow-x: auto; white-space: nowrap; background-color: var(--bg-main); scrollbar-width: none; }
        .top-toolbar-racks::-webkit-scrollbar { display: none; }
        .toolbar-rack { display: inline-flex; align-items: center; gap: 6px; background-color: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px 8px; border-radius: 20px; }
        
        .editor-wrapper { flex: 1; display: flex; flex-direction: column; padding: 16px; overflow-y: auto; position: relative; align-items: center; width: 100%; }
        .rich-editor { width: 100%; min-height: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; line-height: 1.6; outline: none; padding: 4px; overflow-wrap: break-word; }
        .rich-editor.modo-carta { max-width: 800px; background-color: var(--bg-card); padding: 40px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); min-height: 1050px; }
        .rich-editor.modo-oficio { max-width: 850px; background-color: var(--bg-card); padding: 50px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); min-height: 1300px; }

        .audio-player-wrapper { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 8px; margin: 10px 0; display: inline-flex; align-items: center; gap: 8px; max-width: 100%; flex-wrap: wrap; }
        .audio-player-wrapper audio { height: 32px; }

        .stats-bar { width: 100%; height: 32px; border-top: 1px solid var(--border); padding: 6px 16px 0 16px; font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; background-color: var(--bg-sidebar); position: sticky; bottom: 0; z-index: 140; }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); background-color: var(--accent); color: #0a0f1d; padding: 10px 20px; font-size: 0.85rem; font-weight: bold; transition: transform 0.3s; z-index: 999; border-radius: 20px; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña">▶</div>

    <div class="sidebar hidden" id="sidebar">
        <div class="sidebar-header">
            <div style="display:flex; align-items:center; gap:6px;"><span>☀️</span><span style="font-weight:700;">RETÓRICA</span></div>
            <button id="btn-nuevo" style="border-radius:50% !important; width:40px; height:40px; padding:0;">➕</button>
        </div>
        <div style="padding:10px 12px 0 12px; display:flex; flex-direction:column; gap:4px;">
            <button id="btn-instalar-pwa" style="background:var(--accent); color:#0a0f1d; display:none; width:100%;">📲 INSTALAR APP</button>
            <button id="btn-actualizar-pwa" style="background:var(--danger); color:white; display:none; width:100%;">🔄 ACTUALIZAR CAMBIOS</button>
        </div>
        <div class="document-list" id="document-list"></div>
        <div class="sidebar-footer-menu">
            <div class="footer-menu-title">Guardar como:</div>
            <div class="footer-buttons-container">
                <button class="btn-footer-action" id="export-pdf">1.- PDF</button>
                <button class="btn-footer-action" id="export-pdf-edit">2.- PDF Editable</button>
                <button class="btn-footer-action" id="export-doc">3.- DOC</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="sticky-header-block">
            <header class="app-header-top">
                <div class="brand-title-center"><span>☀️</span><span>RETÓRICA</span></div>
            </header>

            <div class="top-toolbar-racks">
                <div class="toolbar-rack">
                    <button id="btn-mic" title="Dictado de Voz">🎙️</button>
                    <button id="btn-grab-audio-wa" title="Grabar audio">🎙️💬</button>
                    <button id="btn-render-fl" title="Renderizar Audio">🎛️ Render</button>
                </div>
                <div class="toolbar-rack">
                    <select id="app-lang"><option value="es-MX">Español (MX)</option><option value="en-US">English (US)</option></select>
                    <button id="btn-lectura">🔊</button>
                    <select id="voice-lang"><option value="es-MX">Español (MX)</option></select>
                </div>
                <div class="toolbar-rack">
                    <select id="font-family-select" style="width:110px;">
                        <option value="sans-serif">Sans-Serif</option>
                        <option value="serif">Serif</option>
                        <option value="monospace">Monospace</option>
                        <option value="cursive">Cursive</option>
                    </select>
                    <button id="btn-insert-table">📊</button>
                    <button id="btn-open-local">📁</button>
                    <input type="file" id="file-input-hidden" accept=".html,.txt,.doc" style="display:none;">
                </div>
                <div class="toolbar-rack">
                    <select id="combo-modalidad">
                        <option value="nota">📄 Nota</option>
                        <option value="carta">📄 Carta</option>
                        <option value="oficio">📄 Oficio</option>
                    </select>
                    <button id="btn-toggle-tema">🌙</button>
                    <button id="btn-main-guardar">GUARDAR HTML</button>
                </div>
            </div>
        </div>

        <div class="editor-wrapper" id="editor-container">
            <div id="editor" class="rich-editor" contenteditable="true" placeholder="Escribe aquí..."></div>
        </div>

        <div class="stats-bar">
            <div id="stats-text">Caracteres: 0</div>
            <div id="lbl-file-dates">Sin guardar</div>
        </div>
    </div>

    <div class="toast" id="toast-notif">Operación exitosa</div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
