<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Retórica V9.0 - Master Integrity</title>
<style>
:root{--p:#0F172A;--bg:#F8FAFC;--accent:#2563EB;--script:#7C3AED;--podcast:#EC4899;--txt:#1E293B;--muted:#64748B;--ok:#10B981;--google:#DB4437;}
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);overflow:hidden;height:100vh;}
#v-auth{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:9999;background:var(--p);}
.auth-bg{position:absolute;inset:0;background:linear-gradient(45deg,#0F172A,#1E293B,#0F172A);background-size:400% 400%;animation:gradientBG 15s ease infinite;z-index:-1;}
@keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.auth-card{background:white;padding:30px;width:92%;max-width:360px;text-align:center;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.5);border-top:5px solid var(--accent);}
.auth-input{width:100%;padding:15px;margin-bottom:10px;border:2px solid #EEE;border-radius:10px;font-size:16px;outline:none;}
.btn-main{width:100%;padding:16px;border:none;border-radius:10px;background:var(--accent);color:white;font-weight:bold;cursor:pointer;text-transform:uppercase;}
header{background:white;padding:0 20px;display:none;justify-content:space-between;align-items:center;height:65px;border-bottom:1px solid #EEE;}
#overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9000;}
.sidebar{position:fixed;top:0;left:-300px;width:280px;height:100%;background:white;z-index:9500;transition:0.3s;padding:25px;border-right:5px solid var(--accent);}
.sidebar.open{left:0;}
.sidebar button{width:100%;padding:16px;text-align:left;border:none;background:none;border-bottom:1px solid #F1F5F9;font-weight:bold;font-size:15px;cursor:pointer;}
.vista{display:none;height:calc(100vh - 65px);padding:15px;overflow-y:auto;}
.activa{display:block;}
#editor-frame{background:white;border:1px solid #DDD;border-radius:15px;padding:25px;min-height:70vh;margin-bottom:90px;position:relative;}
[contenteditable]:empty:before{content:attr(data-placeholder);color:#CCC;}
#e-title{font-size:1.8rem;font-weight:bold;outline:none;margin-bottom:12px;border-bottom:2px solid #F1F5F9;display:block;}
#e-body{font-size:1.1rem;line-height:1.7;outline:none;min-height:400px;}
.tool-panel{background:#F1F5F9;border-radius:12px;padding:12px;margin-bottom:12px;display:none;gap:8px;flex-wrap:wrap;border:1px solid #DDD;}
.tool-btn{padding:12px;border:1px solid #CCC;background:white;border-radius:8px;font-size:11px;cursor:pointer;font-weight:bold;flex:1 1 45%;}
.footer{position:fixed;bottom:0;left:0;right:0;background:white;padding:12px;border-top:3px solid var(--accent);display:flex;gap:8px;z-index:1000;}
.btn-action{flex:1;padding:15px;border:none;border-radius:10px;color:white;font-weight:bold;font-size:10px;text-transform:uppercase;}
#vox-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:10000;justify-content:center;align-items:center;}
.modal-box{background:white;padding:30px;width:90%;max-width:400px;border-radius:20px;text-align:center;}
</style>
</head>
<body>
<div id="overlay" onclick="toggleMenu(false)"></div>
<div id="vox-modal" onclick="closeVox()"><div class="modal-box" onclick="event.stopPropagation()"><h3 id="m-title" style="color:var(--accent)"></h3><div id="m-body" style="margin:15px 0;font-size:14px;color:var(--muted)"></div><button onclick="closeVox()" class="btn-main">CONTINUAR</button></div></div>
<div id="v-auth"><div class="auth-bg"></div><div class="auth-card"><h1>RETÓRICA</h1><p style="font-size:11px;margin-bottom:20px;color:var(--muted)">V9.0 • Full Integrity System</p><input type="text" id="u-id" class="auth-input" placeholder="Usuario"><input type="password" id="u-pass" class="auth-input" placeholder="Contraseña"><button class="btn-main" onclick="handleAuth()">ACCEDER AL ESTUDIO</button></div></div>
<header id="app-header"><button onclick="toggleMenu(true)" style="background:none;border:none;font-size:26px;">☰</button><div style="font-weight:bold;letter-spacing:-1px;">RETÓRICA</div><div id="u-icon" onclick="toggleMenu(true)" style="width:38px;height:38px;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;"></div></header>
<nav id="sidebar" class="sidebar"><h2 id="side-user" style="color:var(--accent)"></h2><p id="side-device" style="font-size:9px;color:var(--muted);margin-bottom:20px;"></p><button onclick="irA('v-hub')">📂 PROYECTOS</button><button onclick="nuevoProyecto()">📝 NUEVO GUION</button><button onclick="voxSay('Módulo ADN activo','Personajes')">👥 PERSONAJES</button><button onclick="switchUser()">👤 CAMBIAR CUENTA</button><button onclick="cerrarSesion()" style="color:red;margin-top:50px;">🚪 SALIR</button></nav>
<div id="v-hub" class="vista"><div id="hub-grid" style="display:grid;gap:10px;"></div><button onclick="nuevoProyecto()" style="position:fixed;bottom:90px;right:25px;width:60px;height:60px;border-radius:50%;background:var(--accent);color:white;border:none;font-size:30px;box-shadow:0 10px 20px rgba(0,0,0,0.2)">+</button></div>
<div id="v-edit" class="vista"><div id="script-tools" class="tool-panel"><button class="tool-btn" onclick="addText('<b>INT. HABITACIÓN - DÍA</b><br>')">🏠 HABITACIÓN</button><button class="tool-btn" onclick="addText('<b>EXT. CALLE - NOCHE</b><br>')">🌧️ CALLE</button><button class="tool-btn" onclick="addText('<b>PERSONAJE:</b><br>')">🗣️ VOZ</button></div><div id="audio-tools" class="tool-panel"><select id="voice-engine" class="tool-btn" style="flex:100%"></select><button class="tool-btn" onclick="addText('[MÚSICA] ')">🎵 MÚSICA</button><button class="tool-btn" onclick="addText('[FX] ')">🔊 EFECTO</button></div><div id="editor-frame"><div id="e-title" contenteditable="true" data-placeholder="Título..."></div><div id="e-body" contenteditable="true" data-placeholder="Comienza la retórica..."></div></div><div class="footer"><button class="btn-action" style="background:var(--script)" onclick="openPanel('script-tools')">ESCENA</button><button class="btn-action" style="background:var(--podcast)" onclick="openPanel('audio-tools')">AUDIO</button><button class="btn-action" style="background:var(--ok);flex:1.5" onclick="saveDoc()">GUARDAR</button></div></div>
<script>
const ua=navigator.userAgent;const dev=/Pixel/i.test(ua)?"Pixel 2":/Redmi/i.test(ua)?"Redmi":"Android 5";
let db=JSON.parse(localStorage.getItem('ret_db'))||[];let acc=JSON.parse(localStorage.getItem('ret_acc'))||{};let user=JSON.parse(localStorage.getItem('ret_user'))||null;
function handleAuth(){const id=document.getElementById('u-id').value.trim();const pw=document.getElementById('u-pass').value.trim();if(!id||!pw)return;if(acc[id]&&acc[id]!==pw){alert("Error");return;}acc[id]=pw;localStorage.setItem('ret_acc',JSON.stringify(acc));user={id,name:id.split('@')[0]};localStorage.setItem('ret_user',JSON.stringify(user));startUI();}
function startUI(){document.getElementById('v-auth').style.display='none';document.getElementById('app-header').style.display='flex';document.getElementById('side-user').innerText=user.name;document.getElementById('side-device').innerText="Device: "+dev;const ic=document.getElementById('u-icon');ic.style.background="var(--accent)";ic.innerText=user.name[0].toUpperCase();irA('v-hub');loadVoices();}
function irA(v){const vs=document.getElementsByClassName('vista');for(let i=0;i<vs.length;i++)vs[i].classList.remove('activa');document.getElementById(v).classList.add('activa');if(v==='v-hub')renderHub();toggleMenu(false);}
function toggleMenu(s){document.getElementById('sidebar').classList.toggle('open',s);document.getElementById('overlay').style.display=s?'block':'none';}
function openPanel(id){const p=document.getElementById(id);const v=p.style.display==='flex';const ps=document.getElementsByClassName('tool-panel');for(let i=0;i<ps.length;i++)ps[i].style.display='none';p.style.display=v?'none':'flex';}
function saveDoc(){const id=document.getElementById('v-edit').dataset.id||Date.now();const t=document.getElementById('e-title').innerText;const c=document.getElementById('e-body').innerHTML;db=db.filter(x=>x.id!=id);db.push({id,t,c,user:user.id,dev,stamp:new Date().toLocaleString()});localStorage.setItem('ret_db',JSON.stringify(db));voxSay("Proyecto guardado en "+dev,"Sincronizado");irA('v-hub');}
function renderHub(){const g=document.getElementById('hub-grid');const ds=db.filter(x=>x.user===user.id).reverse();g.innerHTML=ds.map(x=>`<div onclick="loadProject(${x.id})" style="background:white;padding:18px;border-radius:12px;border:1px solid #EEE;margin-bottom:8px;"><b>${x.t||'Sin Título'}</b><br><small style="color:#888">${x.stamp} | 📱 ${x.dev}</small></div>`).join('');}
function loadProject(id){const p=db.find(x=>x.id==id);document.getElementById('e-title').innerText=p.t;document.getElementById('e-body').innerHTML=p.c;document.getElementById('v-edit').dataset.id=id;irA('v-edit');}
function nuevoProyecto(){document.getElementById('e-title').innerText="";document.getElementById('e-body').innerHTML="";delete document.getElementById('v-edit').dataset.id;irA('v-edit');}
function addText(h){document.getElementById('e-body').innerHTML+=h;}
function loadVoices(){const e=document.getElementById('voice-engine');setTimeout(()=>{const v=window.speechSynthesis.getVoices();e.innerHTML=v.map(x=>`<option>${x.name}</option>`).join('');},800);}
function voxSay(m,t){document.getElementById('m-title').innerText=t;document.getElementById('m-body').innerText=m;document.getElementById('vox-modal').style.display='flex';}
function closeVox(){document.getElementById('vox-modal').style.display='none';}
function switchUser(){localStorage.removeItem('ret_user');location.reload();}
function cerrarSesion(){localStorage.removeItem('ret_user');location.reload();}
window.onload=()=>{if(user)startUI();};
</script>
</body>
</html>
