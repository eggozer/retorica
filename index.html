<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#061113">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.js"></script>

    <style>
        /* ==========================================================================
           VARIABLES Y CONFIGURACIÓN RETRO-CYBER
           ========================================================================== */
        :root {
            --bg-principal: #061113;
            --bg-superficie: #091c1f;
            --bg-botones: #0b2528;
            --neon-cian: #00ffcc;
            --neon-verde: #33ff66;
            --texto-principal: #e6f0f2;
            --texto-mutado: #64888c;
            --borde-radio: 8px;
            --shadow-neon: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        body.light-theme {
            --bg-principal: #f4f7f6;
            --bg-superficie: #e2edea;
            --bg-botones: #cce0db;
            --neon-cian: #1a4d46;
            --neon-verde: #2e7d32;
            --texto-principal: #0d2623;
            --texto-mutado: #52736e;
            --shadow-neon: none;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ==========================================================================
           HEADER Y CORRECCIÓN DE BOTONES (ENGRANE Y +)
           ========================================================================== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: var(--bg-principal);
            border-bottom: 2px solid var(--neon-cian);
            box-shadow: var(--shadow-neon);
            z-index: 10;
        }

        .header-title {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--neon-cian);
            text-shadow: var(--shadow-neon);
        }

        .btn-solido {
            background-color: var(--bg-botones) !important;
            border: 2px solid var(--neon-cian) !important;
            border-radius: var(--borde-radio);
            color: var(--neon-cian);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-neon);
            transition: all 0.2s ease;
        }

        /* Fuerza la eliminación del borde rojo residual en modo oscuro */
        body:not(.light-theme) #btn-config,
        body:not(.light-theme) #btn-config:focus {
            border: 2px solid var(--neon-cian) !important;
            outline: none !important;
        }

        /* ==========================================================================
           CORRECCIÓN DEL DESBORDAMIENTO DE LA BARRA DE HERRAMIENTAS
           ========================================================================== */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: var(--bg-superficie);
            border-bottom: 2px solid var(--neon-cian);
            
            /* Solución al desbordamiento en Pixel 2 / móviles */
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        /* Ocultar barra de scroll para mantener la UI limpia */
        .toolbar::-webkit-scrollbar {
            display: none;
        }

        .toolbar button {
            flex-shrink: 0; /* Evita que los botones se aplasten */
            background: transparent;
            border: 2px solid var(--neon-cian);
            color: var(--neon-cian);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .toolbar button.active {
            background-color: rgba(255, 0, 0, 0.2);
            border-color: #ff3333;
            color: #ff3333;
        }

        /* ==========================================================================
           ÁREA DE TRABAJO (EDITOR)
           ========================================================================== */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .note-title-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--texto-mutado);
            color: var(--neon-cian);
            font-size: 22px;
            font-weight: bold;
            padding: 8px 0;
            margin-bottom: 15px;
            outline: none;
        }

        .note-editor {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--texto-principal);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
        }

        /* ==========================================================================
           MENÚ LATERAL (SIDEBAR / CONFIGURACIÓN) Y REGISTRO
           ========================================================================== */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background-color: var(--bg-superficie);
            border-left: 2px solid var(--neon-cian);
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            z-index: 20;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--texto-mutado);
            padding-bottom: 10px;
        }

        /* Formulario de Registro e Historial de Usuarios */
        .auth-container {
            background-color: var(--bg-principal);
            border: 1px solid var(--texto-mutado);
            padding: 12px;
            border-radius: var(--borde-radio);
            margin-bottom: 15px;
        }

        .auth-container h4 {
            color: var(--neon-cian);
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .auth-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background-color: var(--bg-superficie);
            border: 1px solid var(--texto-mutado);
            color: var(--texto-principal);
            border-radius: 4px;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--neon-cian);
        }

        .btn-accion {
            width: 100%;
            padding: 8px;
            background-color: var(--bg-botones);
            border: 1px solid var(--neon-verde);
            color: var(--neon-verde);
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .user-badge {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 255, 204, 0.1);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        /* ==========================================================================
           FOOTER / BARRA DE ESTADO
           ========================================================================== */
        footer {
            display: flex;
            justify-content: space-between;
            padding: 6px 16px;
            background-color: var(--bg-superficie);
            border-top: 1px solid var(--texto-mutado);
            font-size: 12px;
            color: var(--texto-mutado);
        }
    </style>
</head>
<body>

    <header>
        <button id="btn-config" class="btn-solido" title="Configuración y Usuarios">⚙️</button>
        <div class="header-title">RETÓRICA</div>
        <button id="btn-nueva-nota" class="btn-solido" title="Nueva Nota">＋</button>
    </header>

    <div class="toolbar" id="toolbar-herramientas">
        <button id="btn-guardar">GUARDAR</button>
        <button id="btn-deshacer">↩</button>
        <button id="btn-rehacer">↪</button>
        <button id="btn-mic">🎙️ Dictar</button>
        <button id="btn-tts">🔊 Leer</button>
        <button id="btn-exportar-pdf">📄 PDF</button>
        <button id="btn-exportar-word">💙 Word (DOC)</button>
    </div>

    <main class="workspace">
        <input type="text" id="input-titulo" class="note-title-input" placeholder="Título de la Nota" value="Nota Nueva en RAM">
        <textarea id="txt-editor" class="note-editor" placeholder="Comienza a dictar o escribir aquí tu obra..."></textarea>
    </main>

    <div class="sidebar" id="panel-configuracion">
        <div class="sidebar-header">
            <h3>Configuración</h3>
            <button id="btn-cerrar-config" style="background:transparent; border:none; color:var(--neon-cian); font-size:20px; cursor:pointer;">✕</button>
        </div>

        <div class="auth-container">
            <h4>Gestión de Usuario</h4>
            <div id="auth-anonimo">
                <input type="text" id="reg-username" class="auth-input" placeholder="Nombre de usuario o alias">
                <button id="btn-registrar" class="btn-accion">CREAR REGISTRO LOCAL</button>
            </div>
            <div id="auth-activo" style="display: none;">
                <div class="user-badge">
                    <span>Usuario: <strong id="lbl-usuario-actual"></strong></span>
                    <button id="btn-logout" style="background:transparent; border:none; color:red; cursor:pointer;">Salir</button>
                </div>
            </div>
        </div>

        <div style="margin-top: 15px;">
            <h4>Preferencias</h4>
            <button id="btn-cambiar-tema" class="btn-accion" style="border-color: var(--neon-cian); color: var(--neon-cian); margin-top: 10px;">Alternar Tema Claro/Oscuro</button>
        </div>

        <div style="margin-top: 20px; flex: 1; overflow-y: auto;">
            <h4>Historial de Notas locales:</h4>
            <div id="lista-notas-historial" style="font-size: 13px; color: var(--texto-mutado); margin-top: 10px;">
                No hay registros coincidentes
            </div>
        </div>
    </div>

    <footer>
        <span id="txt-contador-caracteres">Caracteres: 0</span>
        <span id="lbl-estado-sistema">Estado: Modo Local (Información Resguardada)</span>
    </footer>

    <script src="storage.js"></script>
    <script src="auth.js"></script>
    <script src="audio.js"></script>
    <script src="main.js"></script>
    <script>
        // Inicialización del Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker Activo."))
                .catch(err => console.error("Error en SW:", err));
        }
    </script>
</body>
</html>
