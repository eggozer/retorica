<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retórica</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <style>
        :root {
            --azul-noche: #0b132b;
            --azul-fuego: #1c2541;
            --oro-sol: #ffca28;
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--azul-noche);
            color: var(--blanco);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Menú Lateral Lateral Izquierdo */
        #sidebar {
            width: 280px;
            background-color: var(--azul-fuego);
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        #sidebar.hidden {
            transform: translateX(-280px);
        }

        /* Área de Trabajo Principal */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            background: linear-gradient(135deg, var(--azul-noche) 0%, #111e44 100%);
        }

        textarea {
            width: 100%;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--blanco);
            padding: 15px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: 2px solid var(--oro-sol);
        }

        /* Botón de alternancia posicionado al medio derecho de la plantilla */
        #toggle-menu-btn {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background-color: var(--oro-sol);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--azul-noche);
            z-index: 11;
        }

        /* Componentes de Interfaz */
        .btn {
            background-color: var(--oro-sol);
            color: var(--azul-noche);
            border: none;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #ffe082;
        }

        .btn-mic {
            background-color: #e53935;
            color: white;
        }

        .btn-mic.active {
            background-color: #4caf50;
            animation: pulse 1.5s infinite;
        }

        #options-panel {
            display: none;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 6px;
            margin-top: 5px;
        }

        select, .sub-btn {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            border: none;
        }

        .sub-btn {
            background-color: #4f5d75;
            color: white;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Retórica App</h3>
        <button class="btn btn-mic" id="mic-btn">🎙️ Dictar Texto</button>
        <button class="btn" id="quick-save-btn">💾 Guardar</button>
        <button class="btn" id="save-as-btn">⚙️ Guardar como...</button>
        
        <div id="options-panel">
            <label for="format-select">Formato:</label>
            <select id="format-select">
                <option value="txt">Texto Plano (.txt)</option>
                <option value="md">Markdown (.md)</option>
                <option value="html">Web (.html)</option>
            </select>
            
            <button class="sub-btn" id="dest-device">📱 Guardar en Dispositivo</button>
            <button class="sub-btn" id="dest-sd">💾 Tarjeta Externa</button>
            <button class="sub-btn" id="dest-share">🔗 Compartir Trabajo</button>
        </div>

        <button id="toggle-menu-btn">↔</button>
    </div>

    <div id="main-content">
        <textarea id="editor" placeholder="El sol de la retórica iluminará tus ideas... Empieza a escribir o usa el dictado por voz."></textarea>
    </div>

    <script>
        // Variables de Elementos del DOM
        const sidebar = document.getElementById('sidebar');
        const toggleMenuBtn = document.getElementById('toggle-menu-btn');
        const editor = document.getElementById('editor');
        const quickSaveBtn = document.getElementById('quick-save-btn');
        const saveAsBtn = document.getElementById('save-as-btn');
        const optionsPanel = document.getElementById('options-panel');
        const micBtn = document.getElementById('mic-btn');
        const formatSelect = document.getElementById('format-select');

        // Variables de Control Táctil (Swipe)
        let touchStartX = 0;
        let touchEndX = 0;

        // 1. GESTIÓN DE GUARDADO
        function descargarArchivo(contenido, extension, destinoNombre) {
            const blob = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `trabajo_retorica.${extension}`;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // Guardar rápido directo (Sin preguntar nada)
        quickSaveBtn.addEventListener('click', () => {
            descargarArchivo(editor.value, 'txt');
        });

        // Guardar como (Muestra opciones avanzadas de formato y destino)
        saveAsBtn.addEventListener('click', () => {
            const isVisible = optionsPanel.style.display === 'block';
            optionsPanel.style.display = isVisible ? 'none' : 'block';
        });

        // Acciones de destinos específicos
        document.getElementById('dest-device').addEventListener('click', () => {
            descargarArchivo(editor.value, formatSelect.value);
            alert('Guardado en la memoria interna del dispositivo.');
        });

        document.getElementById('dest-sd').addEventListener('click', () => {
            descargarArchivo(editor.value, formatSelect.value);
            alert('Guardado en la tarjeta de almacenamiento externo.');
        });

        document.getElementById('dest-share').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Mi Trabajo en Retórica',
                        text: editor.value
                    });
                } catch (err) {
                    console.log('Error al compartir:', err);
                }
            } else {
                alert('La función de compartir no es compatible con este navegador.');
            }
        });

        // 2. INTERFAZ HÍBRIDA (BOTÓN MEDIO + DESLIZAMIENTO TÁCTIL)
        function toggleSidebar() {
            sidebar.classList.toggle('hidden');
        }

        toggleMenuBtn.addEventListener('click', toggleSidebar);

        // Captura de gestos para pantallas táctiles (Optimizado para Opera y Tablets)
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const swipeThreshold = 80; // Distancia mínima de deslizamiento
            // Swipe a la izquierda oculta el menú si está visible
            if (touchStartX - touchEndX > swipeThreshold && !sidebar.classList.contains('hidden')) {
                sidebar.classList.add('hidden');
            }
            // Swipe a la derecha muestra el menú si está oculto
            if (touchEndX - touchStartX > swipeThreshold && sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
            }
        }

        // 4. RECONOCIMIENTO DE VOZ CON AUTO-APAGADO POR SILENCIO (6 SEGUNDOS)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let silenceTimer;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'es-ES';

            recognition.onstart = () => {
                isListening = true;
                micBtn.textContent = "🛑 Grabando...";
                micBtn.classList.add('active');
                resetSilenceTimer();
            };

            recognition.onresult = (event) => {
                const currentResultIndex = event.resultIndex;
                const transcript = event.results[currentResultIndex][0].transcript;
                editor.value += (editor.value ? ' ' : '') + transcript;
                resetSilenceTimer(); // Se reinicia el contador porque el usuario habló
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.textContent = "🎙️ Dictar Texto";
                micBtn.classList.remove('active');
                clearTimeout(silenceTimer);
            };

            recognition.onerror = (err) => {
                console.error("Error de reconocimiento:", err.error);
                recognition.stop();
            };
        } else {
            micBtn.style.display = 'none';
            console.log("El reconocimiento de voz no está soportado en este navegador.");
        }

        function resetSilenceTimer() {
            clearTimeout(silenceTimer);
            // Si pasan 6 segundos (6000ms) sin recibir texto, el micrófono se apaga solo
            silenceTimer = setTimeout(() => {
                if (isListening) {
                    console.log("6 segundos de silencio detectados. Desactivando micrófono.");
                    recognition.stop();
                }
            }, 6000);
        }

        micBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        });
    </script>
</body>
</html>
