<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0a0f1d;
            --bg-sidebar: #111827;
            --accent-blue: #1e62ec;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR (BIBLIOTECA) */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            flex-shrink: 0;
        }

        .sidebar.hidden {
            transform: translateX(-320px);
            margin-right: -320px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            object-fit: cover;
        }

        .brand-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffca28;
        }

        /* Remoción absoluta de botones físicos para alternar menú (Punto 1) */
        #menu-toggle, .close-sidebar-btn {
            display: none !important;
        }

        .document-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .doc-item {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .doc-item.active {
            background: rgba(30, 98, 236, 0.15);
            border-color: var(--accent-blue);
        }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* BARRA SUPERIOR */
        .top-toolbar {
            height: 65px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(10px);
        }

        .editor-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #btn-guardar {
            background: var(--accent-blue);
            font-weight: bold;
        }

        /* ÁREA DE EDICIÓN */
        .editor-wrapper {
            flex-grow: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        #editor {
            width: 100%;
            flex-grow: 1;
            background: transparent;
            border: none;
            resize: none;
            color: var(--text-main);
            font-size: 1.15rem;
            line-height: 1.7;
            outline: none;
        }

        /* BOTONERA INFERIOR DE FORMATOS (GUARDAR COMO...) */
        .bottom-formats-bar {
            padding: 15px 25px;
            border-top: 1px solid var(--border-color);
            background-color: #0f172a;
            display: flex;
            gap: 12px;
            align-items: center;
            overflow-x: auto;
        }

        .format-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 8px;
            white-space: nowrap;
        }

        .btn-format {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-format:hover {
            background: var(--accent-blue);
            border-color: transparent;
        }

        /* Supresión completa de modales de ruta intermedias */
        #pantalla-guardar-en, .modal-ruta {
            display: none !important;
        }

        /* TOAST DE NOTIFICACIÓN */
        .toast {
            position: fixed;
            bottom: 85px;
            right: 25px;
            background: #1e293b;
            border-left: 4px solid var(--accent-blue);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 6px;
            transform: translateY(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand-container">
                <img src="icon-192.png?v=2" alt="Retórica Sol" class="brand-icon">
                <span class="brand-title">BIBLIOTECA</span>
            </div>
            <button id="btn-nuevo-sidebar">➕</button>
        </div>
        <div class="document-list" id="document-list">
            </div>
    </div>

    <div class="main-container">
        <div class="top-toolbar">
            <div class="editor-actions">
                <select id="cambiarPaleta">
                    <option value="oscuro">🌙 Oscuro</option>
                    <option value="claro">☀️ Claro</option>
                </select>
                <select id="app-lang">
                    <option value="es">App: Español</option>
                </select>
                <select id="voice-lang">
                    <option value="es-MX">Voz: Español</option>
                </select>
            </div>
            <div class="editor-actions">
                <button id="btn-mic">🎙️ MIC (DICTADO)</button>
                <button id="btn-lectura">🔊 LECTURA</button>
                <button id="btn-guardar">GUARDAR</button>
            </div>
        </div>

        <div class="editor-wrapper">
            <textarea id="editor" placeholder="Escribe aquí tu guion o nota..."></textarea>
        </div>

        <div class="bottom-formats-bar">
            <span class="format-label">Guardar como:</span>
            <button class="btn-format" id="export-pdf">PDF</button>
            <button class="btn-format" id="export-pdf-edit">PDF Editable</button>
            <button class="btn-format" id="export-doc">DOC</button>
        </div>
    </div>

    <div class="toast" id="toast-notif">Operación exitosa</div>

    <script>
        // --- VARIABLES GLOBALES Y CONTROL DE CONFIGURACIÓN ---
        const DB_KEY = "Retorica_Docs_Data";
        let activeId = null;

        // --- MANEJO DE DESLIZAMIENTO TÁCTIL PARA CONTRAER/EXPANDIR MENÚ ---
        let touchStartX = 0;
        let touchStartY = 0;
        const sidebar = document.getElementById('sidebar');

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;

            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;

            let diffX = touchStartX - touchEndX;
            let diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 70 && !sidebar.classList.contains('hidden')) {
                    sidebar.classList.add('hidden');
                    showToast("Biblioteca oculta");
                } else if (diffX < -70 && sidebar.classList.contains('hidden')) {
                    sidebar.classList.remove('hidden');
                    showToast("Biblioteca desplegada");
                }
            }
            touchStartX = 0;
            touchStartY = 0;
        }, { passive: true });


        // --- SISTEMA DE PROCESAMIENTO Y DESCARGA LOCAL DIRECTA (PUNTOS 1 Y 4) ---
        function obtenerNombreArchivo() {
            const texto = document.getElementById('editor').value.trim();
            if (!texto) return "documento_sin_titulo";
            return texto.split('\n')[0].replace(/[\\/:*?"<>|]/g, "").substring(0, 25) || "documento_sin_titulo";
        }

        function procesarDescargaInmediata(contenido, tipoMime, extension) {
            const blob = new Blob([contenido], { type: tipoMime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${obtenerNombreArchivo()}.${extension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            showToast(`Guardado local: ${extension.toUpperCase()}`);
        }

        // El botón principal de GUARDAR genera y descarga el archivo HTML local directamente
        function guardarComoHtml() {
            const contenido = document.getElementById('editor').value;
            const htmlEstructura = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${obtenerNombreArchivo()}</title><style>body{font-family:sans-serif;padding:30px;line-height:1.6;color:#1e293b;}</style></head><body><p>${contenido.replace(/\n/g, '<br>')}</p></body></html>`;
            procesarDescargaInmediata(htmlEstructura, 'text/html;charset=utf-8', 'html');
            
            // Sincroniza en paralelo el estado del texto en el LocalStorage interno
            guardarEstadoInterno();
        }

        document.getElementById('btn-guardar').addEventListener('click', guardarComoHtml);

        // Formatos de Guardar Como... de la barra inferior
        document.getElementById('export-pdf').addEventListener('click', () => {
            const texto = document.getElementById('editor').value;
            if(!texto.trim()) return showToast("Editor vacío");
            
            const elementoRaiz = document.createElement('div');
            elementoRaiz.style.padding = '20px';
            elementoRaiz.style.color = '#000000';
            elementoRaiz.innerHTML = texto.replace(/\n/g, '<br>');
            
            const opcionesPdf = {
                margin: 15,
                filename: `${obtenerNombreArchivo()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opcionesPdf).from(elementoRaiz).save().then(() => {
                showToast("PDF generado localmente");
            });
        });

        document.getElementById('export-pdf-edit').addEventListener('click', () => {
            const contenido = document.getElementById('editor').value;
            const pdfEditableEstructura = `<html><body style="padding:20px;background-color:#ffffff;"><form><textarea style="width:100%;height:90vh;font-size:16px;font-family:sans-serif;padding:10px;color:#000000;border:1px solid #ccc;">${contenido}</textarea></form></body></html>`;
            procesarDescargaInmediata(pdfEditableEstructura, 'text/html;charset=utf-8', 'pdf.html');
        });

        document.getElementById('export-doc').addEventListener('click', () => {
            const contenido = document.getElementById('editor').value;
            const docEstructura = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><title>Documento</title></head><body style="font-family:Arial;">${contenido.replace(/\n/g, '<p></p>')}</body></html>`;
            procesarDescargaInmediata(docEstructura, 'application/msword;charset=utf-8', 'doc');
        });


        // --- PERSISTENCIA Y PERSISTENCIA COMPATIBLE EN LOCALSTORAGE ---
        function obtenerDocs() {
            const localData = localStorage.getItem(DB_KEY);
            return localData ? JSON.parse(localData) : [];
        }

        function guardarEstadoInterno() {
            const texto = document.getElementById('editor').value;
            if (!texto.trim()) return;

            let documentos = obtenerDocs();
            const fechaActual = new Date().toLocaleString();

            if (activeId === null) {
                const nuevo = { id: Date.now(), texto: texto, fecha: fechaActual };
                documentos.push(nuevo);
                activeId = nuevo.id;
            } else {
                documentos = documentos.map(doc => {
                    if (doc.id === activeId) return { ...doc, texto: texto, fecha: fechaActual };
                    return doc;
                });
            }
            localStorage.setItem(DB_KEY, JSON.stringify(documentos));
            renderLib();
        }

        function renderLib() {
            const lista = document.getElementById('document-list');
            lista.innerHTML = "";
            const documentos = obtenerDocs();

            documentos.forEach(doc => {
                const item = document.createElement('div');
                item.className = `doc-item ${doc.id === activeId ? 'active' : ''}`;
                
                const primerRenglon = doc.texto.split('\n')[0].substring(0, 25) || "Nota sin título";
                
                item.innerHTML = `
                    <div style="font-weight:500; font-size:0.95rem; margin-bottom:4px;">${primerRenglon}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted); display:flex; justify-content:space-between; align-items:center;">
                        <span>${doc.fecha}</span>
                        <span onclick="event.stopPropagation(); borrarDoc(${doc.id});" style="color:#ef4444; cursor:pointer; font-weight:bold; padding:2px 6px;">🗑️ Borrar</span>
                    </div>
                `;
                
                item.onclick = () => {
                    activeId = doc.id;
                    document.getElementById('editor').value = doc.texto;
                    renderLib();
                };
                
                lista.appendChild(item);
            });
        }


        // --- RECONOCIMIENTO DE VOZ UNIVERSAL Y REARMADO POR SILENCIO (6S) ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reconocimiento;
        let timerSilencio;
        let grabando = false;

        if (Recognition) {
            reconocimiento = new Recognition();
            reconocimiento.continuous = true;
            reconocimiento.interimResults = false;

            reconocimiento.onstart = () => {
                grabando = true;
                document.getElementById('btn-mic').textContent = "🛑 GRABANDO...";
                resetearTimerSilencio();
            };

            reconocimiento.onresult = (e) => {
                const transcripcion = e.results[e.resultIndex][0].transcript;
                const txtarea = document.getElementById('editor');
                txtarea.value += (txtarea.value ? ' ' : '') + transcripcion;
                resetearTimerSilencio();
            };

            reconocimiento.onend = () => {
                grabando = false;
                document.getElementById('btn-mic').textContent = "🎙️ MIC (DICTADO)";
                clearTimeout(timerSilencio);
            };
        }

        function resetearTimerSilencio() {
            clearTimeout(timerSilencio);
            timerSilencio = setTimeout(() => {
                if (grabando) {
                    reconocimiento.stop();
                    showToast("Micrófono pausado por silencio");
                }
            }, 6000);
        }

        document.getElementById('btn-mic').addEventListener('click', () => {
            if (!reconocimiento) return showToast("Dictado no soportado en este navegador");
            if (grabando) {
                reconocimiento.stop();
            } else {
                reconocimiento.lang = document.getElementById('voice-lang').value;
                reconocimiento.start();
            }
        });


        // --- MOTOR DE SÍNTESIS DE VOZ (LECTURA) ---
        document.getElementById('btn-lectura').addEventListener('click', () => {
            const texto = document.getElementById('editor').value;
            if (!texto.trim()) return showToast("Nada que leer");
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const lectura = new SpeechSynthesisUtterance(texto);
                lectura.lang = document.getElementById('voice-lang').value;
                window.speechSynthesis.speak(lectura);
                showToast("Leyendo texto...");
            } else {
                showToast("Lectura no soportada");
            }
        });


        // --- COMPONENTE TOAST DE NOTIFICACIONES ---
        function showToast(mensaje) {
            const toast = document.getElementById('toast-notif');
            toast.textContent = mensaje;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }


        // --- COMPATIBILIDAD DE CONTROLADORES DE SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Lista para usar de forma local', reg.scope))
                    .catch(err => console.warn('Aviso de Service Worker:', err));
            });
        }


        // --- SECCIÓN FINAL: FUNCIONES ORIGINALES DE OPERACIÓN DE REPOSITORIO (816 - 846) ---
        function borrarDoc(id) {
            var dbDocs = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            var filtrado = [];
            for (var i = 0; i < dbDocs.length; i++) {
                if (dbDocs[i].id !== id) {
                    filtrado.push(dbDocs[i]);
                }
            }
            localStorage.setItem(DB_KEY, JSON.stringify(filtrado));
            if (activeId === id) nuevoDoc();
            renderLib();
        }

        function nuevoDoc() {
            activeId = null;
            document.getElementById('editor').value = "";
            renderLib();
            showToast("Nuevo lienzo limpio");
        }

        document.getElementById('btn-nuevo-sidebar').addEventListener('click', nuevoDoc);

        function formato(c) { 
            document.execCommand(c, false, null); 
        }
        
        function cambiarColorTexto() { 
            document.execCommand('foreColor', false, '#ff0000'); 
        }
        
        function cambiarColorRelleno() { 
            document.execCommand('hiliteColor', false, '#ffff00'); 
        }

        function cambiarPaleta() {
            var paleta = document.getElementById('cambiarPaleta').value;
            var rootElement = document.documentElement;
            if (paleta === "claro") {
                rootElement.style.setProperty('--bg', '#ffffff');
                rootElement.style.setProperty('--text-main', '#1e293b');
                rootElement.style.setProperty('--bg-sidebar', '#f3f4f6');
            } else if (paleta === "oscuro") {
                rootElement.style.setProperty('--bg', '#0a0f1d');
                rootElement.style.setProperty('--text-main', '#f3f4f6');
                rootElement.style.setProperty('--bg-sidebar', '#111827');
            }
        }

        document.getElementById('cambiarPaleta').addEventListener('change', cambiarPaleta);

        window.onload = () => {
            renderLib();
        };
    </script>
</body>
</html>
