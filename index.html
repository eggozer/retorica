<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica V12.1</title>
    <style>:root { --p: #0f172a; --bg: #ffffff; --accent: #2563eb; --muted: #64748b; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: var(--bg); height: 100vh; overflow: hidden; }
#v-auth { position: fixed; inset: 0; background: var(--p); z-index: 9999; display: none; align-items: center; justify-content: center; color: white; }
.auth-box { background: white; padding: 30px; border-radius: 20px; color: var(--p); text-align: center; width: 90%; max-width: 350px; }
.input-field { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; }
.btn-main { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; }
#main-app { display: none; height: 100vh; flex-direction: column; }
#sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 9000; transition: 0.3s; padding: 60px 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
#sidebar.open { left: 0; }
.menu-tool { display: flex; align-items: center; width: 100%; padding: 12px; margin-bottom: 8px; background: #f1f5f9; border: none; border-radius: 10px; font-weight: bold; }
.menu-tool i { margin-right: 12px; font-style: normal; font-size: 20px; }
header { height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #eee; }
#editor { flex: 1; padding: 20px; overflow-y: auto; font-size: 18px; outline: none; padding-bottom: 100px; }

    </style>
</head>
<body><div id="v-auth">
    <div class="auth-box">
        <h2>RETÓRICA</h2>
        <input type="email" id="u-email" class="input-field" placeholder="Tu cuenta">
        <button class="btn-main" onclick="saveUser()">INGRESAR</button>
    </div>
</div>

<nav id="sidebar" id="sidebar">
    <h3 style="margin-bottom:20px">Herramientas</h3>
    <button class="menu-tool" onclick="dictar()"><i>🎤</i> Dictar</button>
    <button class="menu-tool" onclick="leer()"><i>🔊</i> Leer</button>
    <button class="menu-tool" onclick="abrirGuardar()"><i>💾</i> Guardar</button>
    <hr style="margin:20px 0; opacity:0.2">
    <div id="dev-tag" style="font-size:10px; color:gray; margin-bottom:20px"></div>
    <button onclick="logout()" style="color:red; border:none; background:none; font-weight:bold">Cerrar Sesión</button>
</nav>

<div id="main-app">
    <header>
        <div style="font-size:28px; cursor:pointer" onclick="document.getElementById('sidebar').classList.add('open')">☰</div>
        <div style="margin-left:20px; font-weight:bold">RETÓRICA</div>
    </header>
    <div id="editor" contenteditable="true" placeholder="Escribe aquí..." oninput="autoSave()"></div>
</div>


<script>/* 1. MOTOR DE DETECCIÓN UNIVERSAL */
const getHardwareInfo = () => {
    const ua = navigator.userAgent;
    if (/Android/i.test(ua)) return "Android Terminal";
    if (/iPhone|iPad|iPod/i.test(ua)) return "iOS Terminal";
    if (/Windows/i.test(ua)) return "Windows PC";
    return "Web Terminal";
};

/* 2. LÓGICA DE ARRANQUE (Detección de sesión) */
window.onload = () => {
    const sessionActive = localStorage.getItem('ret_user');
    const authScreen = document.getElementById('v-auth');
    const mainApp = document.getElementById('main-app');
    const editor = document.getElementById('editor');

    if (sessionActive) {
        // Usuario detectado: saltar login
        if (authScreen) authScreen.style.display = 'none';
        if (mainApp) mainApp.style.display = 'flex';
        
        // Mostrar info en el menú
        const tag = document.getElementById('dev-tag');
        if (tag) tag.innerText = "Vínculo: " + getHardwareInfo();

        // Cargar texto guardado
        const savedText = localStorage.getItem('ret_content');
        if (savedText && editor) editor.innerHTML = savedText;
    } else {
        // Sin sesión: mostrar pantalla azul
        if (authScreen) authScreen.style.display = 'flex';
        if (mainApp) mainApp.style.display = 'none';
    }
};

/* 3. FUNCIONES DE CUENTA */
function saveUser() {
    const mail = document.getElementById('u-email').value;
    if (mail.trim() !== "") {
        localStorage.setItem('ret_user', mail.trim());
        window.location.reload(); 
    } else {
        alert("Por favor, ingresa una cuenta.");
    }
}

function logout() {
    localStorage.removeItem('ret_user');
    window.location.reload();
}

/* 4. HERRAMIENTAS DE PRODUCCIÓN (Ahora en el menú) */
function autoSave() {
    const content = document.getElementById('editor').innerHTML;
    localStorage.setItem('ret_content', content);
}

function dictar() {
    if (!('webkitSpeechRecognition' in window)) return alert("Dictado no soportado en este navegador.");
    const recognition = new webkitSpeechRecognition();
    recognition.lang = 'es-MX';
    recognition.onresult = (event) => {
        document.getElementById('editor').innerHTML += " " + event.results[0][0].transcript;
        autoSave();
    };
    recognition.start();
}

function leer() {
    const text = document.getElementById('editor').innerText;
    if (!text) return;
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'es-MX';
    window.speechSynthesis.speak(speech);
}

function abrirGuardar() {
    const content = document.getElementById('editor').innerText;
    const blob = new Blob([content], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Retorica_${Date.now()}.txt`;
    a.click();
}
    
</script>
</body>
</html>
