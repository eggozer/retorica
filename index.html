<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica - Bloc de Notas</title>
    <link rel="manifest" href="./manifest.json?v=6">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-main: #0a0f1d;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --bg-card-active: #374151;
            --accent: #ffca28;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #2d3748;
            --danger: #ef4444;
        }

        body.light-theme {
            --bg-main: #f9fafb;
            --bg-sidebar: #f3f4f6;
            --bg-card: #ffffff;
            --bg-card-active: #e5e7eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #d1d5db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        button, select {
            border-radius: 4px !important; 
        }

        /* --- MENÚ LATERAL (BIBLIOTECA) --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 120;
        }

        .sidebar.hidden {
            transform: translateX(-280px);
        }

        .toggle-sidebar-pestaña {
            position: absolute;
            right: -32px;
            top: 12px;
            width: 32px;
            height: 40px;
            background-color: var(--bg-sidebar);
            color: var(--accent);
            border: 1px solid var(--border);
            border-left: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 3px 2px 5px rgba(0,0,0,0.3);
            z-index: 121;
        }

        .sidebar-header {
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            flex-shrink: 0;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            width: 24px;
            height: 24px;
        }

        .brand-title {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .btn-nuevo-doc {
            background: var(--accent);
            color: #0a0f1d;
            font-weight: bold;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .document-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .doc-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .doc-item.active {
            background-color: var(--bg-card-active);
            border-color: var(--accent);
        }

        .doc-title {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .doc-preview {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .doc-actions-pasarela {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .doc-actions-pasarela::-webkit-scrollbar {
            display: none;
        }

        .btn-action-mini {
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 4px 8px;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-action-mini.primary { border-color: var(--accent); color: var(--accent); }
        .btn-action-mini.danger { border-color: var(--danger); color: var(--danger); }

        .sidebar-footer-menu {
            padding: 12px;
            border-top: 1px solid var(--border);
            background-color: rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .footer-menu-title {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .footer-buttons-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-footer-action {
            width: 100%;
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
        }

        .btn-pwa-sidebar {
            display: none;
            width: 100%;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            margin-top: 6px;
            cursor: pointer;
            text-align: center;
        }
        #btn-pwa-instalar { background-color: #10b981; color: white; }
        #btn-pwa-actualizar { background-color: #0284c7; color: white; }

        /* --- CONTENEDOR CENTRAL DE EDICIÓN --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background-color: var(--bg-main);
            padding-left: 0; 
            position: relative;
        }

        /* 1.- BARRA DE FUNCIONES FLUIDA Y SEPARABLE INSPIRADA EN FL STUDIO 5 */
        .top-toolbar {
            min-height: 64px;
            max-height: auto;
            border-bottom: 1px solid var(--border);
            padding: 6px 8px 6px 40px; 
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap; 
            overflow-x: auto;
            overflow-y: hidden;
            flex-shrink: 0; 
            background-color: var(--bg-main);
            z-index: 90;
            scrollbar-width: none;
        }

        .top-toolbar::-webkit-scrollbar {
            display: none;
        }

        /* Bloques modulares magnéticos movibles */
        .toolbar-rack {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(255,255,255,0.03);
            border: 1px dashed var(--border);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
            touch-action: none; 
        }

        .toolbar-rack:active {
            cursor: grabbing;
            background-color: rgba(255,255,255,0.08);
        }

        /* Grip visual indicador de movimiento tipo hardware */
        .rack-grip {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-right: 4px;
            letter-spacing: 1px;
        }

        .toolbar-item {
            flex-shrink: 0;
        }

        .btn-icon-pure {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            height: 40px;
            padding: 0 12px;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-text-action {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            height: 40px;
            padding: 0 14px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-text-action.accent-btn {
            background-color: var(--accent);
            color: #0a0f1d;
            border: none;
        }

        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden; 
        }

        textarea {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.05rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            overflow-y: auto; 
        }

        .stats-bar {
            height: 28px;
            border-top: 1px solid var(--border);
            padding-top: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--accent);
            color: #0a0f1d;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            pointer-events: none;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <!-- MENÚ LATERAL INTERFACES (BIBLIOTECA) -->
    <div class="sidebar hidden" id="sidebar">
        <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña">▶</div>
        
        <div class="sidebar-header">
            <div class="brand-container">
                <div class="brand-icon-wrapper">☀️</div>
                <span class="brand-title">RETÓRICA</span>
            </div>
            <button class="btn-nuevo-doc" id="btn-nuevo">➕</button>
        </div>

        <div class="document-list" id="document-list"></div>

        <div class="sidebar-footer-menu">
            <button class="btn-pwa-sidebar" id="btn-pwa-instalar">📥 INSTALL APP</button>
            <button class="btn-pwa-sidebar" id="btn-pwa-actualizar">🔄 UPDATE APP</button>
            <div style="height: 10px;"></div>

            <div class="footer-menu-title" id="lbl-save-as">Guardar como:</div>
            <div class="footer-buttons-container">
                <button class="btn-footer-action" id="export-pdf">1.- PDF</button>
                <button class="btn-footer-action" id="export-pdf-edit">2.- PDF Editable</button>
                <button class="btn-footer-action" id="export-doc">3.- DOC</button>
            </div>
        </div>
    </div>

    <!-- ÁREA CENTRAL DE TRABAJO -->
    <div class="main-container">
        <!-- 1.- BARRA SUPERIOR DINÁMICA CON CONTENEDORES MÓVILES INDEPENDIENTES -->
        <div class="top-toolbar" id="toolbar-container">
            
            <!-- CONTENEDOR A: DICTADO Y LECTURA -->
            <div class="toolbar-rack" draggable="true" id="rack-audio">
                <span class="rack-grip">⋮⋮</span>
                <button class="btn-icon-pure toolbar-item" id="btn-mic" title="Dictado por voz">🎙️</button>
                <button class="btn-icon-pure toolbar-item" id="btn-lectura" title="Leer texto">🔊</button>
            </div>

            <!-- CONTENEDOR B: IDIOMAS SELECCIONABLES (INTERFAZ + CAPTURA INTERNACIONAL EXPANSIÓN) -->
            <div class="toolbar-rack" draggable="true" id="rack-idiomas">
                <span class="rack-grip">⋮⋮</span>
                <select id="app-lang" class="toolbar-item" title="Idioma de la App">
                    <option value="es">Español</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Português</option>
                    <option value="ru">Русский</option>
                    <option value="zh">中文 (简体)</option>
                    <option value="ja">日本語</option>
                    <option value="zh-HK">廣東話 (香港)</option>
                    <option value="ar">العربية</option>
                    <option value="hi">हिन्दी</option>
                </select>

                <select id="voice-lang" class="toolbar-item" title="Idioma de Dictado">
                    <option value="es-MX">Español (MX)</option>
                    <option value="es-ES">Español (ES)</option>
                    <option value="en-US">English (US)</option>
                    <option value="en-GB">English (UK)</option>
                    <option value="fr-FR">Français (FR)</option>
                    <option value="de-DE">Deutsch (DE)</option>
                    <option value="it-IT">Italiano (IT)</option>
                    <option value="pt-BR">Português (BR)</option>
                    <option value="ru-RU">Русский (RU)</option>
                    <option value="zh-CN">中文 (中国大陆)</option>
                    <option value="ja-JP">日本語 (日本)</option>
                    <option value="zh-HK">廣東話 (香港)</option>
                    <option value="ar-SA">العربية (السعودية)</option>
                    <option value="hi-IN">हिन्दी (भारत)</option>
                </select>
            </div>

            <!-- CONTENEDOR C: TEMA Y GUARDADO HTML DIRECTO -->
            <div class="toolbar-rack" draggable="true" id="rack-sistema">
                <span class="rack-grip">⋮⋮</span>
                <button class="btn-icon-pure toolbar-item" id="btn-toggle-tema" title="Alternar Tema">🌙</button>
                <button class="btn-text-action accent-btn toolbar-item" id="btn-main-guardar">GUARDAR HTML</button>
            </div>

        </div>

        <!-- EDITOR INDEPENDIENTE -->
        <div class="editor-wrapper">
            <textarea id="editor" placeholder="Escribe tu guion o nota aquí..."></textarea>
            <div class="stats-bar" id="stats-bar">Caracteres: 0 | Palabras: 0 | Líneas: 0</div>
        </div>
    </div>

    <div class="toast" id="toast-notif">Operación exitosa</div>

    <script>
        // --- MOTOR DE TRADUCCIÓN INTERNACIONAL EXPANDIDO ---
        const TRADUCCIONES = {
            es: { placeholder: "Escribe tu guion o nota aquí...", saveAs: "Guardar como:", btnGuardar: "GUARDAR HTML", stats: "Caracteres: {c} | Palabras: {w} | Líneas: {l}", toastCargada: "Nota cargada", toastVacio: "Editor vacío", toastDescarga: "Descargado .{ext}", toastNoSoportado: "No soportado", toastLimpio: "Nuevo lienzo", toastEliminado: "Nota eliminada", confirmBorrar: "¿Eliminar nota?", btnInstalar: "📥 INSTALAR APP", btnActualizar: "🔄 ACTUALIZAR APP" },
            en: { placeholder: "Write your script or note here...", saveAs: "Save as:", btnGuardar: "SAVE HTML", stats: "Characters: {c} | Words: {w} | Lines: {l}", toastCargada: "Note loaded", toastVacio: "Empty editor", toastDescarga: "Downloaded .{ext}", toastNoSoportado: "Not supported", toastLimpio: "New canvas", toastEliminado: "Note deleted", confirmBorrar: "Delete note?", btnInstalar: "📥 INSTALL APP", btnActualizar: "🔄 UPDATE APP" },
            fr: { placeholder: "Écrivez votre script ou note ici...", saveAs: "Enregistrer sous:", btnGuardar: "SAUVEGARDER HTML", stats: "Caractères: {c} | Mots: {w} | Lignes: {l}", toastCargada: "Note chargée", toastVacio: "Éditeur vide", toastDescarga: "Téléchargé .{ext}", toastNoSoportado: "Non supporté", toastLimpio: "Nouvelle toile", toastEliminado: "Note supprimée", confirmBorrar: "Supprimer la note?", btnInstalar: "📥 INSTALLER APP", btnActualizar: "🔄 METTRE À JOUR" },
            de: { placeholder: "Schreiben Sie Ihr Skript oder Ihre Notiz hier...", saveAs: "Speichern unter:", btnGuardar: "HTML SPEICHERN", stats: "Zeichen: {c} | Wörter: {w} | Zeilen: {l}", toastCargada: "Notiz geladen", toastVacio: "Leerer Editor", toastDescarga: "Heruntergeladen .{ext}", toastNoSoportado: "Nicht unterstützt", toastLimpio: "Neue Leinwand", toastEliminado: "Notiz gelöscht", confirmBorrar: "Notiz löschen?", btnInstalar: "📥 APP INSTALLIEREN", btnActualizar: "🔄 APP AKTUALISIEREN" },
            it: { placeholder: "Scrivi qui la tua sceneggiatura o nota...", saveAs: "Salva come:", btnGuardar: "SALVA HTML", stats: "Caratteri: {c} | Parole: {w} | Linee: {l}", toastCargada: "Nota caricata", toastVacio: "Editore vuoto", toastDescarga: "Scaricato .{ext}", toastNoSoportado: "Non supportato", toastLimpio: "Nuova tela", toastEliminado: "Nota eliminata", confirmBorrar: "Elimina nota?", btnInstalar: "📥 INSTALLA APP", btnActualizar: "🔄 AGGIORNA APP" },
            pt: { placeholder: "Escreva seu roteiro ou nota aqui...", saveAs: "Salvar como:", btnGuardar: "SALVAR HTML", stats: "Caracteres: {c} | Palavras: {w} | Linhas: {l}", toastCargada: "Nota cargada", toastVacio: "Editor vazio", toastDescarga: "Baixado .{ext}", toastNoSoportado: "Não suportado", toastLimpio: "Nova tela", toastEliminado: "Nota excluída", confirmBorrar: "Excluir nota?", btnInstalar: "📥 INSTALAR APP", btnActualizar: "🔄 ATUALIZAR APP" },
            ru: { placeholder: "Напишите ваш сценарий или заметку здесь...", saveAs: "Сохранить как:", btnGuardar: "СОХРАНИТЬ HTML", stats: "Символы: {c} | Слова: {w} | Строки: {l}", toastCargada: "Заметка загружена", toastVacio: "Редактор пуст", toastDescarga: "Скачано .{ext}", toastNoSoportado: "Не поддерживается", toastLimpio: "Новый холст", toastEliminado: "Заметка удалена", confirmBorrar: "Удалить заметку?", btnInstalar: "📥 УСТАНОВИТЬ ПРИЛОЖЕНИЕ", btnActualizar: "🔄 ОБНОВИТЬ" },
            zh: { placeholder: "在此处编写您的剧本或笔记...", saveAs: "另存为:", btnGuardar: "保存 HTML", stats: "字符数: {c} | 单词数: {w} | 行数: {l}", toastCargada: "笔记已加载", toastVacio: "编辑器为空", toastDescarga: "已下载 .{ext}", toastNoSoportado: "不支持", toastLimpio: "新画布", toastEliminado: "笔记已删除", confirmBorrar: "删除笔记吗？", btnInstalar: "📥 安装应用", btnActualizar: "🔄 更新应用" },
            ja: { placeholder: "ここにスクリプトやメモを書いてください...", saveAs: "名前をつけて保存:", btnGuardar: "HTMLを保存", stats: "文字数: {c} | 単語数: {w} | 行数: {l}", toastCargada: "メモが読み込まれました", toastVacio: "エディタが空です", toastDescarga: ".{ext} がダウンロードされました", toastNoSoportado: "サポートされていません", toastLimpio: "新しいキャンバス", toastEliminado: "メモが削除されました", confirmBorrar: "メモを削除しますか？", btnInstalar: "📥 アプリをインストール", btnActualizar: "🔄 アプリを更新" },
            "zh-HK": { placeholder: "喺呢度寫你嘅劇本或手記...", saveAs: "另存為:", btnGuardar: "儲存 HTML", stats: "字數: {c} | 詞數: {w} | 行數: {l}", toastCargada: "手記已載入", toastVacio: "編輯器係空嘅", toastDescarga: "已下載 .{ext}", toastNoSoportado: "唔支援", toastLimpio: "新畫布", toastEliminado: "手記已刪除", confirmBorrar: "確定刪除手記？", btnInstalar: "📥 安裝應用程式", btnActualizar: "🔄 更新應用程式" },
            ar: { placeholder: "اكتب السيناريو أو الملاحظة هنا...", saveAs: "حفظ باسم:", btnGuardar: "حفظ HTML", stats: "الأحرف: {c} | الكلمات: {w} | الأسطر: {l}", toastCargada: "تم تحميل الملاحظة", toastVacio: "المحرر فارغ", toastDescarga: "تم تحميل .{ext}", toastNoSoportado: "غير مدعوم", toastLimpio: "لوحة جديدة", toastEliminado: "تم حذف الملاحظة", confirmBorrar: "هل تريد حذف الملاحظة؟", btnInstalar: "📥 تثبيت التطبيق", btnActualizar: "🔄 تحديث التطبيق" },
            hi: { placeholder: "यहाँ अपना स्क्रिप्ट या नोट लिखें...", saveAs: "इस रूप में सहेजें:", btnGuardar: "HTML सहेजें", stats: "वर्ण: {c} | शब्द: {w} | पंक्तियाँ: {l}", toastCargada: "नोट लोड किया गया", toastVacio: "संपादक खाली है", toastDescarga: ".{ext} डाउनलोड किया गया", toastNoSoportado: "समर्थित नहीं है", toastLimpio: "नया कैनवास", toastEliminado: "नोट हटा दिया गया", confirmBorrar: "नोट हटाएं?", btnInstalar: "📥 ऐप इंस्टॉल करें", btnActualizar: "🔄 ऐप अपडेट करें" }
        };

        let idiomaActual = "es";

        function cambiarIdiomaInterfaz(lang) {
            if (!TRADUCCIONES[lang]) return;
            idiomaActual = lang;
            document.getElementById('editor').placeholder = TRADUCCIONES[lang].placeholder;
            document.getElementById('lbl-save-as').textContent = TRADUCCIONES[lang].saveAs;
            document.getElementById('btn-main-guardar').textContent = TRADUCCIONES[lang].btnGuardar;
            document.getElementById('btn-pwa-instalar').textContent = TRADUCCIONES[lang].btnInstalar;
            document.getElementById('btn-pwa-actualizar').textContent = TRADUCCIONES[lang].btnActualizar;
            actualizarContadores();
        }

        document.getElementById('app-lang').addEventListener('change', (e) => {
            cambiarIdiomaInterfaz(e.target.value);
        });

        // --- SISTEMA ARRASTRABLE ORDENABLE TIPO HARDWARE (FL STUDIO) ---
        const container = document.getElementById('toolbar-container');
        let dragSrcEl = null;

        function handleDragStart(e) {
            dragSrcEl = this;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
            this.style.opacity = '0.4';
        }

        function handleDragOver(e) {
            if (e.preventDefault) { e.preventDefault(); }
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDrop(e) {
            if (e.stopPropagation) { e.stopPropagation(); }
            if (dragSrcEl !== this) {
                // Intercambio completo de identificadores y elementos internos nativos
                let targetId = this.id;
                let targetHtml = this.innerHTML;
                
                this.innerHTML = dragSrcEl.innerHTML;
                this.id = dragSrcEl.id;
                
                dragSrcEl.innerHTML = targetHtml;
                dragSrcEl.id = targetId;
                
                revincularEventosInternosRacks();
            }
            return false;
        }

        function handleDragEnd(e) {
            this.style.opacity = '1.0';
        }

        // Soporte táctil móvil avanzado (Simulación de ordenación magnética)
        function configurarSoporteTactilRacks() {
            let racks = document.querySelectorAll('.toolbar-rack');
            racks.forEach(rack => {
                rack.addEventListener('touchstart', function(e) {
                    if (e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
                    this.style.background = "rgba(255, 255, 255, 0.15)";
                }, {passive: true});
                
                rack.addEventListener('touchend', function(e) {
                    this.style.background = "rgba(255,255,255,0.03)";
                }, {passive: true});
            });
        }

        function aplicarEventosDragAndDrop(elemento) {
            elemento.addEventListener('dragstart', handleDragStart, false);
            elemento.addEventListener('dragover', handleDragOver, false);
            elemento.addEventListener('drop', handleDrop, false);
            elemento.addEventListener('dragend', handleDragEnd, false);
        }

        function revincularEventosInternosRacks() {
            document.querySelectorAll('.toolbar-rack').forEach(aplicarEventosDragAndDrop);
            
            // Re-vincular los manejadores de los elementos hijos tras el intercambio de HTML
            document.getElementById('btn-main-guardar').onclick = guardarYDescargarHtmlDirecto;
            document.getElementById('btn-toggle-tema').onclick = alternarTemaVisual;
            
            document.getElementById('app-lang').onchange = (e) => cambiarIdiomaInterfaz(e.target.value);
            
            document.getElementById('btn-mic').onclick = alternarCapturaVoz;
            document.getElementById('btn-lectura').onclick = alternarLecturaTexto;
        }

        // --- NÚCLEO ALMACENAMIENTO (INDEXEDDB) ---
        const DB_NAME = "RetoricaDB";
        const DB_VERSION = 1;
        const STORE_NAME = "documentos";
        let db; let currentDocId = null;

        function initDB() {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onsuccess = (e) => { db = e.target.result; renderLib(); };
            request.onupgradeneeded = (e) => {
                const dbInstance = e.target.result;
                if (!dbInstance.objectStoreNames.contains(STORE_NAME)) {
                    dbInstance.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
                }
            };
        }

        function renderLib() {
            if (!db) return;
            const lista = document.getElementById('document-list'); lista.innerHTML = "";
            const store = db.transaction([STORE_NAME], "readonly").objectStore(STORE_NAME);
            
            store.openCursor(null, "prev").onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const docData = cursor.value;
                    const item = document.createElement('div');
                    item.className = `doc-item ${docData.id === currentDocId ? 'active' : ''}`;
                    const lineas = docData.texto.split('\n').filter(l => l.trim() !== "");
                    const tituloNota = lineas[0] || "Nota sin título";
                    const vistaPreviaNota = lineas.slice(1, 3).join(' ') || "...";

                    item.innerHTML = `
                        <div class="doc-title">${tituloNota}</div>
                        <div class="doc-preview">${vistaPreviaNota}</div>
                        <div class="doc-actions-pasarela">
                            <button class="btn-action-mini primary" onclick="event.stopPropagation(); cargarDocEnEditor(${docData.id});">Abrir</button>
                            <button class="btn-action-mini danger" onclick="event.stopPropagation(); borrarDoc(${docData.id});">Borrar</button>
                        </div>
                    `;
                    item.addEventListener('click', () => cargarDocEnEditor(docData.id));
                    lista.appendChild(item);
                    cursor.continue();
                }
            };
        }

        function cargarDocEnEditor(id) {
            db.transaction([STORE_NAME], "readonly").objectStore(STORE_NAME).get(id).onsuccess = (e) => {
                const doc = e.target.result;
                if (doc) {
                    currentDocId = doc.id; document.getElementById('editor').value = doc.texto;
                    actualizarContadores(); renderLib(); showToast(TRADUCCIONES[idiomaActual].toastCargada);
                }
            };
        }

        function obtenerNombreArchivoClean() {
            const texto = document.getElementById('editor').value.trim();
            if (!texto) return "nota_retorica";
            return texto.split('\n')[0].replace(/[\\/:*?"<>|]/g, "").substring(0, 20) || "nota_retorica";
        }

        function ejecutarDescargaBlob(contenido, tipoMime, extension) {
            const blob = new Blob([contenido], { type: tipoMime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${obtenerNombreArchivoClean()}.${extension}`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            showToast(TRADUCCIONES[idiomaActual].toastDescarga.replace("{ext}", extension.toUpperCase()));
        }

        function guardarYDescargarHtmlDirecto() {
            const texto = document.getElementById('editor').value;
            if (!texto.trim()) return showToast(TRADUCCIONES[idiomaActual].toastVacio);

            const store = db.transaction([STORE_NAME], "readwrite").objectStore(STORE_NAME);
            if (currentDocId === null) {
                store.add({ texto: texto }).onsuccess = (e) => { currentDocId = e.target.result; finalizarGuardadoHtml(texto); };
            } else {
                store.get(currentDocId).onsuccess = (e) => {
                    const data = e.target.result; data.texto = texto;
                    store.put(data).onsuccess = () => finalizarGuardadoHtml(texto);
                };
            }
        }

        function finalizarGuardadoHtml(contenido) {
            const estructura = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${obtenerNombreArchivoClean()}</title><style>body{font-family:sans-serif;padding:30px;line-height:1.6;color:#111827;}</style></head><body><p>${contenido.replace(/\n/g, '<br>')}</p></body></html>`;
            ejecutarDescargaBlob(estructura, 'text/html;charset=utf-8', 'html');
            renderLib();
        }

        // --- EXPORTACIONES ADICIONALES ---
        document.getElementById('export-pdf').onclick = () => {
            const texto = document.getElementById('editor').value;
            if(!texto.trim()) return showToast(TRADUCCIONES[idiomaActual].toastVacio);
            const el = document.createElement('div'); el.style.padding = '20px'; el.style.color = '#000'; el.innerHTML = texto.replace(/\n/g, '<br>');
            html2pdf().set({ margin: 15, filename: `${obtenerNombreArchivoClean()}.pdf` }).from(el).save();
        };

        document.getElementById('export-pdf-edit').onclick = () => {
            const txt = document.getElementById('editor').value;
            const struct = `<html><body style="padding:20px;"><textarea style="width:100%;height:90vh;font-size:16px;">${txt}</textarea></body></html>`;
            ejecutarDescargaBlob(struct, 'text/html;charset=utf-8', 'pdf.html');
        };

        document.getElementById('export-doc').onclick = () => {
            const txt = document.getElementById('editor').value;
            const struct = `<html xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset="utf-8"></head><body>${txt.replace(/\n/g, '<p></p>')}</body></html>`;
            ejecutarDescargaBlob(struct, 'application/msword;charset=utf-8', 'doc');
        };

        // --- BARRA LATERAL GESTOS ---
        function configurarGestosMenu() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('btn-toggle-pestaña');
            btn.onclick = () => { sidebar.classList.toggle('hidden'); btn.textContent = sidebar.classList.contains('hidden') ? "▶" : "◀"; };
            let startX = 0;
            document.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
            document.addEventListener('touchend', (e) => {
                let diffX = startX - e.changedTouches[0].clientX;
                if (diffX > 60 && !sidebar.classList.contains('hidden')) { sidebar.classList.add('hidden'); btn.textContent = "▶"; }
                else if (diffX < -60 && sidebar.classList.contains('hidden') && startX < 40) { sidebar.classList.remove('hidden'); btn.textContent = "◀"; }
            }, { passive: true });
        }

        // --- DICTADO POR VOZ INTERNACIONAL ---
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        let reco; let timerSilencio; let activo = false;

        if (Speech) {
            reco = new Speech(); reco.continuous = true;
            reco.onstart = () => { activo = true; document.getElementById('btn-mic').textContent = "🛑"; resetTimer(); };
            reco.onresult = (e) => {
                const trans = e.results[e.resultIndex][0].transcript;
                const area = document.getElementById('editor'); area.value += (area.value ? ' ' : '') + trans;
                actualizarContadores(); resetTimer();
            };
            reco.onend = () => { activo = false; document.getElementById('btn-mic').textContent = "🎙️"; clearTimeout(timerSilencio); };
        }

        function resetTimer() { clearTimeout(timerSilencio); timerSilencio = setTimeout(() => { if (activo) reco.stop(); }, 6000); }
        function alternarCapturaVoz() {
            if (!reco) return showToast(TRADUCCIONES[idiomaActual].toastNoSoportado);
            if (activo) { reco.stop(); } else { reco.lang = document.getElementById('voice-lang').value; reco.start(); }
        }

        // --- LECTURA DE TEXTO CON DETENCIÓN COMPLETA ALTERNADA ---
        let leyendoActual = false;
        function alternarLecturaTexto() {
            if (!('speechSynthesis' in window)) return showToast(TRADUCCIONES[idiomaActual].toastNoSoportado);
            if (leyendoActual) {
                window.speechSynthesis.cancel(); leyendoActual = false;
                document.getElementById('btn-lectura').textContent = "🔊";
            } else {
                const txt = document.getElementById('editor').value;
                if (!txt.trim()) return showToast(TRADUCCIONES[idiomaActual].toastVacio);
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = document.getElementById('voice-lang').value.split('-')[0];
                u.onend = () => { leyendoActual = false; document.getElementById('btn-lectura').textContent = "🔊"; };
                leyendoActual = true; document.getElementById('btn-lectura').textContent = "⏹️";
                window.speechSynthesis.speak(u);
            }
        }

        function alternarTemaVisual() {
            const esLuz = document.body.classList.toggle('light-theme');
            document.getElementById('btn-toggle-tema').textContent = esLuz ? "☀️" : "🌙";
        }

        function actualizarContadores() {
            const txt = document.getElementById('editor').value;
            const chars = txt.length;
            const words = txt.trim() === "" ? 0 : txt.trim().split(/\s+/).length;
            const lines = txt === "" ? 0 : txt.split('\n').length;
            document.getElementById('stats-bar').textContent = TRADUCCIONES[idiomaActual].stats.replace("{c}", chars).replace("{w}", words).replace("{l}", lines);
        }
        document.getElementById('editor').addEventListener('input', actualizarContadores);

        function borrarDoc(id) {
            if (!confirm(TRADUCCIONES[idiomaActual].confirmBorrar)) return;
            db.transaction([STORE_NAME], "readwrite").objectStore(STORE_NAME).delete(id).onsuccess = () => {
                if (currentDocId === id) { currentDocId = null; document.getElementById('editor').value = ""; actualizarContadores(); }
                renderLib(); showToast(TRADUCCIONES[idiomaActual].toastEliminado);
            };
        }

        document.getElementById('btn-nuevo').onclick = () => {
            currentDocId = null; document.getElementById('editor').value = ""; actualizarContadores(); renderLib(); showToast(TRADUCCIONES[idiomaActual].toastLimpio);
        };

        function showToast(msg) {
            const t = document.getElementById('toast-notif'); t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // --- CONTROL NATIVO PWA SIDEBAR ---
        let disparadorInstalaPWA;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); disparadorInstalaPWA = e;
            document.getElementById('btn-pwa-instalar').style.display = 'block';
        });

        document.getElementById('btn-pwa-instalar').onclick = () => {
            if (disparadorInstalaPWA) {
                disparadorInstalaPWA.prompt();
                disparadorInstalaPWA.userChoice.then((choice) => { if (choice.outcome === 'accepted') document.getElementById('btn-pwa-instalar').style.display = 'none'; });
            }
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js?v=6').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const nuevoWorker = reg.installing;
                        nuevoWorker.addEventListener('statechange', () => {
                            if (nuevoWorker.state === 'installed' && navigator.serviceWorker.controller) document.getElementById('btn-pwa-actualizar').style.display = 'block';
                        });
                    });
                });
            });
        }
        document.getElementById('btn-pwa-actualizar').onclick = () => window.location.reload();

        window.addEventListener('DOMContentLoaded', () => { 
            initDB(); 
            configurarGestosMenu(); 
            revincularEventosInternosRacks();
            configurarSoporteTactilRacks();
        });
    </script>
</body>
</html>
