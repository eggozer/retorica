<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Retórica - Procesador de Notas</title>
    <link rel="manifest" href="./manifest.json?v=20">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0f1d; --bg-sidebar-glass: rgba(17, 24, 39, 0.75); --bg-card: #1f2937;
            --bg-card-active: #374151; --accent: #ffca28; --text-main: #f3f4f6;
            --text-muted: #9ca3af; --border: rgba(45, 55, 72, 0.5); --danger: #ef4444;
        }
        body.light-theme {
            --bg-main: #f9fafb; --bg-sidebar-glass: rgba(243, 244, 246, 0.75); --bg-card: #ffffff;
            --bg-card-active: #e5e7eb; --text-main: #111827; --text-muted: #6b7280;
            --border: rgba(209, 213, 219, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        
        button, select, input { border-radius: 20px !important; height: 38px; padding: 0 12px; background-color: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        /* MEGA TRUCO: EFECTO DE CRISTAL TRANSPARENTE CON DESENFOQUE */
        .sidebar { width: 100vw; background-color: var(--bg-sidebar-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; height: auto; max-height: 45vh; position: absolute; left: 0; top: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s; z-index: 250; visibility: visible; padding: 0 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .sidebar.hidden { transform: translateY(-100%); visibility: hidden; }
        
        /* PESTAÑA FLOTANTE ADAPTADA PARA DESPLIEGUE VERTICAL/HORIZONTAL */
        .toggle-sidebar-pestaña { position: fixed; right: 12px; top: 10px; width: 42px; height: 42px; background-color: var(--bg-card); color: var(--accent); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; z-index: 300; transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50% !important; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        
        /* RACK ÚNICO HORIZONTAL GLOBAL DESLIZABLE */
        .menu-tira-horizontal { width: 100%; display: flex; align-items: center; gap: 10px; overflow-x: auto; white-space: nowrap; height: 65px; padding: 0 50px 0 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .menu-tira-horizontal::-webkit-scrollbar { display: none; }
        
        .brand-logo-inline { display: flex; align-items: center; gap: 5px; font-weight: 700; font-size: 1.1rem; letter-spacing: 0.5px; color: var(--text-main); }
        .brand-logo-inline span:first-child { font-size: 1.2rem; }
        .separador-vertical { width: 1px; height: 24px; background-color: var(--border); flex-shrink: 0; }

        /* SECCIÓN INFERIOR DEL CRISTAL (PLANTILLAS Y ADS) */
        .sidebar-body-content { flex: 1; overflow-y: auto; padding: 8px 0; display: flex; flex-direction: column; gap: 8px; }
        .slider-plantillas { display: flex; align-items: center; gap: 8px; overflow-x: auto; padding: 4px 0; scrollbar-width: none; }
        .slider-plantillas::-webkit-scrollbar { display: none; }
        .document-list-item { background: var(--bg-card); border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; font-size: 0.8rem; text-align: center; min-width: 105px; cursor: pointer; }
        
        .adsense-strip-container { height: 45px; background: rgba(0,0,0,0.2); border: 1px dashed var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--text-muted); font-weight: bold; width: 100%; }

        /* AREA DE ESCRITURA TOTALMENTE VISIBLE ABAJO */
        .main-container { flex: 1; display: flex; flex-direction: column; height: 100vh; width: 100vw; background-color: var(--bg-main); padding-top: 60px; }
        .editor-wrapper { flex: 1; display: flex; flex-direction: column; padding: 16px; overflow-y: auto; align-items: center; width: 100%; }
        .rich-editor { width: 100%; min-height: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; line-height: 1.6; outline: none; padding: 4px; overflow-wrap: break-word; }
        .rich-editor.modo-carta { max-width: 800px; background-color: var(--bg-card); padding: 40px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .rich-editor.modo-oficio { max-width: 850px; background-color: var(--bg-card); padding: 50px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .stats-bar { width: 100%; height: 32px; border-top: 1px solid var(--border); padding: 6px 16px 0 16px; font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; background-color: rgba(17, 24, 39, 0.9); }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); background-color: var(--accent); color: #0a0f1d; padding: 10px 20px; font-size: 0.85rem; font-weight: bold; transition: transform 0.3s; z-index: 999; border-radius: 20px; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña">▼</div>

    <div class="sidebar hidden" id="sidebar">
        <div class="menu-tira-horizontal">
            <div class="brand-logo-inline"><span>☀️</span><span>RETÓRICA</span></div>
            <button id="btn-nuevo" style="border-radius:50% !important; width:38px; height:38px; padding:0;">➕</button>
            <div class="separador-vertical"></div>
            
            <button id="btn-main-guardar" style="background: var(--accent); color: #0a0f1d; font-weight: bold;">GUARDAR HTML</button>
            <button id="export-pdf">1.- PDF</button>
            <button id="export-pdf-edit">2.- PDF Editable</button>
            <button id="export-doc">3.- DOC</button>
            <div class="separador-vertical"></div>

            <button id="btn-mic" title="Dictado de Voz">🎙️</button>
            <button id="btn-grab-audio-wa" title="Grabar audio">🎙️💬</button>
            <button id="btn-render-fl" title="Renderizar Audio">🎛️ Render</button>
            <button id="btn-lectura">🔊</button>
            <button id="btn-insert-table">📊</button>
            <button id="btn-open-local">📁</button>
            <button id="btn-toggle-tema">🌙</button>
            
            <select id="app-lang"><option value="es-MX">Español (MX)</option><option value="en-US">English (US)</option></select>
            <select id="voice-lang"><option value="es-MX">Español (MX)</option></select>
            <select id="font-family-select" style="width:110px;">
                <option value="sans-serif">Sans-Serif</option>
                <option value="serif">Serif</option>
                <option value="monospace">Monospace</option>
                <option value="cursive">Cursive</option>
            </select>
            <select id="combo-modalidad">
                <option value="nota">📄 Nota</option>
                <option value="carta">📄 Carta</option>
                <option value="oficio">📄 Oficio</option>
            </select>
        </div>

        <div class="sidebar-body-content">
            <div class="slider-plantillas" id="document-list"></div>
            <div class="adsense-strip-container">ESPACIO DE PUBLICIDAD ACTIVO (MONETIZACIÓN)</div>
        </div>
    </div>

    <div class="main-container">
        <div class="editor-wrapper" id="editor-container">
            <div id="editor" class="rich-editor" contenteditable="true" placeholder="Escribe aquí..."></div>
        </div>
        <div class="stats-bar">
            <div id="stats-text">Caracteres: 0</div>
            <div id="lbl-file-dates">Sin guardar</div>
        </div>
    </div>

    <input type="file" id="file-input-hidden" accept=".html,.txt,.doc" style="display:none;">
    <div class="toast" id="toast-notif">Operación exitosa</div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
