<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Retórica V8.2 - Master Studio</title>
    <style>
        :root { 
            --p: #0F172A; --bg: #F8FAFC; --accent: #2563EB; 
            --script: #7C3AED; --podcast: #EC4899; --txt: #1E293B; --muted: #64748B; --ok: #10B981; --google: #DB4437;
        }
        
        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; border-radius: 12px; }
        body { background: var(--bg); color: var(--txt); overflow: hidden; height: 100vh; }

        /* FIX VISUAL: ACCESO ULTRA-CENTRADO */
        #v-auth { 
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9000; 
        }
        .auth-bg { 
            position: absolute; inset: 0; background: linear-gradient(45deg, #0F172A, #1E293B, #0F172A);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; z-index: -1;
        }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .auth-card { 
            background: white; padding: 40px 30px; width: 92%; max-width: 380px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border-top: 6px solid var(--accent);
        }
        .auth-input { width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid #E2E8F0; font-size: 16px; outline: none; }
        .btn-main { width: 100%; padding: 18px; border: none; background: var(--accent); color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* HEADER & SIDEBAR */
        header { background: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 70px; border-bottom: 1px solid #E2E8F0; display:none; }
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: white; z-index: 9500; transition: 0.4s; padding: 30px; border-right: 5px solid var(--accent); }
        .sidebar.open { left: 0; }
        .sidebar button { width: 100%; padding: 18px; text-align: left; border: none; background: none; border-bottom: 1px solid #F1F5F9; font-weight: 700; cursor: pointer; }

        /* VISTAS */
        .vista { display: none; height: calc(100vh - 70px); padding: 20px; overflow-y: auto; }
        .activa { display: block; }

        /* EDITOR MAESTRO */
        #editor-frame { background: white; border: 1px solid #E2E8F0; padding: 30px; min-height: 70vh; position: relative; }
        [contenteditable]:empty:before { content: attr(data-placeholder); color: #CBD5E1; cursor: text; }
        #e-title { font-size: 2rem; font-weight: 900; outline: none; margin-bottom: 10px; display: block; border-bottom: 2px solid #F1F5F9; }
        #e-body { font-size: 1.15rem; line-height: 1.8; outline: none; min-height: 400px; }

        /* TOOLBOX */
        .tool-panel { background: #F8FAFC; border: 2px solid #E2E8F0; padding: 15px; margin-bottom: 15px; display: none; gap: 8px; flex-wrap: wrap; }
        .tool-btn { padding: 12px; border: 1px solid #CBD5E1; background: white; font-size: 11px; cursor: pointer; font-weight: bold; flex: 1 1 45%; }
        
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px; border-top: 4px solid var(--accent); display: flex; gap: 8px; z-index: 1000; }
        .btn-action { flex: 1; padding: 14px; border: none; color: white; font-weight: 800; cursor: pointer; font-size: 10px; text-transform: uppercase; }

        /* MODALES */
        #vox-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-box { background: white; padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="vox-modal" onclick="closeVox()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 id="m-title" style="color:var(--accent); margin-bottom:10px;"></h3>
            <div id="m-body" style="line-height:1.6; color:var(--muted);"></div>
            <button onclick="closeVox()" class="btn-main" style="margin-top:25px;">CONTINUAR</button>
        </div>
    </div>

    <div id="v-auth">
        <div class="auth-bg"></div>
        <div class="auth-card">
            <h1 style="color:var(--p); margin:0; letter-spacing:-3px; font-size:2.8rem;">RETÓRICA</h1>
            <p style="font-size:12px; color:var(--muted); margin-bottom:30px;">Studio V8.2 • Cloud Sync</p>
            <input type="text" id="u-id" class="auth-input" placeholder="Correo o Teléfono">
            <input type="password" id="u-pass" class="auth-input" placeholder="Contraseña">
            <button class="btn-main" onclick="handleAuth()">ENTRAR / REGISTRAR</button>
            <button class="btn-main" style="background:#FFF; color:#444; border:2px solid #EEE; margin-top:12px;" onclick="authGoogle()">ACCEDER CON GOOGLE</button>
        </div>
    </div>

    <header id="app-header">
        <button onclick="toggleMenu(true)" style="background:none; border:none; font-size:28px;">☰</button>
        <div style="font-weight:900; letter-spacing:-1px; font-size:1.4rem;">RETÓRICA</div>
        <div id="u-icon" onclick="toggleMenu(true)" style="width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:white; cursor:pointer;"></div>
    </header>

    <nav id="sidebar" class="sidebar">
        <h3 id="side-user" style="color:var(--accent); margin-bottom:5px;">Usuario</h3>
        <p id="side-device" style="font-size:10px; color:var(--muted); margin-bottom:20px;"></p>
        <button onclick="irA('v-hub')">📂 Escritorio</button>
        <button onclick="nuevoProyecto()">📝 Crear Nuevo</button>
        <button onclick="switchUser()" style="color:var(--accent);">👤 Cambiar de Usuario</button>
        <button onclick="cerrarSesion()" style="color:red; margin-top:80px;">🚪 Cerrar Sesión</button>
    </nav>

    <div id="v-hub" class="vista">
        <div id="hub-grid" style="display:grid; gap:12px;"></div>
        <button onclick="nuevoProyecto()" style="position:fixed; bottom:110px; right:25px; width:65px; height:65px; border-radius:50%; background:var(--accent); color:white; border:none; font-size:35px; box-shadow:0 10px 25px rgba(37,99,235,0.4);">+</button>
    </div>

    <div id="v-edit" class="vista">
        <div id="script-tools" class="tool-panel">
            <button class="tool-btn" onclick="addText('<b>INT. HABITACIÓN - DÍA</b><br>')">🏠 Habitación</button>
            <button class="tool-btn" onclick="addText('<b>EXT. CALLE - NOCHE</b><br>')">🌧️ Calle</button>
            <button class="tool-btn" onclick="addText('<b>EXT. VÍAS TREN - DÍA</b><br>')">🚂 Vías Tren</button>
            <button class="tool-btn" onclick="openChars()">👥 PERSONAJES</button>
        </div>

        <div id="audio-tools" class="tool-panel">
            <select id="voice-engine" class="tool-btn" style="flex:100%;"></select>
            <button class="tool-btn" onclick="addText('[MÚSICA] ')">🎵 Música</button>
            <button class="tool-btn" onclick="addText('[FX] ')">🔊 Efecto</button>
        </div>

        <div id="editor-frame">
            <div id="e-title" contenteditable="true" data-placeholder="Título del Proyecto..."></div>
            <div id="e-body" contenteditable="true" data-placeholder="Empieza a escribir tu historia..."></div>
        </div>

        <div class="footer">
            <button class="btn-action" style="background:var(--script)" onclick="openPanel('script-tools')">🎬 ESCENA</button>
            <button class="btn-action" style="background:var(--podcast)" onclick="openPanel('audio-tools')">🎙️ AUDIO</button>
            <button class="btn-action" style="background:var(--ok); flex:1.5;" onclick="saveDoc()">💾 GUARDAR</button>
        </div>
    </div>

    <script>
        const deviceID = /Pixel/i.test(navigator.userAgent) ? "Pixel 2" : /Redmi/i.test(navigator.userAgent) ? "Redmi" : "Web Studio";
        let db = JSON.parse(localStorage.getItem('ret_db')) || [];
        let accounts = JSON.parse(localStorage.getItem('ret_acc')) || {};
        let session = JSON.parse(localStorage.getItem('ret_user')) || null;
        let chars = JSON.parse(localStorage.getItem('ret_chars')) || [];

        // 1. SESIÓN Y SEGURIDAD
        function handleAuth() {
            const id = document.getElementById('u-id').value.trim();
            const pass = document.getElementById('u-pass').value.trim();
            if(!id || !pass) return voxSay("Introduce tus credenciales.");

            if(accounts[id] && accounts[id] !== pass) return voxSay("Contraseña incorrecta para este correo.");
            if(!accounts[id]) accounts[id] = pass;

            localStorage.setItem('ret_acc', JSON.stringify(accounts));
            session = { id, name: id.split('@')[0], method: 'email' };
            localStorage.setItem('ret_user', JSON.stringify(session));
            startUI();
        }

        function authGoogle() {
            session = { id: 'google_user', name: 'Google Artist', method: 'google' };
            localStorage.setItem('ret_user', JSON.stringify(session));
            startUI();
        }

        function startUI() {
            document.getElementById('v-auth').style.display = 'none';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('side-user').innerText = session.name;
            document.getElementById('side-device').innerText = "Dispositivo: " + deviceID;
            
            const icon = document.getElementById('u-icon');
            icon.style.background = session.method === 'google' ? 'var(--google)' : 'var(--accent)';
            icon.innerText = session.name[0].toUpperCase();
            
            irA('v-hub');
            loadVoices();
        }

        function switchUser() {
            if(confirm("¿Cambiar de cuenta? Los datos locales se mantendrán a salvo.")) {
                localStorage.removeItem('ret_user');
                location.reload();
            }
        }

        // 2. PRODUCCIÓN Y GUARDADO
        function saveDoc() {
            const id = document.getElementById('v-edit').dataset.id || Date.now();
            const t = document.getElementById('e-title').innerText;
            const c = document.getElementById('e-body').innerHTML;
            
            db = db.filter(x => x.id != id);
            db.push({
                id, t, c,
                user: session.id,
                device: deviceID,
                stamp: new Date().toLocaleString()
            });
            
            localStorage.setItem('ret_db', JSON.stringify(db));
            voxSay(`Proyecto guardado en ${deviceID}`, "Sincronizado");
            irA('v-hub');
        }

        function renderHub() {
            const grid = document.getElementById('hub-grid');
            const userDocs = db.filter(x => x.user === session.id).reverse();
            grid.innerHTML = userDocs.map(x => `
                <div onclick="loadProject(${x.id})" style="background:white; padding:20px; border:1px solid #E2E8F0; margin-bottom:10px; cursor:pointer;">
                    <b style="font-size:16px;">${x.t || 'Sin Título'}</b><br>
                    <small style="color:var(--muted)">📅 ${x.stamp} | 📱 ${x.device}</small>
                </div>
            `).join('');
        }

        // 3. NAVEGACIÓN
        function irA(v) {
            document.querySelectorAll('.vista').forEach(x => x.classList.remove('activa'));
            document.getElementById(v).classList.add('activa');
            if(v === 'v-hub') renderHub();
            toggleMenu(false);
        }

        function toggleMenu(s) { document.getElementById('sidebar').classList.toggle('open', s); }
        function openPanel(id) {
            const p = document.getElementById(id);
            const wasVis = p.style.display === 'flex';
            document.querySelectorAll('.tool-panel').forEach(x => x.style.display = 'none');
            p.style.display = wasVis ? 'none' : 'flex';
        }

        function loadProject(id) {
            const p = db.find(x => x.id == id);
            document.getElementById('e-title').innerText = p.t;
            document.getElementById('e-body').innerHTML = p.c;
            document.getElementById('v-edit').dataset.id = id;
            irA('v-edit');
        }

        function nuevoProyecto() {
            document.getElementById('e-title').innerText = "";
            document.getElementById('e-body').innerHTML = "";
            delete document.getElementById('v-edit').dataset.id;
            irA('v-edit');
        }

        function openChars() {
            let l = chars.map(c => `• ${c.n}`).join('<br>');
            voxSay(`<input id="cn" placeholder="Nombre" class="auth-input"><button class="btn-main" onclick="saveChar()">AÑADIR</button><div style="margin-top:15px; max-height:150px; overflow-y:auto;">${l || 'Sin personajes.'}</div>`, "Personajes");
        }

        function saveChar() {
            const n = document.getElementById('cn').value;
            if(n) { chars.push({n}); localStorage.setItem('ret_chars', JSON.stringify(chars)); closeVox(); voxSay("Vínculo creado."); }
        }

        function addText(h) { document.getElementById('e-body').innerHTML += h; }
        function loadVoices() {
            const e = document.getElementById('voice-engine');
            setTimeout(() => {
                const v = window.speechSynthesis.getVoices();
                e.innerHTML = v.map(x => `<option>${x.name}</option>`).join('');
            }, 800);
        }

        function voxSay(msg, title = "Aviso") {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-body').innerHTML = msg;
            document.getElementById('vox-modal').style.display = 'flex';
        }

        function closeVox() { document.getElementById('vox-modal').style.display = 'none'; }
        function cerrarSesion() { localStorage.removeItem('ret_user'); location.reload(); }

        window.onload = () => {
            if(session) startUI();
            else document.getElementById('v-auth').style.display = 'flex';
        };
    </script>
</body>
</html>
