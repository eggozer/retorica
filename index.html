<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica V12.5</title>
    <style>
        :root { --p: #0a0f1a; --bg: #ffffff; --accent: #2563eb; --muted: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* 1. Menú con Overlay (Cierre automático) */
        #sidebar { 
            position: fixed; top: 0; left: -100%; width: 85%; max-width: 300px; height: 100%; 
            background: white; z-index: 10000; transition: 0.3s; padding: 25px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.2); 
        }
        #sidebar.open { left: 0; }
        #overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; 
        }

        /* 2. Editor que respeta el Teclado */
        header { height: 65px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #eee; background: #fff; }
        #editor { 
            flex: 1; padding: 25px; overflow-y: auto; font-size: 19px; outline: none;
            padding-bottom: 60vh; /* El texto siempre queda arriba del teclado */
        }

        /* 3. Barra de Estadísticas */
        #page-stats { padding: 8px 20px; font-size: 11px; color: var(--muted); border-top: 1px solid #eee; background: #fafafa; font-weight: bold; }

        /* 4. Biblioteca en Dos Columnas */
        .library-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .doc-card { 
            background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;
            height: 90px; overflow: hidden; font-size: 11px; color: var(--muted);
        }
        .btn-tool { width: 100%; padding: 14px; margin: 6px 0; border: none; border-radius: 12px; background: #f1f5f9; display: flex; align-items: center; font-weight: bold; cursor: pointer; }
        .btn-tool i { margin-right: 12px; font-style: normal; font-size: 18px; }

        /* Pantalla Login */
        #v-auth { position: fixed; inset: 0; background: var(--p); z-index: 11000; display: flex; align-items: center; justify-content: center; color: white; }
        .auth-box { background: white; padding: 40px; border-radius: 25px; color: var(--p); text-align: center; width: 90%; max-width: 380px; }
        .input-field { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-box">
        <h2 style="letter-spacing:2px">RETÓRICA</h2>
        <input type="email" id="u-email" class="input-field" placeholder="Cuenta de Sincronización">
        <button class="btn-main" onclick="saveUser()">INGRESAR</button>
    </div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <h2 style="margin-bottom:20px">Estudio</h2>
    <button class="btn-tool" onclick="dictar()"><i>🎤</i> Dictado</button>
    <button class="btn-tool" onclick="leer()"><i>🔊</i> Lectura</button>
    <button class="btn-tool" onclick="abrirGuardar()"><i>💾</i> Guardar</button>
    
    <p style="margin-top:20px; font-size:12px; font-weight:bold; color:var(--accent)">BIBLIOTECA (2 FILAS)</p>
    <div class="library-grid" id="library">
        <div class="doc-card"><b>Nota Reciente</b><br>Contenido auto-guardado en este dispositivo...</div>
        <div class="doc-card"><b>Plantilla ADN</b><br>Estructura vinculada de influencias...</div>
    </div>

    <div id="dev-tag" style="position:absolute; bottom:80px; font-size:10px; color:gray;"></div>
    <button onclick="logout()" style="position:absolute; bottom:30px; color:red; border:none; background:none; font-weight:bold; cursor:pointer">CERRAR SESIÓN</button>
</nav>

<div id="main-app" style="display:none; flex: 1; flex-direction: column;">
    <header>
        <div style="font-size:30px; cursor:pointer" onclick="toggleMenu()">☰</div>
        <div style="margin-left:20px; font-weight:900; letter-spacing:1px">RETÓRICA</div>
    </header>
    
    <div id="editor" contenteditable="true" oninput="updateStats()" placeholder="Escribe tu relámpago..."></div>
    
    <div id="page-stats">0 caracteres | 0 palabras</div>
</div>

<script>
    const getDev = () => {
        const ua = navigator.userAgent;
        if (/Android/i.test(ua)) return "Android Terminal";
        if (/iPhone|iPad/i.test(ua)) return "iOS Terminal";
        return "Web Terminal";
    };

    window.onload = () => {
        const user = localStorage.getItem('ret_user');
        if (user) {
            document.getElementById('v-auth').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('dev-tag').innerText = "Vínculo: " + getDev();
            const saved = localStorage.getItem('ret_content');
            if(saved) {
                document.getElementById('editor').innerHTML = saved;
                updateStats();
            }
        }
    };

    function toggleMenu() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        const isOpen = sb.classList.toggle('open');
        ov.style.display = isOpen ? 'block' : 'none';
    }

    function updateStats() {
        const editor = document.getElementById('editor');
        const text = editor.innerText;
        const chars = text.length;
        const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
        document.getElementById('page-stats').innerText = `${chars} caracteres | ${words} palabras`;
        localStorage.setItem('ret_content', editor.innerHTML);
    }

    function saveUser() {
        const mail = document.getElementById('u-email').value;
        if(mail.trim() !== "") {
            localStorage.setItem('ret_user', mail.trim());
            location.reload();
        } else { alert("Ingresa una cuenta"); }
    }

    function logout() { localStorage.removeItem('ret_user'); location.reload(); }

    function dictar() {
        toggleMenu();
        if (!('webkitSpeechRecognition' in window)) return alert("No soportado");
        const rec = new webkitSpeechRecognition();
        rec.lang = 'es-MX';
        rec.onresult = (e) => { 
            document.getElementById('editor').innerHTML += " " + e.results[0][0].transcript;
            updateStats();
        };
        rec.start();
    }

    function leer() {
        toggleMenu();
        const u = new SpeechSynthesisUtterance(document.getElementById('editor').innerText);
        u.lang = 'es-MX';
        window.speechSynthesis.speak(u);
    }

    function abrirGuardar() {
        toggleMenu();
        const blob = new Blob([document.getElementById('editor').innerText], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Retorica.txt";
        a.click();
    }
</script>
</body>
</html>
