<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica V18 - Unificada</title>
    <style>
        :root { --p: #0a0f1a; --bg: #ffffff; --accent: #2563eb; --muted: #64748b; --card: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Pantalla de Acceso */
        #v-auth { position: fixed; inset: 0; background: var(--p); z-index: 11000; display: flex; align-items: center; justify-content: center; color: white; }
        .auth-box { background: white; padding: 40px; border-radius: 30px; color: var(--p); text-align: center; width: 90%; max-width: 400px; }

        /* Barra Superior Dinámica */
        header { padding: 12px 15px; border-bottom: 1px solid #eee; background: #fff; flex-shrink: 0; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .action-btns { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .action-btns::-webkit-scrollbar { display: none; }
        
        .btn-round { padding: 8px 16px; border-radius: 25px; border: 1px solid #ddd; background: #f8fafc; font-size: 13px; font-weight: bold; white-space: nowrap; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-accent { background: var(--accent); color: white; border: none; }

        /* Área de Trabajo */
        #editor { flex: 1; padding: 25px; overflow-y: auto; font-size: 19px; outline: none; padding-bottom: 60vh; line-height: 1.7; word-wrap: break-word; }

        /* Menú Biblioteca y Voces */
        #sidebar { position: fixed; top: 0; left: -100%; width: 88%; max-width: 340px; height: 100%; background: white; z-index: 10000; transition: 0.3s; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.2); overflow-y: auto; }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; }

        .btn-plus { width: 50px; height: 50px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }

        .library-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .doc-card { background: var(--card); padding: 15px; border-radius: 15px; height: 110px; overflow: hidden; font-size: 11px; border: 1px solid #e2e8f0; cursor: pointer; position: relative; }
        .doc-card b { display: block; margin-bottom: 5px; color: var(--p); font-size: 13px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }

        /* Panel de Control de Voces */
        .voice-panel { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-top: 10px; }
        select { width: 100%; padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid #ddd; background: white; font-size: 13px; }

        #page-stats { padding: 12px 20px; font-size: 11px; color: var(--muted); border-top: 1px solid #eee; background: #fafafa; font-weight: bold; }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-box">
        <h1 style="letter-spacing:4px; margin-bottom:10px">RETÓRICA</h1>
        <p style="font-size:12px; margin-bottom:20px; color:gray">Estudio de Productividad Audio-Texto</p>
        <input type="email" id="u-email" style="width:100%; padding:16px; margin-bottom:15px; border-radius:15px; border:1px solid #ddd" placeholder="Cuenta de sincronización">
        <button onclick="saveUser()" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:bold">ENTRAR</button>
    </div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:flex-start">
        <h2 style="font-weight:900; margin-bottom:20px">BIBLIOTECA</h2>
        <button class="btn-plus" onclick="nuevoDoc()">+</button>
    </div>
    
    <div class="library-grid" id="library"></div>

    <div class="voice-panel">
        <p style="font-size:12px; font-weight:bold; color:var(--accent)">⚙️ CONFIGURACIÓN DE VOCES</p>
        <select id="voice-select"></select>
        <button onclick="addVoiceToBar()" style="width:100%; padding:12px; background:var(--p); color:white; border-radius:10px; border:none; font-size:12px; font-weight:bold; cursor:pointer">Vincular a Barra Superior</button>
        <div id="fav-list" style="margin-top:15px"></div>
    </div>

    <button onclick="logout()" style="margin-top:40px; color:red; border:none; background:none; font-weight:bold; cursor:pointer; font-size:13px">Desvincular Cuenta</button>
</nav>

<div id="main-app" style="display:none; flex:1; flex-direction:column;">
    <header>
        <div class="top-bar">
            <div style="font-size:28px; cursor:pointer" onclick="toggleMenu()">☰</div>
            <div style="font-weight:900; letter-spacing:1px; font-size:18px">RETÓRICA</div>
            <button class="btn-round btn-accent" onclick="guardarDoc()">💾 GUARDAR</button>
        </div>
        <div class="action-btns" id="top-bar-voices">
            <button class="btn-round" onclick="dictar()">🎤 Dictado</button>
        </div>
    </header>
    
    <div id="editor" contenteditable="true" oninput="updateStats()" placeholder="Escribe aquí..."></div>
    
    <div id="page-stats">0 caracteres | 0 palabras</div>
</div>

<script>
    let voices = [];
    let favorites = JSON.parse(localStorage.getItem('ret_favs_v18')) || [];
    let docs = JSON.parse(localStorage.getItem('ret_docs_v18')) || [];

    window.onload = () => {
        if (localStorage.getItem('ret_user')) {
            document.getElementById('v-auth').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            loadLibrary();
            syncVoices();
        }
    };

    function syncVoices() {
        const load = () => {
            voices = window.speechSynthesis.getVoices();
            const sel = document.getElementById('voice-select');
            // Filtrar para mostrar solo voces en español por defecto, pero permitir todas
            sel.innerHTML = voices.map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join('');
            renderFavs();
        };
        load();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = load;
    }

    function addVoiceToBar() {
        const name = document.getElementById('voice-select').value;
        if (!favorites.find(f => f.name === name)) {
            favorites.push({ name: name, active: true });
            saveAndRender();
        }
    }

    function toggleFav(i) { favorites[i].active = !favorites[i].active; saveAndRender(); }
    function removeFav(i) { favorites.splice(i, 1); saveAndRender(); }
    function saveAndRender() { localStorage.setItem('ret_favs_v18', JSON.stringify(favorites)); renderFavs(); }

    function renderFavs() {
        const bar = document.getElementById('top-bar-voices');
        const list = document.getElementById('fav-list');
        bar.innerHTML = `<button class="btn-round" onclick="dictar()">🎤 Dictado</button>`;
        list.innerHTML = '';

        favorites.forEach((v, i) => {
            if (v.active) {
                // Etiquetado inteligente: si contiene "Google" y es español, simplificar nombre
                let shortName = v.name.split(' ')[0];
                bar.innerHTML += `<button class="btn-round" onclick="leerConVoz('${v.name}')">👤 ${shortName}</button>`;
            }
            list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-size:12px">
                <span style="width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${v.name}</span>
                <div>
                    <button onclick="toggleFav(${i})" style="border:none; background:none; font-size:16px">${v.active?'👁️':'🚫'}</button>
                    <button onclick="removeFav(${i})" style="border:none; background:none; color:red; margin-left:15px; font-weight:bold">✕</button>
                </div>
            </div>`;
        });
    }

    function leerConVoz(voiceName) {
        speechSynthesis.cancel();
        const text = window.getSelection().toString() || document.getElementById('editor').innerText;
        if (!text) return;

        const ut = new SpeechSynthesisUtterance(text);
        const selectedVoice = voices.find(v => v.name === voiceName);
        if (selectedVoice) {
            ut.voice = selectedVoice;
            ut.lang = selectedVoice.lang;
        }
        speechSynthesis.speak(ut);
    }

    function dictar() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Dictado no soportado");
        const rec = new Speech();
        rec.lang = 'es-MX';
        rec.onresult = (e) => {
            document.getElementById('editor').innerText += " " + e.results[0][0].transcript;
            updateStats();
        };
        rec.start();
    }

    function guardarDoc() {
        const content = document.getElementById('editor').innerHTML;
        const plainText = document.getElementById('editor').innerText.trim();
        if (!plainText) return;

        const entry = {
            id: Date.now(),
            title: plainText.substring(0, 20),
            preview: plainText.substring(0, 50) + "...",
            body: content,
            date: new Date().toLocaleDateString()
        };

        docs.unshift(entry);
        if (docs.length > 12) docs.pop();
        localStorage.setItem('ret_docs_v18', JSON.stringify(docs));
        loadLibrary();
        alert("Proyecto Guardado");
    }

    function loadLibrary() {
        const container = document.getElementById('library');
        container.innerHTML = docs.map(d => `
            <div class="doc-card" onclick="cargarDoc(${d.id})">
                <b>${d.title}</b>
                ${d.preview}
                <div style="position:absolute; bottom:8px; right:10px; color:var(--muted); font-size:9px">${d.date}</div>
            </div>`).join('');
    }

    function cargarDoc(id) {
        const d = docs.find(doc => doc.id === id);
        if (d) { document.getElementById('editor').innerHTML = d.body; updateStats(); toggleMenu(); }
    }

    function nuevoDoc() {
        if (confirm("¿Crear nuevo documento?")) {
            document.getElementById('editor').innerHTML = "";
            updateStats();
            toggleMenu();
        }
    }

    function updateStats() {
        const t = document.getElementById('editor').innerText;
        document.getElementById('page-stats').innerText = `${t.length} caracteres | ${t.trim()===""?0:t.trim().split(/\s+/).length} palabras`;
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
    }

    function saveUser() {
        const m = document.getElementById('u-email').value;
        if (m) { localStorage.setItem('ret_user', m); location.reload(); }
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
