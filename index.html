<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica V7 - index.html</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --p: #0a0f1a; --accent: #2563eb; --bg: #ffffff; --card: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Login para Android 5 */
        #auth-screen { position: fixed; inset: 0; background: var(--p); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 90%; max-width: 400px; }
        .auth-card input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; outline: none; }

        /* Header Principal */
        header { background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0; z-index: 500; }
        .bar-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; }
        .logo { font-weight: 900; letter-spacing: 3px; font-size: 18px; color: var(--p); }
        .hamb { font-size: 28px; cursor: pointer; background: none; border: none; padding: 5px; }

        /* Barra de Herramientas */
        .toolbar { padding: 0 15px 10px 15px; border-bottom: 1px solid #f1f5f9; }
        .row-tools { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .row-tools::-webkit-scrollbar { display: none; }
        .btn-t { padding: 10px 18px; border-radius: 15px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .btn-save { background: var(--p); color: white; border: none; padding: 10px 20px; border-radius: 15px; font-weight: bold; }

        /* Editor */
        #editor { flex: 1; padding: 25px; overflow-y: auto; font-size: 19px; outline: none; line-height: 1.7; background: #fff; }
        #editor:empty:before { content: "Presiona micrófono o escribe..."; color: #cbd5e1; }

        /* Sidebar - Biblioteca y Monetización */
        #sidebar { position: fixed; top: 0; left: -100%; width: 310px; height: 100%; background: #fff; z-index: 1001; transition: 0.3s; box-shadow: 5px 0 25px rgba(0,0,0,0.15); padding: 20px; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; }

        .section-title { font-weight: 900; font-size: 11px; color: var(--accent); margin: 15px 0 8px 0; letter-spacing: 1px; text-transform: uppercase; }
        .doc-list { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        
        .doc-card { padding: 15px; border-radius: 18px; background: #f1f5f9; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        .doc-card b { display: block; font-size: 13px; color: var(--p); margin-bottom: 5px; text-transform: uppercase; }
        .doc-card p { font-size: 11px; color: #64748b; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        
        /* Monetización */
        .premium-box { background: linear-gradient(135deg, #0a0f1a, #2563eb); color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .premium-box b { font-size: 14px; display: block; margin-bottom: 5px; }
        .btn-upgrade { margin-top: 10px; width: 100%; padding: 8px; border-radius: 10px; border: none; background: #fff; color: var(--p); font-weight: bold; font-size: 11px; }

        #footer { padding: 8px 15px; font-size: 10px; font-weight: bold; background: #f8fafc; border-top: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="letter-spacing:5px; font-weight:900;">RETÓRICA</h1>
        <p style="font-size:11px; color:#64748b; margin-top:5px;">Sincronizar cuenta de Email</p>
        <input type="text" id="email-in" placeholder="tu@email.com">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--p); color:white; border:none; border-radius:12px; font-weight:900;">CONECTAR</button>
    </div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <div class="premium-box">
        <b>CUENTA GRATUITA</b>
        <button class="btn-upgrade" onclick="alert('Próximamente: Suscripción Mensual')">QUITAR ANUNCIOS</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="font-weight:900; font-size:18px;">BIBLIOTECA</h2>
        <button onclick="nuevoDoc()" style="width:35px; height:35px; border-radius:50%; border:none; background:var(--accent); color:white; font-size:20px;">+</button>
    </div>
    
    <div class="doc-list" id="doc-list"></div>

    <div class="section-title">EXPORTAR</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
        <button class="btn-t" onclick="exportarPDF()" style="font-size:10px;">.PDF</button>
        <button class="btn-t" onclick="exportarDOC()" style="font-size:10px;">.DOC</button>
        <button class="btn-t" onclick="exportarTXT()" style="font-size:10px;">.TXT</button>
    </div>
</nav>

<div id="main-app" style="display:flex; flex:1; flex-direction:column;">
    <header>
        <div class="bar-top">
            <button class="hamb" onclick="toggleMenu()">☰</button>
            <div class="logo">RETÓRICA</div>
            <button class="btn-save" onclick="guardar()">GUARDAR</button>
        </div>
        <div class="toolbar">
            <div class="row-tools">
                <button class="btn-t" onclick="dictado()" id="mic-btn">🎤 MIC</button>
                <button class="btn-t" onclick="leer()">🔊 LECTURA</button>
                <button class="btn-t" onclick="formato('bold')"><b>B</b></button>
                <button class="btn-t" onclick="formato('italic')"><i>I</i></button>
                <button class="btn-t" onclick="compartirActual()">🔗 SHARE</button>
            </div>
        </div>
    </header>

    <div id="editor" contenteditable="true" oninput="updStats()" onclick="focusEditor()"></div>
    
    <div id="footer">
        <span id="char-count">0 caracteres</span>
        <span id="user-display">Local</span>
    </div>
</div>

<script>
    var activeUser = localStorage.getItem('ret_user') || "Invitado";
    var activeId = null;

    window.onload = function() {
        if(activeUser === "Invitado") document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('user-display').innerText = activeUser;
        renderLib();
    };

    function login() {
        var mail = document.getElementById('email-in').value;
        if(mail.indexOf('@') > 0) {
            localStorage.setItem('ret_user', mail);
            location.reload();
        }
    }

    function toggleMenu() {
        var m = document.getElementById('sidebar');
        var o = document.getElementById('overlay');
        var open = m.className === 'open';
        m.className = open ? '' : 'open';
        o.style.display = open ? 'none' : 'block';
    }

    function focusEditor() {
        var ed = document.getElementById('editor');
        if(ed.innerHTML === "") ed.focus();
    }

    function dictado() {
        var ed = document.getElementById('editor');
        ed.focus();
        var Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) return alert("Microfóno no soportado");
        var rec = new Recognition();
        rec.lang = 'es-MX';
        document.getElementById('mic-btn').style.background = '#ffeb3b';
        rec.onresult = function(e) {
            document.execCommand('insertText', false, " " + e.results[0][0].transcript);
            updStats();
        };
        rec.onend = function() { document.getElementById('mic-btn').style.background = '#f8fafc'; };
        rec.start();
    }

    function leer() {
        window.speechSynthesis.cancel();
        var seleccion = window.getSelection().toString();
        var textoALeer = seleccion.length > 0 ? seleccion : document.getElementById('editor').innerText;
        if(!textoALeer.trim()) return;
        var msg = new SpeechSynthesisUtterance(textoALeer);
        msg.lang = 'es-MX';
        window.speechSynthesis.speak(msg);
    }

    function guardar() {
        var html = document.getElementById('editor').innerHTML;
        var raw = document.getElementById('editor').innerText;
        if(!raw.trim()) return;
        var db = JSON.parse(localStorage.getItem('ret_v7_db') || "[]");
        if(activeId) {
            for(var i=0; i<db.length; i++) {
                if(db[i].id === activeId) {
                    db[i].html = html; db[i].text = raw.substring(0,150); db[i].title = raw.substring(0,30);
                    break;
                }
            }
        } else {
            var nid = Date.now();
            db.unshift({ id: nid, owner: activeUser, title: raw.substring(0,30), text: raw.substring(0,150), html: html });
            activeId = nid;
        }
        localStorage.setItem('ret_v7_db', JSON.stringify(db));
        renderLib(); alert("Guardado");
    }

    function renderLib() {
        var db = JSON.parse(localStorage.getItem('ret_v7_db') || "[]");
        var list = document.getElementById('doc-list'); list.innerHTML = "";
        var misDocs = db.filter(function(d){ return d.owner === activeUser || d.owner === "Invitado"; });
        for(var i=0; i<misDocs.length; i++) {
            var d = misDocs[i];
            var card = document.createElement('div'); card.className = 'doc-card';
            card.innerHTML = "<b>" + d.title + "</b><p>" + d.text + "...</p>";
            card.onclick = (function(obj){
                return function() {
                    document.getElementById('editor').innerHTML = obj.html;
                    activeId = obj.id; updStats(); toggleMenu();
                };
            })(d);
            list.appendChild(card);
        }
    }

    function compartirActual() {
        var t = document.getElementById('editor').innerText;
        if(!t) return;
        if(navigator.share) navigator.share({ text: t }).catch(function(){});
        else window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(t));
    }

    function formato(c) { document.execCommand(c, false, null); }
    function nuevoDoc() { activeId = null; document.getElementById('editor').innerHTML = ""; toggleMenu(); }

    function exportarPDF() {
        const { jsPDF } = window.jspdf; var doc = new jsPDF();
        var l = doc.splitTextToSize(document.getElementById('editor').innerText, 180);
        doc.text(l, 10, 10); doc.save("retorica.pdf");
    }

    function exportarDOC() {
        var b = new Blob(['\ufeff', document.getElementById('editor').innerText], { type: 'application/msword' });
        var a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "retorica.doc"; a.click();
    }

    function exportarTXT() {
        var b = new Blob([document.getElementById('editor').innerText], {type: "text/plain"});
        var a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "retorica.txt"; a.click();
    }

    function updStats() { document.getElementById('char-count').innerText = document.getElementById('editor').innerText.length + " caracteres"; }
</script>
</body>
</html>
