<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica V12.1</title>
    <style>
        :root {
            --p: #0f172a;
            --bg: #ffffff;
            --accent: #2563eb;
            --muted: #64748b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { background: var(--bg); color: var(--p); height: 100vh; overflow: hidden; }

        /* Pantalla de Acceso */
        #v-auth {
            position: fixed; inset: 0; background: var(--p); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            display: none; /* Se activa por JS si no hay sesión */
        }
        .auth-box {
            background: white; padding: 40px; width: 90%; max-width: 400px;
            border-radius: 28px; text-align: center;
        }
        .input-field {
            width: 100%; padding: 16px; margin: 15px 0; border: 2px solid #e2e8f0;
            border-radius: 14px; font-size: 16px; outline: none;
        }
        .btn-main {
            width: 100%; padding: 18px; background: var(--accent); color: white;
            border: none; border-radius: 14px; font-weight: 800; cursor: pointer;
        }

        /* Menú Lateral */
        #sidebar {
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background: white; z-index: 9000; transition: 0.4s;
            box-shadow: 5px 0 30px rgba(0,0,0,0.1); padding: 80px 30px;
        }
        #sidebar.open { left: 0; }
        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 8999;
        }
        .overlay.active { display: block; }

        /* Estructura Principal */
        #main-app { display: flex; height: 100vh; flex-direction: column; }
        header {
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; border-bottom: 1px solid #f1f5f9;
        }
        .burger { font-size: 32px; cursor: pointer; }

        /* Editor y Rastro */
        #editor-container { flex: 1; overflow-y: auto; position: relative; }
        #editor {
            min-height: 100%; padding: 40px 30px 300px; font-size: 21px;
            line-height: 1.8; outline: none;
        }
        #editor:empty:before { content: attr(placeholder); color: #cbd5e1; }
        
        #ariadna {
            position: fixed; bottom: 95px; right: 25px; font-size: 11px;
            font-weight: 800; color: var(--muted); background: rgba(255,255,255,0.9);
            padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0;
        }

        /* Dock de Herramientas Inferior */
        .toolbar {
            height: 85px; display: flex; background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
        .t-btn {
            flex: 1; border: none; background: transparent; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            color: var(--muted); font-size: 11px; font-weight: 800; cursor: pointer;
        }
        .t-btn i { font-size: 26px; color: var(--p); font-style: normal; margin-bottom: 5px; }

        /* Modales */
        .modal {
            display: none; position: fixed; bottom: 100px; left: 20px; right: 20px;
            background: white; border: 2px solid var(--p); border-radius: 24px;
            padding: 30px; z-index: 9500;
        }
        .modal.active { display: block; }
        .m-opt {
            width: 100%; padding: 18px; margin-top: 12px; border: 2px solid #f1f5f9;
            border-radius: 16px; background: white; font-weight: 700; text-align: left;
        }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-box">
        <h1>RETÓRICA</h1>
        <p style="color: var(--muted); margin-bottom: 20px;">Estudio V12.1</p>
        <input type="email" id="u-mail" class="input-field" placeholder="Email o Cuenta">
        <button class="btn-main" onclick="saveUser()">INGRESAR</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeNav()"></div>

<nav id="sidebar">
    <h2 style="margin-bottom: 20px;">Biblioteca</h2>
    <div id="dev-tag" style="font-size: 12px; color: var(--muted); margin-bottom: 20px;"></div>
    <button onclick="logout()" style="color: var(--danger); border: none; background: none; font-weight: 900;">CERRAR SESIÓN</button>
</nav>

<div id="main-app">
    <header>
        <div class="burger" onclick="openNav()">☰</div>
        <div style="font-weight: 900; letter-spacing: 2px;">ESTUDIO ABIERTO</div>
        <div style="width: 32px;"></div>
    </header>

    <main id="editor-container">
        <div id="editor" contenteditable="true" placeholder="Escribe tu relámpago..." oninput="sync()"></div>
        <div id="ariadna">Detectando...</div>
    </main>

    <div id="m-dna" class="modal">
        <h3>🧬 ADN de Linaje</h3>
        <input type="text" id="dna-in" class="input-field" placeholder="Influencias...">
        <button class="btn-main" onclick="applyDNA()">VINCULAR</button>
        <button onclick="closeModals()" style="width:100%; margin-top:15px; border:none; background:none;">Volver</button>
    </div>

    <div id="m-save" class="modal">
        <h3>💾 Guardar Trabajo</h3>
        <button class="m-opt" onclick="exportar('txt')">Texto (.txt)</button>
        <button class="m-opt" onclick="exportar('html')">Web (.html)</button>
        <button class="m-opt" onclick="window.print()">Archivo PDF</button>
        <button onclick="closeModals()" style="width:100%; margin-top:20px; border:none; background:none; color:var(--danger);">Cancelar</button>
    </div>

    <footer class="toolbar">
        <button class="t-btn" onclick="dictar()"><i>🎤</i>DICTAR</button>
        <button class="t-btn" onclick="leer()"><i>🔊</i>LEER</button>
        <button class="t-btn" onclick="showDNA()"><i>🧬</i>ADN</button>
        <button class="t-btn" onclick="showSave()"><i>💾</i>GUARDAR</button>
    </footer>
</div>

<script>
    const checkHardware = () => {
        const u = navigator.userAgent;
        if (/Pixel/i.test(u)) return "Pixel 2";
        if (/Redmi/i.test(u)) return "Redmi";
        if (/Android 5/i.test(u)) return "Tablet Legacy";
        return "Dispositivo";
    };
    const device = checkHardware();

    // Lógica de Cuentas y Arranque
    window.onload = () => {
        const user = localStorage.getItem('ret_user');
        if(!user) {
            document.getElementById('v-auth').style.display = 'flex';
        } else {
            document.getElementById('dev-tag').innerText = "Vínculo: " + device;
            loadData();
        }
    };

    function saveUser() {
        const mail = document.getElementById('u-mail').value;
        if(!mail) return alert("Ingresa una cuenta");
        localStorage.setItem('ret_user', mail);
        document.getElementById('v-auth').style.display = 'none';
        document.getElementById('dev-tag').innerText = "Vínculo: " + device;
    }

    function logout() { localStorage.removeItem('ret_user'); location.reload(); }

    // Interfaz
    function openNav() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); }
    function closeNav() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
    function showDNA() { closeModals(); document.getElementById('m-dna').classList.add('active'); }
    function showSave() { closeModals(); document.getElementById('m-save').classList.add('active'); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

    // Sincronización
    function sync() {
        const content = document.getElementById('editor').innerHTML;
        const time = new Date().toLocaleTimeString();
        localStorage.setItem('ret_content', JSON.stringify({c: content, d: device, t: time}));
        document.getElementById('ariadna').innerText = `${device} | ${time}`;
    }

    function loadData() {
        const saved = localStorage.getItem('ret_content');
        if(saved) {
            const p = JSON.parse(saved);
            document.getElementById('editor').innerHTML = p.c;
            document.getElementById('ariadna').innerText = `Último: ${p.d}`;
        }
    }

    // Herramientas
    function dictar() {
        if (!('webkitSpeechRecognition' in window)) return alert("No soportado");
        const r = new webkitSpeechRecognition();
        r.lang = 'es-MX';
        r.onresult = (e) => { document.getElementById('editor').innerHTML += " " + e.results[0][0].transcript; sync(); };
        r.start();
    }

    function leer() {
        const s = new SpeechSynthesisUtterance(document.getElementById('editor').innerText);
        s.lang = 'es-MX';
        window.speechSynthesis.speak(s);
    }

    function applyDNA() { alert("ADN Vinculado"); closeModals(); }

    function exportar(f) {
        const c = f === 'txt' ? document.getElementById('editor').innerText : document.getElementById('editor').innerHTML;
        const b = new Blob([c], {type: 'text/'+f});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = `Retorica_${Date.now()}.${f}`;
        a.click();
        closeModals();
    }
</script>
</body>
</html>
