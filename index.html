<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica V21 - Selector de Precisión</title>
    <style>
        :root { --p: #0a0f1a; --bg: #ffffff; --accent: #2563eb; --muted: #64748b; --card: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Pantalla de Acceso */
        #v-auth { position: fixed; inset: 0; background: var(--p); z-index: 11000; display: flex; align-items: center; justify-content: center; color: white; }
        .auth-box { background: white; padding: 40px; border-radius: 30px; color: var(--p); text-align: center; width: 90%; max-width: 400px; }

        /* Barra Superior Dinámica con Scroll */
        header { padding: 12px 15px; border-bottom: 1px solid #eee; background: #fff; flex-shrink: 0; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .action-btns { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .action-btns::-webkit-scrollbar { display: none; }
        
        .btn-round { padding: 8px 16px; border-radius: 25px; border: 1px solid #ddd; background: #f8fafc; font-size: 13px; font-weight: bold; white-space: nowrap; cursor: pointer; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .btn-accent { background: var(--accent); color: white; border: none; }

        /* Editor de Texto */
        #editor { flex: 1; padding: 25px; overflow-y: auto; font-size: 19px; outline: none; padding-bottom: 60vh; line-height: 1.7; word-wrap: break-word; }

        /* Menú y Biblioteca */
        #sidebar { position: fixed; top: 0; left: -100%; width: 88%; max-width: 340px; height: 100%; background: white; z-index: 10000; transition: 0.3s; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.2); overflow-y: auto; }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; }

        .library-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .doc-card { background: var(--card); padding: 12px; border-radius: 15px; height: 100px; overflow: hidden; font-size: 11px; border: 1px solid #e2e8f0; cursor: pointer; }

        /* Panel de Voces de Doble Nivel */
        .voice-panel { background: #f1f5f9; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; margin-top: 10px; }
        .v-label { font-size: 10px; font-weight: bold; color: var(--accent); margin-bottom: 5px; display: block; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #cbd5e1; background: white; font-size: 13px; }

        #page-stats { padding: 12px 20px; font-size: 11px; color: var(--muted); border-top: 1px solid #eee; background: #fafafa; font-weight: bold; }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-box">
        <h1 style="letter-spacing:4px; margin-bottom:10px">RETÓRICA</h1>
        <input type="email" id="u-email" style="width:100%; padding:16px; margin-bottom:15px; border-radius:15px; border:1px solid #ddd" placeholder="Cuenta de usuario">
        <button onclick="saveUser()" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:bold">INGRESAR</button>
    </div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 style="font-weight:900">BIBLIOTECA</h2>
        <button style="width:40px; height:40px; border-radius:50%; border:none; background:var(--accent); color:white; font-size:20px" onclick="nuevoDoc()">+</button>
    </div>
    <div class="library-grid" id="library"></div>

    <div class="voice-panel">
        <span class="v-label">PASO 1: ELEGIR IDIOMA</span>
        <select id="lang-filter" onchange="filterVoicesByLang()"></select>
        
        <span class="v-label">PASO 2: ELEGIR NÚMERO DE VOZ</span>
        <select id="voice-select"></select>
        
        <button onclick="addVoiceToBar()" style="width:100%; padding:12px; background:var(--p); color:white; border-radius:10px; border:none; font-size:12px; font-weight:bold; margin-bottom:10px">Vincular a Barra</button>
        <button onclick="syncVoices()" style="width:100%; border:none; background:none; font-size:10px; color:var(--muted)">🔄 Actualizar sistema</button>
        <div id="fav-list" style="margin-top:10px; border-top:1px solid #ddd; padding-top:10px"></div>
    </div>

    <button onclick="logout()" style="margin-top:40px; color:red; border:none; background:none; font-weight:bold">Cerrar Sesión</button>
</nav>

<div id="main-app" style="display:none; flex:1; flex-direction:column;">
    <header>
        <div class="top-bar">
            <div style="font-size:28px; cursor:pointer" onclick="toggleMenu()">☰</div>
            <div style="font-weight:900; letter-spacing:1px">RETÓRICA</div>
            <button class="btn-round btn-accent" onclick="guardarDoc()">💾 GUARDAR</button>
        </div>
        <div class="action-btns" id="top-bar-voices">
            <button class="btn-round" onclick="dictar()">🎤 Dictado</button>
        </div>
    </header>
    
    <div id="editor" contenteditable="true" oninput="updateStats()" placeholder="Escribe aquí..."></div>
    
    <div id="page-stats">0 caracteres | 0 palabras</div>
</div>

<script>
    let voices = [];
    let favorites = JSON.parse(localStorage.getItem('ret_favs_v21')) || [];
    let docs = JSON.parse(localStorage.getItem('ret_docs_v21')) || [];

    window.onload = () => {
        if (localStorage.getItem('ret_user')) {
            document.getElementById('v-auth').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            loadLibrary();
            syncVoices();
        }
    };

    function syncVoices() {
        const load = () => {
            voices = window.speechSynthesis.getVoices();
            const langSel = document.getElementById('lang-filter');
            // Extraer idiomas únicos disponibles
            const uniqueLangs = [...new Set(voices.map(v => v.lang))].sort();
            langSel.innerHTML = uniqueLangs.map(l => `<option value="${l}">${l}</option>`).join('');
            filterVoicesByLang();
            renderFavs();
        };
        load();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = load;
    }

    function filterVoicesByLang() {
        const selectedLang = document.getElementById('lang-filter').value;
        const voiceSel = document.getElementById('voice-select');
        const filtered = voices.filter(v => v.lang === selectedLang);
        // Aquí mostramos el nombre exacto (ej. Voz I, Voz II) para que coincida con tu Pixel
        voiceSel.innerHTML = filtered.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
    }

    function addVoiceToBar() {
        const name = document.getElementById('voice-select').value;
        const vInfo = voices.find(v => v.name === name);
        if (!vInfo) return;

        let icon = "👤";
        const n = name.toLowerCase();
        // Detección mejorada para reconocer patrones de género en Android/Pixel
        if (n.includes('male') || n.includes('hombre') || n.includes('iv') || n.includes('ii')) icon = "👨";
        if (n.includes('female') || n.includes('mujer') || n.includes('iii') || n.includes('i')) icon = "👩";

        if (!favorites.find(f => f.name === name)) {
            favorites.push({ name: name, active: true, icon: icon, lang: vInfo.lang });
            saveAndRender();
        }
    }

    function toggleFav(i) { favorites[i].active = !favorites[i].active; saveAndRender(); }
    function removeFav(i) { favorites.splice(i, 1); saveAndRender(); }
    function saveAndRender() { localStorage.setItem('ret_favs_v21', JSON.stringify(favorites)); renderFavs(); }

    function renderFavs() {
        const bar = document.getElementById('top-bar-voices');
        const list = document.getElementById('fav-list');
        bar.innerHTML = `<button class="btn-round" onclick="dictar()">🎤 Dictado</button>`;
        list.innerHTML = '';

        favorites.forEach((v, i) => {
            if (v.active) {
                // Etiqueta simplificada para la barra: "Idioma + Icono"
                let label = `${v.lang.split('-')[0].toUpperCase()} ${v.icon}`;
                bar.innerHTML += `<button class="btn-round" onclick="leerConVoz('${v.name}')">${label}</button>`;
            }
            list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:11px">
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:160px">${v.name}</span>
                <div>
                    <button onclick="toggleFav(${i})" style="border:none; background:none">${v.active?'👁️':'🚫'}</button>
                    <button onclick="removeFav(${i})" style="border:none; background:none; color:red; margin-left:10px">✕</button>
                </div>
            </div>`;
        });
    }

    function leerConVoz(name) {
        speechSynthesis.cancel();
        const text = window.getSelection().toString() || document.getElementById('editor').innerText;
        if (!text) return;
        const ut = new SpeechSynthesisUtterance(text);
        const v = voices.find(v => v.name === name);
        if (v) { ut.voice = v; ut.lang = v.lang; }
        speechSynthesis.speak(ut);
    }

    function dictar() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("No soportado");
        const rec = new Speech();
        rec.lang = 'es-MX';
        rec.onresult = (e) => {
            document.getElementById('editor').innerText += " " + e.results[0][0].transcript;
            updateStats();
        };
        rec.start();
    }

    function guardarDoc() {
        const editor = document.getElementById('editor');
        const text = editor.innerText.trim();
        if (!text) return;
        docs.unshift({ id: Date.now(), title: text.substring(0,20), body: editor.innerHTML, date: new Date().toLocaleDateString() });
        if (docs.length > 12) docs.pop();
        localStorage.setItem('ret_docs_v21', JSON.stringify(docs));
        loadLibrary();
        alert("Guardado");
    }

    function loadLibrary() {
        document.getElementById('library').innerHTML = docs.map(d => `
            <div onclick="cargarDoc(${d.id})" class="doc-card">
                <b style="display:block; margin-bottom:5px; font-size:12px">${d.title}</b>
                <span>${d.date}</span>
            </div>`).join('');
    }

    function cargarDoc(id) {
        const d = docs.find(doc => doc.id === id);
        if (d) { document.getElementById('editor').innerHTML = d.body; updateStats(); toggleMenu(); }
    }

    function nuevoDoc() {
        if (confirm("¿Limpiar editor?")) { document.getElementById('editor').innerHTML = ""; updateStats(); toggleMenu(); }
    }

    function updateStats() {
        const t = document.getElementById('editor').innerText;
        document.getElementById('page-stats').innerText = `${t.length} caracteres | ${t.trim()===""?0:t.trim().split(/\s+/).length} palabras`;
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
    }

    function saveUser() {
        const m = document.getElementById('u-email').value;
        if (m) { localStorage.setItem('ret_user', m); location.reload(); }
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
