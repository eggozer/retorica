<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica - Universal Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --p: #0a0f1a; --bg: #ffffff; --accent: #2563eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Login con Email para Sincronización Local */
        #v-auth { position: fixed; inset: 0; background: var(--p); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; }
        
        /* Header Robusto para Android Antiguo */
        header { background: #fff; border-bottom: 1px solid #ddd; padding: 10px; flex-shrink: 0; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .menu-btn { font-size: 24px; background: none; border: none; cursor: pointer; padding: 5px 10px; }
        
        /* Barra de Herramientas Fija */
        .tools { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; }
        .btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; background: #f9f9f9; font-size: 12px; font-weight: bold; white-space: nowrap; }
        .btn-blue { background: var(--accent); color: white; border: none; }

        /* Editor compatible con Android 5 */
        #editor { flex: 1; padding: 20px; overflow-y: auto; font-size: 18px; outline: none; line-height: 1.6; background: #fff; }
        #editor:empty:before { content: "Empieza a escribir..."; color: #999; }

        /* Sidebar (Hamburguesa corregida) */
        #sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #fff; z-index: 9999; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.2); padding: 20px; overflow-y: auto; }
        #sidebar.active { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; }

        /* Estilos de Letra */
        .serif { font-family: 'Times New Roman', serif; }
        .mono { font-family: 'Courier New', monospace; }

        /* Biblioteca */
        .doc-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
        .tutorial { background: #fffde7; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 12px; border: 1px solid #ffd600; }
    </style>
</head>
<body>

<div id="v-auth">
    <div class="auth-box">
        <h2 style="margin-bottom:15px">RETÓRICA</h2>
        <input type="email" id="user-email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;" placeholder="tu@email.com">
        <p style="font-size:11px; color:#666; margin-bottom:15px;">Usa el mismo email en otros dispositivos para ver tus archivos (Sincronización Local).</p>
        <button onclick="iniciar()" style="width:100%; padding:12px; background:var(--p); color:white; border:none; border-radius:8px; font-weight:bold;">INGRESAR</button>
    </div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <h3 style="margin-bottom:15px">BIBLIOTECA</h3>
    <div id="lista-docs"></div>
    <hr style="margin:20px 0">
    <div class="tutorial">
        <b>TUTORIAL VOCES:</b><br>
        1. Ve a Ajustes de tu Android.<br>
        2. Idioma e Introducción.<br>
        3. Salida de Texto a Voz.<br>
        4. Elige "Motor de Google" e instala el idioma que desees.
    </div>
    <button onclick="cerrarSesion()" style="margin-top:20px; width:100%; padding:8px; color:red; background:none; border:1px solid red; border-radius:5px;">Cerrar Sesión</button>
</nav>

<div id="app" style="display:none; flex:1; flex-direction:column;">
    <header>
        <div class="top">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <b style="letter-spacing:2px">RETÓRICA</b>
            <button class="btn btn-blue" onclick="guardarLocal()">GUARDAR</button>
        </div>
        <div class="tools">
            <button class="btn" onclick="dictado()">🎤 DICTAR</button>
            <button class="btn" onclick="lectura()">🔊 LEER</button>
            <button class="btn" onclick="cambiarLetra('serif')">Serif</button>
            <button class="btn" onclick="cambiarLetra('mono')">Mono</button>
            <button class="btn" onclick="exportarTXT()">.TXT</button>
            <button class="btn" onclick="exportarDOC()">.DOC</button>
            <button class="btn" onclick="exportarPDF()">.PDF</button>
        </div>
    </header>

    <div id="editor" contenteditable="true"></div>
    <div id="stats" style="padding:5px 15px; font-size:10px; background:#eee;">Caracteres: 0</div>
</div>

<script>
    var email = "";
    var docs = [];

    function iniciar() {
        email = document.getElementById('user-email').value;
        if(email.indexOf('@') > -1) {
            localStorage.setItem('ret_last_email', email);
            document.getElementById('v-auth').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            cargarDocs();
        } else {
            alert("Ingresa un email válido");
        }
    }

    function toggleMenu() {
        var s = document.getElementById('sidebar');
        var o = document.getElementById('overlay');
        if(s.className === 'active') {
            s.className = '';
            o.style.display = 'none';
        } else {
            s.className = 'active';
            o.style.display = 'block';
        }
    }

    function guardarLocal() {
        var contenido = document.getElementById('editor').innerHTML;
        var texto = document.getElementById('editor').innerText;
        if(!texto.trim()) return;
        
        var id = Date.now();
        var nuevo = { 
            id: id, 
            email: email, 
            titulo: texto.substring(0, 25), 
            html: contenido, 
            fecha: new Date().toLocaleDateString() 
        };
        
        var guardados = JSON.parse(localStorage.getItem('ret_storage') || "[]");
        guardados.unshift(nuevo);
        localStorage.setItem('ret_storage', JSON.stringify(guardados));
        cargarDocs();
        alert("Guardado en este dispositivo");
    }

    function cargarDocs() {
        var guardados = JSON.parse(localStorage.getItem('ret_storage') || "[]");
        var contenedor = document.getElementById('lista-docs');
        contenedor.innerHTML = "";
        
        // Sincronización lógica: solo muestra los que coinciden con el email
        docs = guardados.filter(function(d) { return d.email === email; });
        
        for(var i=0; i<docs.length; i++) {
            var div = document.createElement('div');
            div.className = 'doc-item';
            div.innerHTML = "<b>" + docs[i].titulo + "</b><br><small>" + docs[i].fecha + "</small>";
            div.onclick = (function(index){
                return function() {
                    document.getElementById('editor').innerHTML = docs[index].html;
                    toggleMenu();
                };
            })(i);
            contenedor.appendChild(div);
        }
    }

    function dictado() {
        var Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Recognition) return alert("Dictado no disponible en este navegador");
        var rec = new Recognition();
        rec.lang = 'es-MX';
        rec.onresult = function(e) {
            document.getElementById('editor').innerText += " " + e.results[0][0].transcript;
        };
        rec.start();
    }

    function lectura() {
        var msg = new SpeechSynthesisUtterance(document.getElementById('editor').innerText);
        window.speechSynthesis.speak(msg);
    }

    function cambiarLetra(clase) {
        document.getElementById('editor').className = clase;
    }

    // Exportaciones
    function exportarTXT() {
        var blob = new Blob([document.getElementById('editor').innerText], {type: "text/plain"});
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "guion.txt";
        a.click();
    }

    function exportarDOC() {
        var contenido = document.getElementById('editor').innerText;
        var blob = new Blob(['\ufeff', contenido], { type: 'application/msword' });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "guion.doc";
        a.click();
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        var doc = new jsPDF();
        var texto = document.getElementById('editor').innerText;
        var lineas = doc.splitTextToSize(texto, 180);
        doc.text(lineas, 10, 10);
        doc.save("guion.pdf");
    }

    function cerrarSesion() {
        if(confirm("¿Cerrar sesión? Los archivos se quedan en este dispositivo.")) {
            location.reload();
        }
    }

    // Contador de caracteres
    document.getElementById('editor').oninput = function() {
        document.getElementById('stats').innerText = "Caracteres: " + this.innerText.length;
    };
</script>
</body>
</html>
