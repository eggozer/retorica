<!DOCTYPE html>
<html lang="es" data-retorica-anchor="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes">
    <title>Retórica - Sistema Avanzado de Guiones</title>
    <link rel="manifest" href="./manifest.json?v=2026_Final">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-main: #0f121a; --bg-sidebar: #161a25; --bg-card: #1e2330;
            --accent: #f5c518; --text-main: #f3f4f6; --text-muted: #8a94a6;
            --border: #2d3748; --danger: #ff3b30; --btn-3d-bg: #252a3a;
            --btn-3d-shadow-dark: #05070a; --btn-3d-shadow-light: #38415a;
        }
        html.light-theme, body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #d4a373; --text-main: #1a202c; --text-muted: #718096;
            --border: #cbd5e0; --btn-3d-bg: #e0e5ec;
            --btn-3d-shadow-dark: #b8bec7; --btn-3d-shadow-light: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

        /* --- ENCABEZADO CORREGIDO (FLUJO NORMAL) --- */
        .brand-header-3d {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }
        .brand-logo-sol {
            width: 32px; height: 32px;
            background: radial-gradient(circle, #ffe082 20%, #f5c518 60%, #e65100 100%);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(245, 197, 24, 0.6), inset 2px 2px 5px rgba(255,255,255,0.5);
            position: relative;
        }
        .brand-logo-sol::after {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px dashed var(--accent); border-radius: 50%; opacity: 0.3; animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .brand-title-3d { font-size: 1.3rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; }

        /* --- PASARELA DE HERRAMIENTAS (CON ZOOM INTEGRADO) --- */
        .scollable-toolbar-wrapper { 
            height: 85px; 
            background-color: var(--bg-sidebar); 
            padding: 0 10px 0 65px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            flex-shrink: 0; 
            overflow: hidden;
        }
        .top-toolbar-pasarela { display: flex; align-items: center; gap: 20px; overflow-x: auto; white-space: nowrap; width: 100%; height: 100%; scrollbar-width: none; }
        .top-toolbar-pasarela::-webkit-scrollbar { display: none; }
        
        .toolbar-rack-modular { display: flex; align-items: center; gap: 12px; }
        .control-unit-3d { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .leyenda-superior-externa { font-size: 0.6rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        /* --- BOTONES 3D --- */
        .btn-3d-round { 
            width: 42px; height: 42px; border-radius: 50%; background: var(--btn-3d-bg); 
            border: none; color: var(--text-main); display: flex; align-items: center; justify-content: center; 
            font-size: 1.1rem; cursor: pointer; transition: 0.1s;
            box-shadow: 4px 4px 8px var(--btn-3d-shadow-dark), -2px -2px 6px var(--btn-3d-shadow-light);
        }
        .btn-3d-round:active { box-shadow: inset 2px 2px 5px var(--btn-3d-shadow-dark); transform: scale(0.96); }
        .btn-3d-round.active-mode { color: var(--accent); box-shadow: inset 2px 2px 5px #000; }

        /* --- MENÚ LATERAL Y PASARELA "GUARDAR COMO" --- */
        .sidebar { 
            width: 100vw; height: 100%; background: var(--bg-sidebar); position: fixed; 
            left: 0; top: 0; z-index: 2000; display: flex; flex-direction: column; 
            transition: transform 0.4s ease; transform: translateX(-100%); 
        }
        .sidebar.active { transform: translateX(0); }
        
        .save-as-pasarela-container {
            background: rgba(0,0,0,0.2); padding: 15px; border-bottom: 1px solid var(--border);
        }
        .save-as-scroll-box {
            display: flex; gap: 15px; overflow-x: auto; padding: 5px; scrollbar-width: none;
        }
        .save-option-card {
            min-width: 100px; padding: 10px; background: var(--bg-card); border-radius: 8px;
            text-align: center; border: 1px solid var(--border); flex-shrink: 0;
        }

        /* --- EDITOR --- */
        .editor-wrapper { flex: 1; display: flex; flex-direction: column; padding: 15px; position: relative; background: var(--bg-main); }
        .input-titulo-html { 
            background: transparent; border: none; border-bottom: 2px solid var(--border); 
            color: var(--accent); font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; outline: none; width: 100%; 
        }
        .textarea-encapsulado { 
            flex: 1; background: transparent; border: none; color: var(--text-main); 
            font-size: 1.1rem; line-height: 1.6; resize: none; outline: none; 
        }

        /* --- COMPONENTES AUXILIARES --- */
        .toggle-sidebar-pestaña { 
            position: fixed; left: 10px; top: 72px; width: 45px; height: 45px; 
            background: var(--bg-sidebar); color: var(--accent); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; z-index: 2100; border-radius: 50%;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5); font-weight: bold;
        }
        .toast-notificador { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); 
            background: var(--accent); color: #000; padding: 10px 20px; border-radius: 20px; 
            font-weight: bold; transition: 0.3s; z-index: 5000; 
        }
        .toast-notificador.show { transform: translateX(-50%) translateY(0); }

        /* --- AUTH --- */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 4000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-sidebar); padding: 30px; border-radius: 15px; border: 1px solid var(--accent); width: 90%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-main); border: 1px solid var(--border); color: #fff; border-radius: 8px; }
        .btn-access { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="auth-overlay" id="modulo-auth-screen">
        <div class="auth-card">
            <div class="brand-logo-sol" style="margin: 0 auto 15px;"></div>
            <h2 style="margin-bottom: 20px; color: var(--accent);">RETÓRICA</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Correo electrónico">
            <button class="btn-access" onclick="acceder()">ENTRAR</button>
        </div>
    </div>

    <header class="brand-header-3d">
        <div class="brand-logo-sol"></div>
        <h1 class="brand-title-3d">Retórica</h1>
    </header>

    <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña">☰</div>

    <div class="sidebar" id="sidebar-container">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-top: 50px;">
            <h3 style="color: var(--accent);">BIBLIOTECA</h3>
            <button class="btn-3d-round" onclick="cerrarMenu()">✕</button>
        </div>

        <div class="save-as-pasarela-container">
            <p class="leyenda-superior-externa" style="margin-bottom: 10px;">Guardar como:</p>
            <div class="save-as-scroll-box">
                <div class="save-option-card" onclick="exportarFormato('html')">🌐 HTML</div>
                <div class="save-option-card" onclick="exportarFormato('pdf')">📄 PDF</div>
                <div class="save-option-card" onclick="exportarFormato('txt')">📝 TXT</div>
                <div class="save-option-card" onclick="exportarFormato('doc')">📦 DOC</div>
            </div>
        </div>

        <div id="contenedor-lista-documentos" style="flex: 1; overflow-y: auto; padding: 15px;"></div>
        
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <button class="btn-access" onclick="cerrarSesion()">CERRAR SESIÓN</button>
        </div>
    </div>

    <nav class="scollable-toolbar-wrapper">
        <div class="top-toolbar-pasarela">
            <div class="toolbar-rack-modular">
                <div class="control-unit-3d">
                    <span class="leyenda-superior-externa">Guardar</span>
                    <button class="btn-3d-round" onclick="guardarLocal()">💾</button>
                </div>
                <div class="control-unit-3d">
                    <span class="leyenda-superior-externa">Nuevo</span>
                    <button class="btn-3d-round" onclick="nuevoDoc()">➕</button>
                </div>
            </div>

            <div class="toolbar-rack-modular">
                <div class="control-unit-3d">
                    <span class="leyenda-superior-externa">Dictado</span>
                    <button class="btn-3d-round" id="btn-mic" onclick="toggleDictado()">🎙️</button>
                </div>
                <div class="control-unit-3d">
                    <span class="leyenda-superior-externa">Leer</span>
                    <button class="btn-3d-round" onclick="leerTexto()">🔊</button>
                </div>
            </div>

            <div class="toolbar-rack-modular">
                <div class="control-unit-3d">
                    <span class="leyenda-superior-externa">Zoom+</span>
                    <button class="btn-3d-round" onclick="ajustarZoom(0.1)">➕</button>
                </div>
                <div class="control-unit-3d">
                    <span class="leyenda-superior-externa">Zoom-</span>
                    <button class="btn-3d-round" onclick="ajustarZoom(-0.1)">➖</button>
                </div>
            </div>

            <div class="toolbar-rack-modular">
                <div class="control-unit-3d">
                    <span class="leyenda-superior-externa">Tema</span>
                    <button class="btn-3d-round" onclick="toggleTema()">🌓</button>
                </div>
                <div class="control-unit-3d">
                    <span class="leyenda-superior-externa">Idioma</span>
                    <select id="select-lang" style="height: 35px; border-radius: 8px; background: var(--btn-3d-bg); color: #fff; border: none;">
                        <option value="es-MX">ES</option>
                        <option value="en-US">EN</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <main class="editor-wrapper">
        <input type="text" id="doc-title" class="input-titulo-html" placeholder="Título del guion...">
        <textarea id="doc-content" class="textarea-encapsulado" placeholder="Comienza a escribir..."></textarea>
        
        <div style="font-size: 0.7rem; color: var(--text-muted); display: flex; gap: 15px; margin-top: 10px;">
            <span id="stat-chars">Caracteres: 0</span>
            <span id="stat-words">Palabras: 0</span>
        </div>
    </main>

    <div class="toast-notificador" id="global-toast"></div>

    <script>
        let currentUser = null;
        let idActual = null;
        let zoomLevel = 1.0;
        let recognition = null;
        let isDictating = false;

        // DB Logic
        const DB_NAME = 'RetoricaDB_V2026';
        const STORE = 'docs';

        function openDB() {
            return new Promise((res) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE, { keyPath: 'id' });
                req.onsuccess = (e) => res(e.target.result);
            });
        }

        // Auth & UI
        function acceder() {
            const email = document.getElementById('auth-email').value;
            if(!email) return;
            currentUser = email;
            localStorage.setItem('retorica_user', email);
            document.getElementById('modulo-auth-screen').classList.add('hidden');
            mostrarToast("Bienvenido a Retórica");
            cargarBiblioteca();
        }

        function cerrarSesion() {
            localStorage.clear();
            location.reload();
        }

        const btnPestaña = document.getElementById('btn-toggle-pestaña');
        const sidebar = document.getElementById('sidebar-container');

        btnPestaña.onclick = () => sidebar.classList.toggle('active');
        function cerrarMenu() { sidebar.classList.remove('active'); }

        function toggleTema() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('retorica_theme', isLight ? 'light' : 'dark');
        }

        function ajustarZoom(delta) {
            zoomLevel = Math.max(0.7, Math.min(2.0, zoomLevel + delta));
            document.querySelector('.editor-wrapper').style.transform = `scale(${zoomLevel})`;
            document.querySelector('.editor-wrapper').style.transformOrigin = 'top center';
        }

        // Editor Logic
        async function guardarLocal() {
            if(!currentUser) return;
            const db = await openDB();
            if(!idActual) idActual = Date.now();
            const doc = {
                id: idActual,
                user: currentUser,
                title: document.getElementById('doc-title').value || "Sin Título",
                content: document.getElementById('doc-content').value,
                date: new Date().toLocaleString()
            };
            const tx = db.transaction(STORE, 'readwrite');
            tx.objectStore(STORE).put(doc);
            mostrarToast("Guardado correctamente");
            cargarBiblioteca();
        }

        async function cargarBiblioteca() {
            const db = await openDB();
            const tx = db.transaction(STORE, 'readonly');
            const req = tx.objectStore(STORE).getAll();
            req.onsuccess = () => {
                const list = req.result.filter(d => d.user === currentUser);
                const container = document.getElementById('contenedor-lista-documentos');
                container.innerHTML = list.map(d => `
                    <div style="background:var(--bg-card); padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border);" onclick="abrirDoc(${d.id})">
                        <div style="font-weight:bold; color:var(--accent);">${d.title}</div>
                        <div style="font-size:0.7rem; color:var(--text-muted);">${d.date}</div>
                    </div>
                `).join('');
            };
        }

        async function abrirDoc(id) {
            const db = await openDB();
            const tx = db.transaction(STORE, 'readonly');
            const req = tx.objectStore(STORE).get(id);
            req.onsuccess = () => {
                const d = req.result;
                idActual = d.id;
                document.getElementById('doc-title').value = d.title;
                document.getElementById('doc-content').value = d.content;
                cerrarMenu();
                actualizarStats();
            };
        }

        function nuevoDoc() {
            idActual = null;
            document.getElementById('doc-title').value = '';
            document.getElementById('doc-content').value = '';
            actualizarStats();
            mostrarToast("Nuevo Lienzo");
        }

        // Audio
        function toggleDictado() {
            if(!('webkitSpeechRecognition' in window)) return mostrarToast("No soportado");
            if(!recognition) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = true;
                recognition.onresult = (e) => {
                    const text = e.results[e.results.length - 1][0].transcript;
                    document.getElementById('doc-content').value += text;
                    actualizarStats();
                };
            }
            if(!isDictating) {
                recognition.lang = document.getElementById('select-lang').value;
                recognition.start();
                document.getElementById('btn-mic').classList.add('active-mode');
                mostrarToast("Escuchando...");
            } else {
                recognition.stop();
                document.getElementById('btn-mic').classList.remove('active-mode');
            }
            isDictating = !isDictating;
        }

        function leerTexto() {
            const ut = new SpeechSynthesisUtterance(document.getElementById('doc-content').value);
            ut.lang = document.getElementById('select-lang').value;
            speechSynthesis.speak(ut);
        }

        // Stats
        function actualizarStats() {
            const val = document.getElementById('doc-content').value;
            document.getElementById('stat-chars').textContent = `Caracteres: ${val.length}`;
            document.getElementById('stat-words').textContent = `Palabras: ${val.trim().split(/\s+/).filter(x => x).length}`;
        }
        document.getElementById('doc-content').oninput = actualizarStats;

        function mostrarToast(msg) {
            const t = document.getElementById('global-toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function exportarFormato(fmt) {
            mostrarToast("Exportando a " + fmt.toUpperCase() + "...");
            // Aquí se conectan los scripts de descarga
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('retorica_user');
            if(savedUser) {
                currentUser = savedUser;
                document.getElementById('modulo-auth-screen').classList.add('hidden');
                cargarBiblioteca();
            }
            if(localStorage.getItem('retorica_theme') === 'light') document.body.classList.add('light-theme');
        };
    </script>
</body>
</html>
