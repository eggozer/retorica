<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retórica - Sistema Profesional</title>
    <link rel="manifest" href="./manifest.json?v=2026_GOD_MODE">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #0f111a; --bg-sidebar: #161925; --bg-card: #1f2335;
            --accent: #00ffcc; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #ff3b30; --btn-3d-bg: #2d3244;
            --electric-blue: #00d2ff; --royal-green: #2ecc71;
        }
        body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #00a884; --text-main: #1a202c; --text-muted: #718096;
            --border: #cbd5e0; --danger: #e53e3e; --btn-3d-bg: #d2d6dc;
            --electric-blue: #00b4d8; --royal-green: #38a169;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body, html { width: 100%; height: 100%; background: var(--bg-main); color: var(--text-main); overflow: hidden; display: flex; flex-direction: column; }
        
        /* Contenedor de Autenticación Avanzada */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 400px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; }
        .auth-logo-container { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 25px; gap: 10px; }
        .auth-icon { width: 64px; height: 64px; object-fit: contain; display: block; margin: 0 auto; }
        .auth-logo { font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; text-align: center; }
        .auth-subtitle { font-size: 0.75rem; color: var(--text-muted); font-weight: bold; letter-spacing: 1px; text-align: center; }
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.65rem; color: var(--accent); font-weight: bold; margin-bottom: 5px; letter-spacing: 0.5px; }
        .input-field { width: 100%; background: var(--bg-card); border: 1px solid var(--border); padding: 12px 15px; border-radius: 8px; color: #fff; font-size: 0.9rem; font-weight: bold; transition: border 0.2s; }
        .input-field:focus { border-color: var(--accent); outline: none; }
        
        /* Botonera 3D Estricta */
        .btn-3d { width: 100%; background: var(--btn-3d-bg); border: none; border-bottom: 4px solid rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; color: #fff; font-weight: bold; font-size: 0.85rem; cursor:pointer; active-transform: translateY(2px); transition: filter 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-3d:active { transform: translateY(2px); border-bottom-width: 2px; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-rect { width: auto; padding: 6px 12px; font-size: 0.7rem; border-radius: 4px; }
        
        /* Proveedores Alternativos (Hardware Virtual Linked) */
        .oauth-container { display: none; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-oauth { text-align: left; padding: 10px 15px; font-size: 0.8rem; display: none; }
        .btn-google { background: #de4032; color: #fff; }
        .btn-facebook { background: #3b5998; color: #fff; }
        .btn-whatsapp { background: #25d366; color: #fff; }
        .auth-divider { display: none; align-items: center; text-align: center; color: var(--text-muted); font-size: 0.65rem; font-weight: bold; margin: 20px 0; }
        .auth-divider::before, .auth-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .auth-divider:not(:empty)::before { margin-right: .55em; }
        .auth-divider:not(:empty)::after { margin-left: .55em; }
        
        /* Menú Horizontal Deslizable Flotante */
        .top-navbar { background: var(--bg-sidebar); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; gap: 10px; z-index: 1000; }
        .menu-slider-container { flex: 1; overflow-x: auto; white-space: nowrap; display: flex; gap: 8px; padding-bottom: 3px; -webkit-overflow-scrolling: touch; }
        .menu-slider-container::-webkit-scrollbar { height: 4px; }
        .menu-slider-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .nav-btn { background: var(--bg-card); border: 1px solid var(--border); padding: 8px 14px; border-radius: 6px; color: var(--text-main); font-size: 0.75rem; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .nav-btn:max-width { white-space: nowrap; }
        .nav-btn:active { background: var(--border); }
        
        /* Barra Lateral Izquierda Transparente */
        .sidebar-panel { position: fixed; top: 51px; left: 0; width: 280px; height: calc(100% - 83px); background: rgba(22, 25, 37, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-right: 1px solid var(--border); transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); z-index: 950; display: flex; flex-direction: column; }
        .sidebar-panel.active { transform: translateX(0); }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.75rem; font-weight: bold; color: var(--accent); letter-spacing: 0.5px; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }
        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; align-items: center; font-size: 0.75rem; }
        
        /* Área de Trabajo Principal */
        .main-view { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }
        .editor-scroll-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        #zoom-wrapper { width: 100%; display: flex; flex-direction: column; flex: 1; }
        .doc-title { background: transparent; border: none; color: var(--accent); font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; width: 100%; outline: none; }
        .textarea-main { background: transparent; border: none; color: var(--text-main); font-size: 1rem; line-height: 1.6; resize: none; flex: 1; width: 100%; min-height: 200px; outline: none; font-weight: 500; }
        
        /* Toast Notification */
        .toast { position: fixed; bottom: 45px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: #000; padding: 10px 20px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000; pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        /* Clases de Control de Hardware */
        .recording-active { background: var(--danger) !important; color: #fff !important; animation: pulseMic 1.5s infinite; }
        .reading-active { background: var(--electric-blue) !important; color: #fff !important; }
        @keyframes pulseMic { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="auth-overlay" id="auth-layer-screen">
        <div class="auth-card">
            <div class="auth-logo-container">
                <img src="./icon-192.png" class="auth-icon" alt="Retórica Logo" onerror="this.style.display='none';">
                <div class="auth-logo">RETÓRICA</div>
                <div class="auth-subtitle">SISTEMA MODULAR PROFESIONAL</div>
            </div>
            
            <div class="input-group">
                <label id="lbl-auth-user">USUARIO DIGITAL (EMAIL / ID)</label>
                <input type="text" id="auth-input-uid" class="input-field" placeholder="ejemplo@retorica.com">
            </div>
            <div class="input-group">
                <label id="lbl-auth-pass">CLAVE CRIPTOGRÁFICA</label>
                <input type="password" id="auth-input-pass" class="input-field" placeholder="••••••••">
            </div>
            
            <button class="btn-3d btn-accent" id="btn-submit-auth" onclick="RetoricaAuth.process()">CONTINUAR</button>
            
            <div style="margin-top:15px; font-size:0.7rem; font-weight:bold;">
                <span id="auth-toggle-mode" style="color:var(--text-muted); cursor:pointer;" onclick="RetoricaAuth.switchMode()">¿No tienes cuenta? Regístrate aquí</span>
            </div>
            
            <div class="auth-divider" id="auth-divider-line">O ACCEDER VÍA HARDWARE</div>
            
            <div class="oauth-container" id="oauth-container">
                <button class="btn-3d btn-oauth btn-google" id="btn-oauth-google" onclick="RetoricaAuth.selectOAuth('Google')">VINCULAR DISPOSITIVO GOOGLE</button>
                <button class="btn-3d btn-oauth btn-facebook" id="btn-oauth-facebook" onclick="RetoricaAuth.selectOAuth('Facebook')">VINCULAR DISPOSITIVO FACEBOOK</button>
                <button class="btn-3d btn-oauth btn-whatsapp" id="btn-oauth-whatsapp" onclick="RetoricaAuth.selectOAuth('WhatsApp')">VINCULAR DISPOSITIVO WHATSAPP</button>
            </div>
        </div>
    </div>

    <nav class="top-navbar">
        <button class="nav-btn" style="background:transparent; border-color:var(--accent); color:var(--accent);" onclick="RetoricaUI.toggleSidebar()">☰</button>
        <div class="menu-slider-container">
            <button class="nav-btn" onclick="RetoricaStorage.save()" id="lbl-tool-save">GUARDAR</button>
            <button class="nav-btn" onclick="RetoricaStorage.clearCanvas()" id="lbl-tool-new">NUEVO</button>
            <button class="nav-btn" id="btn-mic-main" onclick="RetoricaAudio.toggleMic()"><span id="lbl-tool-mic">DICTADO</span></button>
            <button class="nav-btn" id="btn-play-main" onclick="RetoricaAudio.play()"><span id="lbl-tool-read">LECTURA</span></button>
            <button class="nav-btn" style="color:var(--danger); border-color:rgba(255,59,48,0.3);" onclick="RetoricaAudio.stop()" id="lbl-tool-stop">ABORTAR</button>
            <button class="nav-btn" onclick="RetoricaAudio.vmsg()" id="lbl-tool-vmsg">MSJ VOZ</button>
            <button class="nav-btn" onclick="RetoricaUI.exportPDF()" id="lbl-tool-render">RENDER</button>
            <button class="nav-btn" onclick="RetoricaUI.adjustZoom(0.1)" id="lbl-tool-zoom">ZOOM +</button>
            <button class="nav-btn" onclick="RetoricaUI.adjustZoom(-0.1)">ZOOM -</button>
            <button class="nav-btn" onclick="RetoricaUI.toggleTheme()" id="lbl-tool-theme">TEMA</button>
            <button class="nav-btn" onclick="RetoricaI18n.toggleAppLang()" id="lbl-tool-langapp">IDIOMA APP</button>
            <button class="nav-btn" onclick="RetoricaI18n.translateText('en')" id="lbl-tool-langtext">TRADUCIR</button>
            <button class="nav-btn" id="btn-install-pwa" style="display:none; background:var(--accent); color:#000;" onclick="RetoricaUI.triggerInstallPWA()">INSTALAR</button>
        </div>
    </nav>

    <div class="sidebar-panel" id="sidebar">
        <div class="sidebar-header">BIBLIOTECA DE GUIONES</div>
        <div class="sidebar-content" id="docs-list-render"></div>
        
        <div class="sidebar-header" style="border-top:1px solid var(--border);" id="lbl-side-admin">ADMINISTRACIÓN DE ACCESOS</div>
        <div class="sidebar-content" id="admin-user-list" style="flex:0; min-height:100px;"></div>

        <div class="sidebar-footer">
            <button class="nav-btn btn-rect" onclick="RetoricaStorage.exportToHTML()" id="lbl-side-export" style="margin-right:10px;">EXPORTAR</button>
            <div style="font-size:0.65rem; color:var(--text-muted); font-weight:bold;"><span id="lbl-side-user">USER:</span> <span id="display-user-name" style="color:var(--accent); font-weight:bold;">Anon</span></div>
            <button onclick="RetoricaAuth.logout()" style="color:var(--danger); background:transparent; border:none; font-size:0.8rem; font-weight:bold; cursor:pointer; margin-left:auto;" id="lbl-side-logout">SALIR</button>
        </div>
    </div>

    <main class="main-view">
        <div class="editor-scroll-container" id="viewport-ctx">
            <div id="zoom-wrapper">
                <input type="text" id="editor-title" class="doc-title" placeholder="Título del Guion...">
                <textarea id="editor-body" class="textarea-main" placeholder="Escribe o dicta aquí tu retórica..."></textarea>
            </div>
        </div>
    </main>

    <footer style="background:var(--bg-sidebar); padding:8px 15px; font-size:0.65rem; display:flex; gap:15px; border-top:1px solid var(--border); color:var(--text-muted); font-weight:bold; z-index:900;">
        <span id="count-chars">CHARS: 0</span><span id="count-words">WORDS: 0</span><span id="count-lines">LINES: 1</span>
        <span style="margin-left:auto; color:var(--accent);">V.2026.MODULAR_PRO</span>
    </footer>

    <div id="toast-notif" class="toast"></div>

    <script src="./auth.js?v=GOD_MODE"></script>
    <script src="./idiomas.js?v=GOD_MODE"></script>
    <script src="./audio.js?v=GOD_MODE"></script>
    <script src="./storage.js?v=GOD_MODE"></script>
    <script src="./main.js?v=GOD_MODE"></script>
</body>
</html>
