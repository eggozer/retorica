<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retórica - Sistema Profesional</title>
    <link rel="manifest" href="./manifest.json?v=2026_GOD_MODE">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-main: #0f111a; --bg-sidebar: #161925; --bg-card: #1f2335;
            --accent: #00ffcc; --text-main: #f3f4f6; --text-muted: #a0aec0;
            --border: #2d3748; --danger: #ff3b30; --btn-3d-bg: #2d3244;
            --electric-blue: #00d2ff; --royal-green: #2ecc71;
        }
        body.light-theme {
            --bg-main: #f0f2f5; --bg-sidebar: #e4e7eb; --bg-card: #ffffff;
            --accent: #00a884; --text-main: #1a202c; --text-muted: #718096;
            --border: #cbd5e1; --danger: #dc2626; --btn-3d-bg: #cbd5e1;
            --electric-blue: #2563eb; --royal-green: #16a34a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .lock-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #07080d; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .lock-box { background: var(--bg-sidebar); border: 1px solid var(--border); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .lock-logo { font-size: 1.8rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        .auth-input { width: 100%; background: var(--bg-main); border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: #fff; font-size: 0.9rem; margin-bottom: 12px; outline: none; transition: 0.2s; }
        .auth-input:focus { border-color: var(--accent); }
        
        .oauth-flex { display: none; gap: 10px; justify-content: center; margin-top: 15px; width: 100%; }
        .btn-oauth { flex: 1; padding: 10px; font-size: 0.7rem; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; text-transform: uppercase; color: #000; transition: transform 0.1s; display: none; }
        .btn-oauth:active { transform: scale(0.95); }
        .btn-google { background: #ea4335; color: #fff; }
        .btn-facebook { background: #1877f2; color: #fff; }
        .btn-whatsapp { background: #25d366; color: #fff; }

        .navbar-main { background: var(--bg-sidebar); height: 55px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 10px; z-index: 1000; }
        .logo-txt { font-weight: 900; color: var(--accent); font-size: 1.1rem; letter-spacing: 1px; cursor: pointer; }
        .sidebar-panel { position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: var(--bg-sidebar); border-right: 1px solid var(--border); z-index: 2000; transform: translateX(-100%); transition: transform 0.24s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .sidebar-panel.active { transform: translateX(0); }
        
        .main-view { flex: 1; display: flex; position: relative; overflow: hidden; background: var(--bg-main); }
        .editor-scroll-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; -webkit-overflow-scrolling: touch; }
        #zoom-wrapper { width: 100%; max-width: 800px; display: flex; flex-direction: column; }
        .doc-title { background: transparent; border: none; color: var(--text-main); font-size: 1.6rem; font-weight: 700; margin-bottom: 15px; outline: none; width: 100%; }
        .textarea-main { background: transparent; border: none; color: var(--text-main); font-size: 1rem; line-height: 1.6; resize: none; flex: 1; min-height: 70vh; outline: none; width: 100%; }
        
        .btn-3d { background: var(--btn-3d-bg); border: none; border-bottom: 3px solid rgba(0,0,0,0.4); color: var(--text-main); padding: 8px 12px; font-size: 0.75rem; font-weight: bold; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: 0.1s; }
        .btn-3d:active { border-bottom-width: 1px; transform: translateY(2px); }
        .btn-rect { border-radius: 4px; }
        .btn-accent { background: var(--accent); color: #0f111a; }
        
        .god-console { border-top: 2px dashed var(--border); padding: 15px; background: rgba(0,0,0,0.2); }
        .god-title { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1.5px; font-weight: 800; margin-bottom: 10px; display: block; }
        .admin-scroll { max-height: 140px; overflow-y: auto; }

        .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1f2335; border: 1px solid var(--accent); color: var(--text-main); padding: 10px 20px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; pointer-events: none; opacity: 0; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000; box-shadow: 0 4px 15px rgba(0,255,204,0.2); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="lock-container" id="screen-lock">
        <div class="lock-box">
            <div class="lock-logo">Retórica</div>
            <input type="text" id="auth-id" class="auth-input" placeholder="Correo electrónico o número">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Contraseña de acceso">
            <button class="btn-3d btn-accent" style="width:100%; padding:12px; justify-content:center; font-size:0.85rem;" id="btn-submit-auth" onclick="RetoricaAuth.process()">CONTINUAR</button>
            
            <div style="font-size:0.75rem; color:var(--text-muted); margin-top:15px; cursor:pointer; font-weight:bold; text-decoration:underline;" id="auth-toggle-mode" onclick="RetoricaAuth.switchMode()">¿No tienes cuenta? Regístrate aquí</div>
            
            <div style="display:none; align-items:center; margin-top:20px;" id="auth-divider-line">
                <hr style="flex:1; border:0; border-top:1px solid var(--border);">
                <span style="font-size:0.6rem; color:var(--text-muted); padding:0 10px; font-weight:bold; letter-spacing:1px;">HARDWARE LINK</span>
                <hr style="flex:1; border:0; border-top:1px solid var(--border);">
            </div>
            
            <div class="oauth-flex" id="oauth-container">
                <button id="btn-oauth-google" class="btn-oauth btn-google" onclick="RetoricaAuth.selectOAuth('Google')">Google</button>
                <button id="btn-oauth-facebook" class="btn-oauth btn-facebook" onclick="RetoricaAuth.selectOAuth('Facebook')">Facebook</button>
                <button id="btn-oauth-whatsapp" class="btn-oauth btn-whatsapp" onclick="RetoricaAuth.selectOAuth('WhatsApp')">WhatsApp</button>
            </div>
        </div>
    </div>

    <nav class="navbar-main">
        <button class="btn-3d" onclick="RetoricaUI.toggleSidebar()">☰</button>
        <div class="logo-txt" onclick="location.reload()">Retórica</div>
        
        <button class="btn-3d btn-rect" style="margin-left:auto;" onclick="RetoricaStorage.save()"><span id="lbl-tool-save">Guardar</span></button>
        <button class="btn-3d btn-rect" onclick="RetoricaAudio.toggleMic()" id="btn-mic-main"><span id="lbl-tool-mic">Dictado</span></button>
        <button class="btn-3d btn-rect" onclick="RetoricaAudio.play()" id="btn-play-main"><span id="lbl-tool-read">Lectura</span></button>
    </nav>

    <div class="sidebar-panel" id="sidebar">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
            <span style="font-weight:900; font-size:0.85rem; letter-spacing:1px;">BIBLIOTECA</span>
            <button class="btn-3d" style="padding:4px 8px;" onclick="RetoricaUI.toggleSidebar()">✕</button>
        </div>
        
        <div style="padding:15px; display:flex; flex-direction:column; gap:8px;">
            <button class="btn-3d btn-rect" onclick="document.getElementById('editor-title').value=''; document.getElementById('editor-body').value=''; RetoricaStorage.activeDocId=null; RetoricaUI.toggleSidebar(); RetoricaUI.updateCounters();"><span id="lbl-tool-new">Nuevo Guion</span></button>
            <button class="btn-3d btn-rect" onclick="RetoricaUI.toggleTheme()"><span id="lbl-tool-theme">Tema</span></button>
            <button class="btn-3d btn-rect" onclick="RetoricaStorage.exportToHTML()"><span id="lbl-side-export">Exportar</span></button>
        </div>

        <div id="docs-list-render" style="flex:1; overflow-y:auto; padding:0 15px 15px 15px;"></div>
        
        <div class="god-console">
            <span class="god-title">MODO DIOS: BASE DE REGISTROS</span>
            <div id="admin-user-list" class="admin-scroll"></div>
        </div>

        <div style="padding:15px; border-top:1px solid var(--border); display:flex; align-items:center; background:rgba(0,0,0,0.15);">
            <div style="font-size:0.65rem; color:var(--text-muted); font-weight:bold;">PERFIL: <span id="display-user-name" style="color:var(--accent); font-weight:bold;">Anon</span></div>
            <button onclick="RetoricaAuth.logout()" style="color:var(--danger); background:transparent; border:none; font-size:0.8rem; font-weight:bold; cursor:pointer; margin-left:auto;" id="lbl-side-logout">SALIR</button>
        </div>
    </div>

    <main class="main-view">
        <div class="editor-scroll-container" id="viewport-ctx">
            <div id="zoom-wrapper">
                <input type="text" id="editor-title" class="doc-title" placeholder="Título del Guion...">
                <textarea id="editor-body" class="textarea-main" placeholder="Escribe o dicta aquí tu retórica..."></textarea>
            </div>
        </div>
    </main>

    <footer style="background:var(--bg-sidebar); padding:8px 15px; font-size:0.65rem; display:flex; gap:15px; border-top:1px solid var(--border); color:var(--text-muted); font-weight:bold; z-index:900;">
        <span id="count-chars">CHARS: 0</span><span id="count-words">WORDS: 0</span><span id="count-lines">LINES: 1</span>
        <span style="margin-left:auto; color:var(--accent);">V.2026.MODULAR_PRO</span>
    </footer>

    <div id="toast-notif" class="toast"></div>

    <script src="./auth.js?v=GOD_MODE"></script>
    <script src="./idiomas.js?v=GOD_MODE"></script>
    <script src="./audio.js?v=GOD_MODE"></script>
    <script src="./storage.js?v=GOD_MODE"></script>
    <script src="./main.js?v=GOD_MODE"></script>
</body>
</html>
