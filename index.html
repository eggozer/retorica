<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retórica - Procesador de Notas</title>
    <link rel="manifest" href="./manifest.json?v=26">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* PILAR DE VARIABLES BLINDADAS CON SOPORTE DE OPACIDAD DINÁMICA */
        body { background-color: #0a0f1d; color: #f3f4f6; margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; position: relative; width: 100vw; height: 100vh; }
        body.light-theme { background-color: #f9fafb; color: #111827; }

        /* CABECERA FIJA SUPERIOR (EL LOGO SIEMPRE QUEDA VISIBLE EN EL ÁREA DE TRABAJO) */
        .app-header-fixed { position: absolute; top: 0; left: 0; width: 100%; height: 52px; border-bottom: 1px solid rgba(255,255,255,0.15); background-color: #0a0f1d; text-align: center; line-height: 52px; z-index: 400; }
        body.light-theme .app-header-fixed { background-color: #f9fafb; border-bottom: 1px solid rgba(0,0,0,0.15); }
        .brand-logo-fixed { font-weight: bold; font-size: 1.15rem; letter-spacing: 0.5px; display: inline-block; }

        /* BOTÓN DE CONTROL DE DESPLIEGUE DEL PANEL DE CONFIGURACIÓN */
        .toggle-sidebar-pestaña { position: absolute; left: 12px; top: 8px; width: 36px; height: 36px; background: #1f2937; color: #ffca28; border: 1px solid rgba(255,255,255,0.15); text-align: center; line-height: 34px; font-weight: bold; cursor: pointer; z-index: 450; border-radius: 50%; }
        body.light-theme .toggle-sidebar-pestaña { background: #ffffff; border: 1px solid rgba(0,0,0,0.15); }

        /* MENÚ LATERAL PANTALLA COMPLETA CON CONTROL DE TRANSPARENCIA */
        .sidebar { position: absolute; top: 52px; left: 0; width: 100vw; height: calc(100vh - 52px); background-color: rgba(10, 15, 29, 0.85); border-right: 1px solid rgba(255,255,255,0.2); z-index: 300; transition: transform 0.25s ease-out; }
        body.light-theme .sidebar { background-color: rgba(249, 250, 251, 0.85); border-right: 1px solid rgba(0,0,0,0.2); }
        .sidebar.hidden { transform: translateX(-100vw); }
        
        /* ZONA INTERNA DEL SIDEBAR: CONFIGURACIONES, IDIOMAS Y PUBLICIDAD */
        .sidebar-body-content { position: absolute; top: 0; bottom: 0; left: 0; right: 0; padding: 16px; overflow-y: auto; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; }
        .config-group { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; }
        body.light-theme .config-group { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.08); }
        .config-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #ffca28; }
        
        /* CONTROLES DE ENTRADA Y SELECCIÓN GENERALES */
        button, select { display: inline-block; height: 36px; padding: 0 12px; background: #1f2937; color: #f3f4f6; border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; font-size: 0.85rem; cursor: pointer; box-sizing: border-box; }
        body.light-theme button, body.light-theme select { background: #ffffff; color: #111827; border: 1px solid rgba(0,0,0,0.15); }
        .slider-control { width: 100%; margin: 8px 0; }

        .slider-plantillas { width: 100%; overflow-x: auto; white-space: nowrap; padding: 4px 0; -webkit-overflow-scrolling: touch; }
        .document-list-item { display: inline-block; background: #1f2937; border: 1px solid rgba(255,255,255,0.15); padding: 8px 12px; border-radius: 10px; font-size: 0.8rem; text-align: center; min-width: 100px; margin-right: 8px; color: #f3f4f6; }
        body.light-theme .document-list-item { background: #ffffff; color: #111827; border: 1px solid rgba(0,0,0,0.15); }
        .adsense-strip-container { width: 100%; height: 48px; border: 1px dashed #ffca28; background: rgba(255,255,255,0.02); border-radius: 6px; text-align: center; line-height: 46px; font-size: 0.7rem; color: #9ca3af; font-weight: bold; margin-top: auto; }

        /* UBICACIÓN DEMANDADA: BARRA DE HERRAMIENTAS HORIZONTAL FIJA ABAJO (SOBRE EL TECLADO) */
        .menu-tira-horizontal { position: absolute; bottom: 32px; left: 0; width: 100%; height: 50px; overflow-x: auto; overflow-y: hidden; white-space: nowrap; padding: 6px 12px; background: #0a0f1d; border-top: 1px solid rgba(255,255,255,0.15); border-bottom: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; z-index: 250; -webkit-overflow-scrolling: touch; }
        body.light-theme .menu-tira-horizontal { background: #f9fafb; border-top: 1px solid rgba(0,0,0,0.15); border-bottom: 1px solid rgba(0,0,0,0.15); }
        .separador-vertical { display: inline-block; width: 1px; height: 20px; background: rgba(255,255,255,0.2); margin: 2px 6px 0 0; vertical-align: top; }
        body.light-theme .separador-vertical { background: rgba(0,0,0,0.15); }

        /* ÁREA DE TRABAJO AJUSTADA PARA DEJAR LIBRE LAS HERRAMIENTAS INFERIORES */
        .main-container { width: 100%; height: 100%; padding-top: 52px; padding-bottom: 82px; box-sizing: border-box; overflow: hidden; position: relative; z-index: 100; }
        .editor-wrapper { width: 100%; height: 100%; padding: 16px; overflow-y: auto; box-sizing: border-box; background: transparent; }
        .rich-editor { width: 100%; min-height: 100%; background: transparent; border: none; color: #f3f4f6; font-size: 1.05rem; line-height: 1.5; outline: none; box-sizing: border-box; overflow-wrap: break-word; }
        body.light-theme .rich-editor { color: #111827; }

        /* MODALIDADES DE TIPOGRAFÍA FIJAS */
        .rich-editor.font-sans { font-family: sans-serif; }
        .rich-editor.font-serif { font-family: serif; }
        .rich-editor.font-mono { font-family: monospace; }
        .rich-editor.modo-carta { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.02); padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .rich-editor.modo-oficio { max-width: 700px; margin: 0 auto; background: rgba(255,255,255,0.02); padding: 30px; border: 1px solid rgba(255,255,255,0.1); }

        .stats-bar { width: 100%; height: 32px; border-top: 1px solid rgba(255,255,255,0.15); padding: 6px 14px 0 14px; font-size: 0.75rem; color: #9ca3af; position: absolute; bottom: 0; left: 0; background: #0a0f1d; box-sizing: border-box; z-index: 260; }
        body.light-theme .stats-bar { background: #f9fafb; border-top: 1px solid rgba(0,0,0,0.15); color: #6b7280; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translate(-50%, 100px); background-color: #ffca28; color: #0a0f1d; padding: 8px 16px; font-size: 0.8rem; font-weight: bold; transition: transform 0.2s ease; z-index: 999; border-radius: 20px; }
        .toast.show { transform: translate(-50%, 0); }
    </style>
</head>
<body>

    <header class="app-header-fixed">
        <div class="toggle-sidebar-pestaña" id="btn-toggle-pestaña">⚙️</div>
        <div class="brand-logo-fixed">☀️ RETÓRICA</div>
    </header>

    <div class="sidebar hidden" id="sidebar">
        <div class="sidebar-body-content" id="sidebar-touch-zone">
            
            <div class="config-group">
                <div class="config-title">🎚️ Transparencia de Menú</div>
                <input type="range" id="slider-opacity" class="slider-control" min="20" max="100" value="85">
            </div>

            <div class="config-group">
                <div class="config-title">🌐 Idioma de Texto y App</div>
                <select id="app-lang" style="width: 100%;"><option value="es-MX">Español (México)</option><option value="en-US">English (United States)</option></select>
            </div>

            <div class="config-group">
                <div class="config-title">🗣️ Idioma de Voz y Salida</div>
                <select id="voice-lang" style="width: 100%;"><option value="es-MX">Español (Voz MX)</option><option value="en-US">English (Voice US)</option></select>
            </div>

            <div class="config-group">
                <div class="config-title">📁 Documentos Almacenados</div>
                <div class="slider-plantillas" id="document-list"></div>
            </div>

            <div class="adsense-strip-container">ESPACIO DE PUBLICIDAD RESERVADO (MONETIZACIÓN)</div>
        </div>
    </div>

    <div class="main-container">
        <div class="editor-wrapper">
            <div id="editor" class="rich-editor font-sans" contenteditable="true" placeholder="Escribe aquí..."></div>
        </div>
    </div>

    <div class="menu-tira-horizontal" id="tira-inferior">
        <button id="btn-nuevo">➕ Nueva</button>
        <button id="btn-main-guardar" style="background:#ffca28; color:#0a0f1d; font-weight:bold;">GUARDAR</button>
        <div class="separador-vertical"></div>
        
        <select id="font-family-select">
            <option value="font-sans">Sans-Serif</option>
            <option value="font-serif">Serif</option>
            <option value="font-mono">Monospace</option>
        </select>
        <select id="combo-modalidad">
            <option value="nota">📄 Nota Normal</option>
            <option value="carta">📄 Formato Carta</option>
            <option value="oficio">📄 Formato Oficio</option>
        </select>
        <div class="separador-vertical"></div>
        
        <button id="btn-mic" title="Nota de Voz">🎙️ Grabar</button>
        <button id="btn-lectura" title="Leer Texto">🔊 Leer Frase</button>
        <button id="btn-render-fl" title="Renderizar Audio">🎛️ Render</button>
        <div class="separador-vertical"></div>
        
        <button id="export-pdf">Exportar PDF</button>
        <button id="export-doc">Exportar DOC</button>
        <button id="btn-toggle-tema">🌓 Tema</button>
    </div>

    <div class="stats-bar">
        <span id="stats-text">Caracteres: 0</span>
        <span id="lbl-file-dates" style="float: right;">Sin guardar</span>
    </div>

    <div class="toast" id="toast-notif">Operación exitosa</div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
